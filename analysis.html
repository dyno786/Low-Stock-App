<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Stock Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f4;color:#111;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* PIN */
.pinov{position:fixed;inset:0;background:#cc0000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:480px;margin:0 auto}
.pinlogo{width:60px;height:60px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#cc0000;margin-bottom:16px}
.pintitle{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px}
.pinsub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:36px}
.pindots{display:flex;gap:14px;margin-bottom:32px}
.pindot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .15s}
.pindot.filled{background:#fff}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px}
.pinkey{background:rgba(255,255,255,.15);border:none;border-radius:12px;height:64px;font-size:22px;font-weight:600;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pinkey:active{background:rgba(255,255,255,.35)}
.pinerr{color:#ffcccc;font-size:13px;margin-top:16px;height:20px;text-align:center}

/* TOP */
.top{background:#cc0000;padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.top-row{display:flex;align-items:center;justify-content:space-between}
.logo{width:32px;height:32px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#cc0000}
.title{color:#fff;font-size:15px;font-weight:700;margin-left:10px}
.sync{color:rgba(255,255,255,.8);font-size:11px;font-family:monospace}

/* MAIN TABS */
.maintabs{display:flex;background:#fff;border-bottom:1px solid #eee}
.maintab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:600;color:#999;border-bottom:2.5px solid transparent;cursor:pointer;user-select:none}
.maintab.on{color:#cc0000;border-bottom-color:#cc0000}

/* BRANCH SELECTOR */
.bsel{padding:12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:6px;align-items:center}
.bsel-lbl{font-size:11px;color:#999;white-space:nowrap}
.bsel select{flex:1;border:1px solid #ddd;border-radius:8px;padding:6px 10px;font-size:12px;background:#fff;color:#111;outline:none}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.m{background:#fff;border-radius:10px;padding:10px;text-align:center;border-left:3px solid #ddd}
.m.r{border-left-color:#cc0000}.m.a{border-left-color:#e87000}.m.g{border-left-color:#1a7f3c}
.mlbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.mval{font-size:18px;font-weight:700;font-family:monospace}

/* SECTION */
.sec{padding:6px 12px;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;display:flex;justify-content:space-between;align-items:center;background:#f4f4f4}
.badge{font-size:11px;padding:1px 8px;background:#eee;border-radius:20px;color:#666}

/* PRODUCT ROW */
.prow{display:flex;background:#fff;border-bottom:1px solid #eee;padding:10px 12px;gap:10px;cursor:pointer}
.prow:active{background:#f8f8f8}
.pi{width:52px;height:52px;border-radius:8px;background:#f0f0f0;border:1px solid #eee;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pi img{width:52px;height:52px;object-fit:cover}
.pm{flex:1;min-width:0}
.pname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.pbc{font-size:10px;color:#999;font-family:monospace;margin-bottom:4px}
.pbranches{display:flex;gap:4px;flex-wrap:wrap}
.pbr{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.pbr.dead{background:#fff8f0;color:#b45309}
.pbr.ok{background:#f0fdf4;color:#166534}
.pbr.zero{background:#fef2f2;color:#991b1b}
.pbr.na{background:#f4f4f4;color:#999}
.pr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.pqty{font-size:16px;font-weight:700;font-family:monospace}
.psug{font-size:10px;background:#e0f2fe;color:#0369a1;padding:2px 6px;border-radius:4px;font-weight:600}
.pdead-badge{font-size:10px;background:#fef2f2;color:#991b1b;padding:2px 6px;border-radius:4px;font-weight:600}

/* TRANSFER CARD */
.tcard{background:#fff;border-bottom:1px solid #eee;padding:10px 12px}
.tcard-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tarrow{font-size:13px;font-weight:700;color:#cc0000}
.tfrom{font-size:11px;color:#999}
.tcard-body{display:flex;gap:10px;align-items:center}
.tpi{width:48px;height:48px;border-radius:8px;background:#f0f0f0;border:1px solid #eee;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.tpi img{width:48px;height:48px;object-fit:cover}
.tinfo{flex:1;min-width:0}
.tname{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbc{font-size:10px;color:#999;font-family:monospace;margin-top:1px}
.tstats{display:flex;gap:6px;margin-top:4px;align-items:center}
.tstat{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.tright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tavail{font-size:11px;color:#999}
.tmove{font-size:13px;font-weight:700;background:#f0fdf4;color:#166534;padding:4px 8px;border-radius:6px;text-align:center}
.tmove-lbl{font-size:9px;color:#166534;text-align:center}

/* LOADING / EMPTY */
.loading{padding:60px 20px;text-align:center;color:#999;font-size:13px}
.spin{width:28px;height:28px;border:2px solid #eee;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 20px;text-align:center;color:#999;font-size:13px;line-height:1.8}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid #eee;display:flex;z-index:200;padding:6px 0 18px}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0;font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;font-weight:600;text-decoration:none}
.bni svg{width:20px;height:20px;color:#aaa;display:block;margin:0 auto 3px}
.bni.home svg,.bni.home{color:#cc0000}
</style>
</head>
<body>

<!-- PIN -->
<div class="pinov" id="pinov">
  <div class="pinlogo">CC</div>
  <div class="pintitle">CC Hair &amp; Beauty</div>
  <div class="pinsub">Stock Analysis</div>
  <div class="pindots">
    <div class="pindot" id="pd0"></div>
    <div class="pindot" id="pd1"></div>
    <div class="pindot" id="pd2"></div>
    <div class="pindot" id="pd3"></div>
  </div>
  <div class="pinpad">
    <button class="pinkey" onclick="pinPress('1')">1</button>
    <button class="pinkey" onclick="pinPress('2')">2</button>
    <button class="pinkey" onclick="pinPress('3')">3</button>
    <button class="pinkey" onclick="pinPress('4')">4</button>
    <button class="pinkey" onclick="pinPress('5')">5</button>
    <button class="pinkey" onclick="pinPress('6')">6</button>
    <button class="pinkey" onclick="pinPress('7')">7</button>
    <button class="pinkey" onclick="pinPress('8')">8</button>
    <button class="pinkey" onclick="pinPress('9')">9</button>
    <button class="pinkey" onclick="pinDel()" style="font-size:16px">⌫</button>
    <button class="pinkey" onclick="pinPress('0')">0</button>
    <button class="pinkey" style="opacity:0;pointer-events:none" disabled></button>
  </div>
  <div class="pinerr" id="pinerr"></div>
</div>
<script>
var pinEntry='';
function pinDots(){for(var i=0;i<4;i++)document.getElementById('pd'+i).className='pindot'+(i<pinEntry.length?' filled':'');}
function pinPress(n){if(pinEntry.length>=4)return;pinEntry+=n;pinDots();if(pinEntry.length===4)setTimeout(pinCheck,150);}
function pinDel(){if(pinEntry.length>0){pinEntry=pinEntry.slice(0,-1);pinDots();}}
function pinCheck(){if(pinEntry==='1979'){localStorage.setItem('cc_pin_ts',Date.now().toString());document.getElementById('pinov').style.display='none';init();}else{document.getElementById('pinerr').textContent='Incorrect PIN';pinEntry='';pinDots();setTimeout(function(){document.getElementById('pinerr').textContent='';},2000);}}
(function(){var ts=localStorage.getItem('cc_pin_ts');if(ts&&(Date.now()-parseInt(ts))<8*60*60*1000){document.getElementById('pinov').style.display='none';}})();
</script>

<!-- TOP BAR -->
<div class="top">
  <div class="top-row">
    <div style="display:flex;align-items:center">
      <div class="logo">CC</div>
      <span class="title">Stock Analysis</span>
    </div>
    <span class="sync" id="stime">loading…</span>
  </div>
</div>

<!-- MAIN TABS -->
<div class="maintabs">
  <div class="maintab on" onclick="switchMain('transfer',this)">Transfers</div>
  <div class="maintab" onclick="switchMain('dead',this)">Dead stock</div>
  <div class="maintab" onclick="switchMain('compare',this)">Compare</div>
</div>

<!-- CONTENT -->
<div id="content"><div class="loading"><div class="spin"></div>Loading all branches…</div></div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a class="bni" href="/stock.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Stock
  </a>
  <a class="bni home" href="/analysis.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analysis
  </a>
  <a class="bni" href="/index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    Low Stock
  </a>
</nav>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var BRANCHES = [
  {name:'Roundhay',    short:'R', url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2w5wBKrzvkoUPjEB_f7K9_vyehT9MCAxJ32AwtSmNqZzVwJZaH2G0kg7YuRTjstWGZSLpGCVj9NzM/pub?gid=0&single=true&output=csv'},
  {name:'Chapeltown',  short:'C', url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ2DoIGJsmVoJOmShcLoUJ6wFrwbVSejnPy7uft8UEf1Brj5gRNBmSTO4eRqZQkDsldlsD6GiBs2Bo/pub?gid=0&single=true&output=csv'},
  {name:'City Center', short:'X', url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfK3RbCr-2FPtGFXio6aL6UMnYrlNupoJ259jlHuLIXKkOBLraZxgcb8WvCj2ndeARlp-uVRyNMyKt/pub?gid=0&single=true&output=csv'}
];
var IURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpu9NMXwqZKBOM-0HcE0dqczoOdZqCXCJK5vqwXCz5YT9ZOg2Pm1vE_PvvljD7MzxxUSUknrKfao5Q/pub?gid=955535085&single=true&output=csv';
var DEAD_DAYS = 90;

// ── STATE ─────────────────────────────────────────────────────────────────────
var branchData = [null, null, null]; // indexed by branch
var imgs = {};
var mainTab = 'transfer';
var loaded = 0;

function cl(v){return String(v==null?'':v).trim();}
function pDate(s){if(!s||s==='Never'||s==='Unknown'||s==='NULL')return null;var p=s.split('/');if(p.length===3){var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return isNaN(d.getTime())?null:d;}var d=new Date(s);return isNaN(d.getTime())?null:d;}
function dSince(s){var d=pDate(s);return d?Math.floor((Date.now()-d.getTime())/86400000):9999;}
function isVD(s){var d=pDate(s);return d!==null&&d.getFullYear()>=2000;}
function isDead(p){if(p.qty<=5)return false;if(p.ls==='Never'&&isVD(p.dc)&&dSince(p.dc)>=DEAD_DAYS)return true;if(isVD(p.ls)&&dSince(p.ls)>=DEAD_DAYS)return true;return false;}
function deadAge(p){if(p.ls==='Never')return isVD(p.dc)?dSince(p.dc):9999;return dSince(p.ls);}

function parseRows(rows, bidx){
  return rows.map(function(r){
    var ls=cl(r['LastSold']),dc=cl(r['DateCreated']);
    return {
      bc:  cl(r['Barcode']),
      nm:  cl(r['ProductName']),
      sz:  cl(r['Size']),
      qty: parseInt(r['StockQty'])||0,
      prc: parseFloat(r['Price'])||0,
      ls:  (ls&&ls!=='NULL')?ls:'Never',
      dc:  (dc&&dc!=='NULL')?dc:'Unknown',
      dp:  cl(r['Department']),
      bidx: bidx
    };
  });
}

async function loadImgs(){
  try{
    var r=await fetch(IURL);var t=await r.text();
    Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
      var bc=cl(row['Barcode']),src=cl(row['ImageURL']);
      if(bc&&src&&src.startsWith('http'))imgs[bc]=src;
    });
  }catch(e){console.log('img err',e.message);}
}

async function loadBranch(bidx){
  try{
    var r=await fetch(BRANCHES[bidx].url);
    var t=await r.text();
    var parsed=Papa.parse(t,{header:true,skipEmptyLines:true});
    branchData[bidx]=parseRows(parsed.data, bidx);
  }catch(e){branchData[bidx]=[];console.log('branch err',bidx,e.message);}
  loaded++;
  if(loaded===3){
    document.getElementById('stime').textContent='live '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function switchMain(tab, el){
  mainTab=tab;
  document.querySelectorAll('.maintab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  render();
}

function render(){
  if(loaded<3){
    document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div>Loading all branches…</div>';
    return;
  }
  if(mainTab==='transfer') renderTransfer();
  else if(mainTab==='dead') renderDead();
  else renderCompare();
}

// ── IMG HELPER ────────────────────────────────────────────────────────────────
function mkImgEl(bc, size){
  var src=imgs[bc];
  if(src) return '<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'" style="width:'+size+'px;height:'+size+'px;object-fit:cover">';
  return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
}

// ── TRANSFER ─────────────────────────────────────────────────────────────────
var tfrom=0, tto=1;

function renderTransfer(){
  var el=document.getElementById('content');

  // Build cross-branch product map by barcode
  var bcMap={};
  for(var b=0;b<3;b++){
    (branchData[b]||[]).forEach(function(p){
      if(!p.bc) return;
      if(!bcMap[p.bc]) bcMap[p.bc]={nm:p.nm,sz:p.sz,bc:p.bc,dp:p.dp,prc:p.prc,branches:[null,null,null]};
      bcMap[p.bc].branches[b]=p;
    });
  }

  // Find transfers: source has dead stock (qty>5, dead), dest is zero or negative
  var suggestions=[];
  Object.values(bcMap).forEach(function(item){
    var src=item.branches[tfrom];
    var dst=item.branches[tto];
    if(!src||!dst) return;
    if(src.qty<=5) return; // source must have stock
    if(src.qty<0) return;  // ignore negatives as source
    if(!isDead(src)) return; // source must be dead/excess
    if(dst.qty>3) return;  // dest must need stock
    var suggest=Math.min(Math.floor(src.qty/2), Math.max(5, src.qty-5));
    suggestions.push({item:item, src:src, dst:dst, suggest:suggest, age:deadAge(src)});
  });
  suggestions.sort(function(a,b){return b.age-a.age;});

  // Metrics
  var totalVal=suggestions.reduce(function(s,x){return s+x.src.qty*x.src.prc;},0);
  var urgent=suggestions.filter(function(x){return x.dst.qty<=0;}).length;

  var html='';
  html+='<div style="padding:10px 12px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center">';
  html+='<span style="font-size:11px;color:#999;white-space:nowrap">From</span>';
  html+='<select onchange="tfrom=parseInt(this.value);renderTransfer()" style="flex:1;border:1px solid #ddd;border-radius:8px;padding:6px;font-size:12px">';
  BRANCHES.forEach(function(b,i){html+='<option value="'+i+'"'+(i===tfrom?' selected':'')+'>'+b.name+'</option>';});
  html+='</select>';
  html+='<span style="font-size:11px;color:#999;white-space:nowrap">→ To</span>';
  html+='<select onchange="tto=parseInt(this.value);renderTransfer()" style="flex:1;border:1px solid #ddd;border-radius:8px;padding:6px;font-size:12px">';
  BRANCHES.forEach(function(b,i){html+='<option value="'+i+'"'+(i===tto?' selected':'')+'>'+b.name+'</option>';});
  html+='</select></div>';

  if(tfrom===tto){
    html+='<div class="empty">Select two different branches</div>';
    el.innerHTML=html; return;
  }

  html+='<div class="metrics">';
  html+='<div class="m r"><div class="mlbl">Transfers</div><div class="mval">'+suggestions.length+'</div></div>';
  html+='<div class="m a"><div class="mlbl">Value</div><div class="mval">£'+Math.round(totalVal/1000)+'k</div></div>';
  html+='<div class="m g"><div class="mlbl">Urgent</div><div class="mval">'+urgent+'</div></div>';
  html+='</div>';

  if(!suggestions.length){
    html+='<div class="empty">No transfer opportunities found<br>between these branches</div>';
    el.innerHTML=html; return;
  }

  // Urgent first
  var urgent_list=suggestions.filter(function(x){return x.dst.qty<=0;});
  var normal_list=suggestions.filter(function(x){return x.dst.qty>0;});

  if(urgent_list.length){
    html+='<div class="sec"><span>Urgent — dest out of stock</span><span class="badge">'+urgent_list.length+'</span></div>';
    urgent_list.forEach(function(x){ html+=mkTransferCard(x); });
  }
  if(normal_list.length){
    html+='<div class="sec"><span>Dead in source, low in dest</span><span class="badge">'+normal_list.length+'</span></div>';
    normal_list.slice(0,50).forEach(function(x){ html+=mkTransferCard(x); });
  }

  el.innerHTML=html;
}

function mkTransferCard(x){
  var age=deadAge(x.src);
  var ageStr=age>=9999?'Never sold':(age+'d ago');
  var dstStr=x.dst.qty<=0?'Out of stock':'Low: '+x.dst.qty+' left';
  return '<div class="tcard">'+
    '<div class="tcard-header">'+
      '<span style="font-size:10px;background:#fef2f2;color:#991b1b;padding:2px 7px;border-radius:4px;font-weight:600">'+BRANCHES[tfrom].name+'</span>'+
      '<span class="tarrow">→</span>'+
      '<span style="font-size:10px;background:#f0fdf4;color:#166534;padding:2px 7px;border-radius:4px;font-weight:600">'+BRANCHES[tto].name+'</span>'+
      '<span style="font-size:10px;color:#999;margin-left:auto">Dead '+ageStr+'</span>'+
    '</div>'+
    '<div class="tcard-body">'+
      '<div class="tpi">'+mkImgEl(x.item.bc,48)+'</div>'+
      '<div class="tinfo">'+
        '<div class="tname">'+x.item.nm+(x.item.sz?' · '+x.item.sz:'')+'</div>'+
        '<div class="tbc">'+x.item.bc+'</div>'+
        '<div class="tstats">'+
          '<span class="tstat dead">Source: '+x.src.qty+' units</span>'+
          '<span class="tstat '+(x.dst.qty<=0?'zero':'ok')+'">'+dstStr+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="tright">'+
        '<div class="tmove">'+x.suggest+'</div>'+
        '<div class="tmove-lbl">move</div>'+
        (x.item.prc>0?'<div style="font-size:10px;color:#999;margin-top:2px">£'+x.item.prc.toFixed(2)+'</div>':'')+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── DEAD STOCK ────────────────────────────────────────────────────────────────
var deadFilter='all';

function renderDead(){
  var el=document.getElementById('content');

  // Build cross-branch product map
  var bcMap={};
  for(var b=0;b<3;b++){
    (branchData[b]||[]).forEach(function(p){
      if(!p.bc||p.qty<=0) return;
      if(!bcMap[p.bc]) bcMap[p.bc]={nm:p.nm,sz:p.sz,bc:p.bc,prc:p.prc,branches:[null,null,null]};
      bcMap[p.bc].branches[b]=p;
    });
  }

  // Categorise
  var deadAll=[], deadSome=[], deadNone=[];
  Object.values(bcMap).forEach(function(item){
    var deadCount=item.branches.filter(function(b){return b&&isDead(b);}).length;
    var hasAny=item.branches.some(function(b){return b!==null;});
    if(!hasAny) return;
    if(deadCount===3) deadAll.push(item);
    else if(deadCount>=1) deadSome.push(item);
  });

  // Sort by total value tied up
  deadAll.sort(function(a,b){
    var va=a.branches.reduce(function(s,x){return s+(x?x.qty*x.prc:0);},0);
    var vb=b.branches.reduce(function(s,x){return s+(x?x.qty*x.prc:0);},0);
    return vb-va;
  });
  deadSome.sort(function(a,b){
    var va=a.branches.reduce(function(s,x){return s+(x&&isDead(x)?x.qty*x.prc:0);},0);
    var vb=b.branches.reduce(function(s,x){return s+(x&&isDead(x)?x.qty*x.prc:0);},0);
    return vb-va;
  });

  var totalAllVal=deadAll.reduce(function(s,item){return s+item.branches.reduce(function(s2,x){return s2+(x?x.qty*x.prc:0);},0);},0);
  var totalSomeVal=deadSome.reduce(function(s,item){return s+item.branches.reduce(function(s2,x){return s2+(x&&isDead(x)?x.qty*x.prc:0);},0);},0);

  var html='';
  html+='<div class="metrics">';
  html+='<div class="m r"><div class="mlbl">Dead all 3</div><div class="mval">'+deadAll.length+'</div></div>';
  html+='<div class="m a"><div class="mlbl">Dead some</div><div class="mval">'+deadSome.length+'</div></div>';
  html+='<div class="m a"><div class="mlbl">Value tied</div><div class="mval">£'+Math.round((totalAllVal+totalSomeVal)/1000)+'k</div></div>';
  html+='</div>';

  // Filter buttons
  html+='<div style="display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none">';
  [['all','All'],['deadall','Dead all branches'],['deadsome','Dead in 1-2 branches']].forEach(function(f){
    var on=deadFilter===f[0];
    html+='<div onclick="deadFilter=\''+f[0]+'\';renderDead()" style="padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid '+(on?'#cc0000':'#ddd')+';background:'+(on?'#cc0000':'#fff')+';color:'+(on?'#fff':'#555')+'">'+f[1]+'</div>';
  });
  html+='</div>';

  var showAll = deadFilter==='all'||deadFilter==='deadall';
  var showSome = deadFilter==='all'||deadFilter==='deadsome';

  if(showAll&&deadAll.length){
    html+='<div class="sec" style="background:#fef2f2"><span style="color:#991b1b">Dead in ALL 3 branches — consider clearance</span><span class="badge">'+deadAll.length+'</span></div>';
    deadAll.slice(0,100).forEach(function(item){html+=mkDeadCard(item,true);});
  }
  if(showSome&&deadSome.length){
    html+='<div class="sec"><span>Dead in 1–2 branches — transfer opportunity</span><span class="badge">'+deadSome.length+'</span></div>';
    deadSome.slice(0,100).forEach(function(item){html+=mkDeadCard(item,false);});
  }

  el.innerHTML=html;
}

function mkDeadCard(item, allDead){
  var totalQty=item.branches.reduce(function(s,x){return s+(x?x.qty:0);},0);
  var totalVal=item.branches.reduce(function(s,x){return s+(x?x.qty*x.prc:0);},0);
  var html='<div class="prow">';
  html+='<div class="pi">'+mkImgEl(item.bc,52)+'</div>';
  html+='<div class="pm">';
  html+='<div class="pname">'+item.nm+(item.sz?' · '+item.sz:'')+'</div>';
  html+='<div class="pbc">'+item.bc+'</div>';
  html+='<div class="pbranches">';
  BRANCHES.forEach(function(b,i){
    var p=item.branches[i];
    if(!p){html+='<span class="pbr na">'+b.short+': —</span>';return;}
    var cls=isDead(p)?'dead':(p.qty<=0?'zero':'ok');
    var age=isDead(p)?(deadAge(p)+'d'):null;
    html+='<span class="pbr '+cls+'">'+b.short+': '+p.qty+(age?' ('+age+')':'')+'</span>';
  });
  html+='</div></div>';
  html+='<div class="pr">';
  html+='<div class="pqty" style="color:#b45309">'+totalQty+'</div>';
  html+='<div style="font-size:10px;color:#999">total units</div>';
  if(totalVal>0) html+='<div style="font-size:10px;color:#b45309;font-weight:600">£'+totalVal.toFixed(0)+'</div>';
  if(allDead) html+='<div class="pdead-badge">clearance</div>';
  html+='</div></div>';
  return html;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
function renderCompare(){
  var el=document.getElementById('content');
  var html='<div style="padding:12px">';

  var rows=[
    ['Total products', function(d){return d.length.toLocaleString();}],
    ['Negative stock', function(d){var n=d.filter(function(p){return p.qty<0;}).length;return '<span style="color:#cc0000">'+n+'</span>';}],
    ['Zero stock',     function(d){var n=d.filter(function(p){return p.qty===0;}).length;return '<span style="color:#e87000">'+n.toLocaleString()+'</span>';}],
    ['Dead stock',     function(d){var n=d.filter(isDead).length;return '<span style="color:#b45309">'+n.toLocaleString()+'</span>';}],
    ['Dead value',     function(d){var v=d.filter(isDead).reduce(function(s,p){return s+p.qty*p.prc;},0);return '<span style="color:#b45309">£'+Math.round(v).toLocaleString()+'</span>';}],
    ['In stock',       function(d){var n=d.filter(function(p){return p.qty>0;}).length;return '<span style="color:#1a7f3c">'+n.toLocaleString()+'</span>';}],
  ];

  html+='<div style="background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden">';
  html+='<table style="width:100%;border-collapse:collapse;font-size:12px">';
  html+='<thead><tr style="background:#f8f8f8">';
  html+='<th style="padding:10px 12px;text-align:left;font-weight:600;color:#999;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Metric</th>';
  BRANCHES.forEach(function(b){
    html+='<th style="padding:10px 8px;text-align:center;font-weight:600;color:#999;font-size:10px;text-transform:uppercase;letter-spacing:.5px">'+b.short+'</th>';
  });
  html+='</tr></thead><tbody>';
  rows.forEach(function(row,ri){
    html+='<tr style="border-top:1px solid #f0f0f0'+(ri%2===0?';background:#fafafa':'')+'">'+
      '<td style="padding:9px 12px;color:#666;font-size:11px">'+row[0]+'</td>';
    branchData.forEach(function(d){
      html+='<td style="padding:9px 8px;text-align:center;font-weight:600">'+row[1](d||[])+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';

  // Legend
  html+='<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:#999">';
  BRANCHES.forEach(function(b,i){html+='<span><strong>'+b.short+'</strong> = '+b.name+'</span>';});
  html+='</div>';

  html+='</div>';
  el.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  loaded=0;
  document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div>Loading all branches…</div>';
  loadImgs();
  BRANCHES.forEach(function(_,i){ loadBranch(i); });
}

// Auto-start if already unlocked
(function(){
  var ts=localStorage.getItem('cc_pin_ts');
  if(ts&&(Date.now()-parseInt(ts))<8*60*60*1000) init();
})();
</script>
