<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Lost Sales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}
/* PIN */
.pinov{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:480px;margin:0 auto}
.pinlogo{width:64px;height:64px;background:#cc0000;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#fff;margin-bottom:18px}
.pintitle{font-size:20px;font-weight:700;margin-bottom:4px}
.pinsub{font-size:13px;color:#555;margin-bottom:40px}
.pindots{display:flex;gap:16px;margin-bottom:36px}
.pindot{width:14px;height:14px;border-radius:50%;background:#222;transition:all .15s}
.pindot.filled{background:#cc0000;transform:scale(1.1)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:260px}
.pinkey{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:14px;height:68px;font-size:24px;font-weight:500;color:#fff;cursor:pointer;touch-action:manipulation}
.pinkey:active{background:#2a2a2a}
.pinerr{color:#f87171;font-size:13px;margin-top:18px;height:20px;text-align:center}
/* HEADER */
.hdr{background:#111;border-bottom:1px solid #1a1a1a;padding:14px 16px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:32px;height:32px;background:#cc0000;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff}
.hdr-title{font-size:15px;font-weight:700}
.hdr-sub{font-size:10px;color:#444;margin-top:1px;font-family:monospace}
.hdr-btn{background:#1a1a1a;border:0.5px solid #2a2a2a;color:#888;border-radius:8px;padding:6px 10px;font-size:10px;font-weight:600;cursor:pointer}
/* BRANCH TABS */
.btabs{display:flex;background:#111;border-bottom:1px solid #1a1a1a;overflow-x:auto;scrollbar-width:none}
.btabs::-webkit-scrollbar{display:none}
.btab{flex-shrink:0;padding:10px 16px;font-size:11px;font-weight:600;color:#444;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;user-select:none}
.btab.on{color:#cc0000;border-bottom-color:#cc0000}
/* METRICS — dark cards */
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
.mc{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px}
.mc-val{font-size:24px;font-weight:700;font-family:monospace}
.mc-lbl{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
/* FILTER ROW */
.filter-row{background:#111;border-bottom:1px solid #1a1a1a;padding:8px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2a2a2a;background:#111;color:#555;user-select:none}
.fpill.on{background:#cc0000;color:#fff;border-color:#cc0000}
/* SECTION */
.sec{padding:8px 12px;font-size:9px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.7px;display:flex;justify-content:space-between;align-items:center;background:#0a0a0a;border-bottom:1px solid #111}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
/* DEPT HEADER */
.dept-hdr{background:#111;border-bottom:1px solid #1a1a1a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.dept-name{font-size:12px;font-weight:600}
.dept-meta{font-size:10px;color:#444;margin-top:2px}
.dept-arrow{color:#333;font-size:12px;transition:transform .2s}
.dept-arrow.open{transform:rotate(90deg)}
.dept-body{display:none}
.dept-body.open{display:block}
/* CARD */
.card{background:#111;border-bottom:1px solid #1a1a1a;padding:12px 14px;cursor:pointer;transition:background .1s}
.card:active{background:#1a1a1a}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.card-body{display:flex;gap:10px;align-items:flex-start}
.card-img{width:48px;height:48px;border-radius:8px;background:#1a1a1a;border:1px solid #222;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:48px;height:48px;object-fit:cover}
.card-info{flex:1;min-width:0}
.card-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.card-bc{font-size:9px;color:#333;font-family:monospace;margin-bottom:5px}
.card-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.tag-out{background:#3a0000;color:#f87171}
.tag-loss{background:#2a0a00;color:#fb923c}
.tag-day{background:#1a1500;color:#fbbf24}
.tag-src{background:#001a08;color:#4ade80}
.tag-info{background:#1a1a1a;color:#555}
.card-right{flex-shrink:0;text-align:right}
.card-loss{font-size:18px;font-weight:700;font-family:monospace;color:#f87171}
.card-dayloss{font-size:10px;color:#555;margin-top:2px}
/* SUMMARY BANNER */
.banner{margin:12px;background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:14px;border-left:3px solid #cc0000}
.banner-title{font-size:10px;font-weight:700;color:#cc0000;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.banner-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1a1a1a;font-size:12px}
.banner-row:last-child{border-bottom:none}
.banner-label{color:#555}
.banner-val{font-weight:700;font-family:monospace}
/* LOADING */
.loading{padding:60px 20px;text-align:center;color:#333;font-size:12px}
.spin{width:28px;height:28px;border:2px solid #1a1a1a;border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px 20px;text-align:center;color:#333;font-size:13px;line-height:2}
/* PANEL */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;max-width:480px;margin:0 auto}
.pov.open{display:block}
.pan{position:absolute;bottom:0;left:0;right:0;background:#111;border-radius:18px 18px 0 0;max-height:88vh;overflow-y:auto;padding-bottom:40px}
.ph{width:36px;height:3px;background:#222;border-radius:2px;margin:12px auto 0}
.p-hero{width:100%;height:160px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #1a1a1a;overflow:hidden}
.p-hero img{max-height:156px;max-width:100%;object-fit:contain}
.p-body{padding:14px 16px}
.p-name{font-size:16px;font-weight:700;margin-bottom:2px}
.p-dept{font-size:11px;color:#444;margin-bottom:14px}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:12px}
.p-row:last-child{border-bottom:none}
.p-lbl{color:#444}
.p-val{font-family:monospace;font-weight:600;font-size:11px}
.p-branches{margin-top:12px}
.p-branch-title{font-size:9px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.p-brow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:11px}
.p-brow:last-child{border-bottom:none}
.p-bchip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;min-width:64px;text-align:center;flex-shrink:0}
.bc-r{background:#2a0000;color:#f87171}
.bc-c{background:#2a1500;color:#fb923c}
.bc-x{background:#001a08;color:#4ade80}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#111;border-top:0.5px solid #1a1a1a;display:flex;z-index:200;padding:5px 0 16px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;padding:5px 0;user-select:none}
.ni svg{width:20px;height:20px;color:#333}
.ni span{font-size:8px;color:#333;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.ni.home{background:#cc0000;border-radius:10px;margin:4px;padding:4px 8px}
.ni.home svg,.ni.home span{color:#fff}
body{padding-bottom:70px}
</style>

<script>
var pe='';
function pd(){for(var i=0;i<4;i++)document.getElementById('pd'+i).className='pindot'+(i<pe.length?' filled':'');}
function pc(){
  if(pe==='2025'){
    localStorage.setItem('cc_ls_ts',Date.now().toString());
    document.getElementById('pinov').style.display='none';
    startApp();
  }else{
    document.getElementById('pinerr').textContent='Incorrect PIN';
    pe='';pd();
    setTimeout(function(){document.getElementById('pinerr').textContent='';},2000);
  }
}
document.getElementById('pinpad').addEventListener('click',function(e){
  var b=e.target.closest('.pinkey');if(!b||b.disabled)return;
  var n=b.dataset.n;
  if(n==='del'){if(pe.length>0){pe=pe.slice(0,-1);pd();}}
  else{if(pe.length<4){pe+=n;pd();if(pe.length===4)setTimeout(pc,150);}}
});
(function(){var ts=localStorage.getItem('cc_ls_ts');if(ts&&Date.now()-parseInt(ts)<8*3600*1000)document.getElementById('pinov').style.display='none';})();
</script>

<script>
var URLS=[
  {name:'Roundhay',chip:'bc-r',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2w5wBKrzvkoUPjEB_f7K9_vyehT9MCAxJ32AwtSmNqZzVwJZaH2G0kg7YuRTjstWGZSLpGCVj9NzM/pub?gid=0&single=true&output=csv'},
  {name:'Chapy',   chip:'bc-c',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ2DoIGJsmVoJOmShcLoUJ6wFrwbVSejnPy7uft8UEf1Brj5gRNBmSTO4eRqZQkDsldlsD6GiBs2Bo/pub?gid=0&single=true&output=csv'},
  {name:'City',    chip:'bc-x',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfK3RbCr-2FPtGFXio6aL6UMnYrlNupoJ259jlHuLIXKkOBLraZxgcb8WvCj2ndeARlp-uVRyNMyKt/pub?gid=0&single=true&output=csv'},
];
var IURL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTpu9NMXwqZKBOM-0HcE0dqczoOdZqCXCJK5vqwXCz5YT9ZOg2Pm1vE_PvvljD7MzxxUSUknrKfao5Q/pub?gid=955535085&single=true&output=csv';

var bd=[[],[],[]],imgs={},loaded=0,imgsLoaded=false;
var filterBranch=-1,filterDays=60;

function cl(v){return String(v==null?'':v).trim();}
function pDate(s){
  if(!s||s==='Never'||s==='Unknown'||s==='NULL')return null;
  var p=s.split('/');
  if(p.length===3){var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return isNaN(d)?null:d;}
  var d=new Date(s);return isNaN(d)?null:d;
}
function dSince(s){var d=pDate(s);return d?Math.floor((Date.now()-d)/86400000):9999;}

// ── DAILY RATE based on how recently it sold ──────────────────
// More recent = higher estimated daily sales velocity
function dailyRate(daysOOS){
  if(daysOOS<=1) return 1.2;
  if(daysOOS<=3) return 1.0;
  if(daysOOS<=7) return 0.6;
  if(daysOOS<=14)return 0.35;
  if(daysOOS<=30)return 0.15;
  return 0.05;
}

async function loadImgs(){
  if(imgsLoaded)return;imgsLoaded=true;
  try{
    var c=localStorage.getItem('cc_imgs');
    if(c){var o=JSON.parse(c);if(Date.now()-o.ts<86400000){imgs=o.d;return;}}
    var r=await fetch(IURL);var t=await r.text();
    Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
      var bc=cl(row['Barcode']),src=cl(row['ImageURL']);
      if(bc&&src&&src.startsWith('http'))imgs[bc]=src;
    });
    try{localStorage.setItem('cc_imgs',JSON.stringify({ts:Date.now(),d:imgs}));}catch(e){}
  }catch(e){}
}

async function loadBranch(i){
  try{
    var r=await fetch(URLS[i].url+'&t='+Date.now());
    var t=await r.text();
    bd[i]=Papa.parse(t,{header:true,skipEmptyLines:true}).data.map(function(row){
      var ls=cl(row['LastSold']),dc=cl(row['DateCreated']);
      return{
        bc:cl(row['Barcode']),nm:cl(row['ProductName']),sz:cl(row['Size']),
        qty:parseInt(row['StockQty'])||0,
        prc:parseFloat(row['Price'])||0,
        ls:(ls&&ls!=='NULL')?ls:'Never',
        dc:(dc&&dc!=='NULL')?dc:'Unknown',
        dp:cl(row['Department'])
      };
    });
  }catch(e){bd[i]=[];}
  loaded++;
  document.getElementById('stime').textContent='loaded '+loaded+'/3'+(loaded===3?' · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'…');
  render();
  if(loaded===3)loadImgs().then(render);
}

// ── CORE LOGIC ────────────────────────────────────────────────
function buildLostSales(){
  // Build cross-branch barcode map
  var map={};
  for(var b=0;b<3;b++){
    bd[b].forEach(function(p){
      if(!p.bc)return;
      if(!map[p.bc])map[p.bc]={nm:p.nm,sz:p.sz,bc:p.bc,dp:p.dp,prc:p.prc,branches:[null,null,null]};
      map[p.bc].branches[b]=p;
    });
  }

  var results=[];
  Object.values(map).forEach(function(item){
    // Check each branch as a potential "destination that's out of stock"
    for(var dest=0;dest<3;dest++){
      if(filterBranch>=0&&dest!==filterBranch)continue;
      var dst=item.branches[dest];
      if(!dst||dst.qty>0)continue;        // has stock, skip
      if(dst.ls==='Never')continue;        // never sold = not urgent
      var age=dSince(dst.ls);
      if(age>filterDays)continue;          // outside filter window

      var rate=dailyRate(age);
      var dayLoss=item.prc>0?rate*item.prc:0;
      var totalLost=dayLoss*age;

      // Find best source branch (most stock)
      var srcBranch=-1,srcQty=0;
      for(var s=0;s<3;s++){
        if(s===dest)continue;
        var src=item.branches[s];
        if(src&&src.qty>0&&src.qty>srcQty){srcQty=src.qty;srcBranch=s;}
      }

      results.push({
        item:item,dest:dest,age:age,
        srcBranch:srcBranch,srcQty:srcQty,
        rate:rate,dayLoss:dayLoss,totalLost:totalLost
      });
    }
  });

  // Sort by total lost descending
  results.sort(function(a,b){return b.totalLost-a.totalLost;});
  return results;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  if(loaded===0)return;
  var results=buildLostSales();
  var el=document.getElementById('out');

  var totalDay=results.reduce(function(s,x){return s+x.dayLoss;},0);
  var totalLost=results.reduce(function(s,x){return s+x.totalLost;},0);
  var canTransfer=results.filter(function(x){return x.srcBranch>=0;});
  var needReorder=results.filter(function(x){return x.srcBranch<0;});
  var totalStake=canTransfer.reduce(function(s,x){return s+x.srcQty*(x.item.prc||0);},0);

  // Summary banner
  var html='';
  html+='<div class="banner">';
  html+='<div class="banner-title">Revenue at risk</div>';
  html+='<div class="banner-row"><span class="banner-label">Lost every day (est.)</span><span class="banner-val" style="color:#f87171">£'+Math.round(totalDay).toLocaleString()+'</span></div>';
  html+='<div class="banner-row"><span class="banner-label">Already lost (est.)</span><span class="banner-val" style="color:#fb923c">£'+Math.round(totalLost).toLocaleString()+'</span></div>';
  html+='<div class="banner-row"><span class="banner-label">Stock ready to move</span><span class="banner-val" style="color:#4ade80">£'+Math.round(totalStake).toLocaleString()+'</span></div>';
  html+='<div class="banner-row"><span class="banner-label">Items out of stock</span><span class="banner-val">'+results.length+'</span></div>';
  html+='</div>';

  // Metrics
  html+='<div class="metrics">';
  html+='<div class="mc"><div class="mc-val" style="color:#f87171">£'+Math.round(totalDay).toLocaleString()+'</div><div class="mc-lbl">Per day loss</div></div>';
  html+='<div class="mc"><div class="mc-val" style="color:#fb923c">£'+Math.round(totalLost).toLocaleString()+'</div><div class="mc-lbl">Total lost est.</div></div>';
  html+='<div class="mc"><div class="mc-val" style="color:#4ade80">'+canTransfer.length+'</div><div class="mc-lbl">Can transfer now</div></div>';
  html+='<div class="mc"><div class="mc-val" style="color:#fbbf24">'+needReorder.length+'</div><div class="mc-lbl">Need reorder</div></div>';
  html+='</div>';

  if(!results.length){
    html+='<div class="empty">No lost sales found<br><span style="font-size:11px;color:#333">Try a wider time window</span></div>';
    el.innerHTML=html;return;
  }

  // ── SECTION 1: Can transfer ──
  if(canTransfer.length){
    var byDept={};
    canTransfer.forEach(function(x){var d=x.item.dp||'General';if(!byDept[d])byDept[d]=[];byDept[d].push(x);});
    var sectLost=canTransfer.reduce(function(s,x){return s+x.totalLost;},0);
    html+='<div class="sec"><span style="color:#4ade80">MOVE NOW — stock exists elsewhere</span><span class="sec-badge" style="background:#001a08;color:#4ade80">'+canTransfer.length+' items · £'+Math.round(sectLost).toLocaleString()+' lost</span></div>';

    Object.keys(byDept).sort().forEach(function(dept){
      var items=byDept[dept];
      var dLost=items.reduce(function(s,x){return s+x.totalLost;},0);
      var dDay=items.reduce(function(s,x){return s+x.dayLoss;},0);
      var did='ct_'+dept.replace(/\W/g,'_');
      html+='<div class="dept-hdr" data-did="'+did+'">';
      html+='<div><div class="dept-name">'+dept+'</div><div class="dept-meta" style="color:#f87171">-£'+Math.round(dDay)+'/day · £'+Math.round(dLost)+' lost · '+items.length+' items</div></div>';
      html+='<span class="dept-arrow open" id="darr_'+did+'">›</span>';
      html+='</div>';
      html+='<div class="dept-body open" id="'+did+'">';
      items.forEach(function(x){html+=mkCard(x);});
      html+='</div>';
    });
  }

  // ── SECTION 2: Need reorder ──
  if(needReorder.length){
    var byDept2={};
    needReorder.forEach(function(x){var d=x.item.dp||'General';if(!byDept2[d])byDept2[d]=[];byDept2[d].push(x);});
    var sectLost2=needReorder.reduce(function(s,x){return s+x.totalLost;},0);
    html+='<div class="sec"><span style="color:#fbbf24">REORDER — no stock at any branch</span><span class="sec-badge" style="background:#1a1500;color:#fbbf24">'+needReorder.length+' items · £'+Math.round(sectLost2).toLocaleString()+' lost</span></div>';

    Object.keys(byDept2).sort().forEach(function(dept){
      var items=byDept2[dept];
      var dLost=items.reduce(function(s,x){return s+x.totalLost;},0);
      var did='ro_'+dept.replace(/\W/g,'_');
      html+='<div class="dept-hdr" data-did="'+did+'">';
      html+='<div><div class="dept-name">'+dept+'</div><div class="dept-meta" style="color:#fb923c">£'+Math.round(dLost)+' lost · '+items.length+' items</div></div>';
      html+='<span class="dept-arrow" id="darr_'+did+'">›</span>';
      html+='</div>';
      html+='<div class="dept-body" id="'+did+'">';
      items.forEach(function(x){html+=mkCard(x);});
      html+='</div>';
    });
  }

  el.innerHTML=html;

  // Wire clicks
  el.querySelectorAll('[data-did]').forEach(function(hdr){
    hdr.addEventListener('click',function(){
      var id=this.dataset.did;
      var body=document.getElementById(id);
      var arr=document.getElementById('darr_'+id);
      if(!body)return;
      var open=body.classList.toggle('open');
      if(arr)arr.classList.toggle('open',open);
    });
  });
  el.querySelectorAll('[data-bc]').forEach(function(card){
    card.addEventListener('click',function(){openPanel(this.dataset.bc);});
  });
}

function mkCard(x){
  var bc=x.item.bc;
  var ageStr=x.age===0?'Today':x.age===1?'Yesterday':x.age+'d ago';
  var ageColor=x.age<=1?'#f87171':x.age<=3?'#fb923c':'#fbbf24';
  var srcTag=x.srcBranch>=0
    ?'<span class="tag tag-src">'+URLS[x.srcBranch].name+': '+x.srcQty+' avail</span>'
    :'<span class="tag tag-info">No stock anywhere</span>';
  var src=imgs[bc];
  var imgHtml=src
    ?'<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'" style="width:48px;height:48px;object-fit:cover">'
    :'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';

  return '<div class="card" data-bc="'+bc+'">'+
    '<div class="card-top">'+
      '<span class="tag tag-out">'+URLS[x.dest].name+': OUT</span>'+
      '<span class="tag" style="background:#1a1a1a;color:'+ageColor+'">'+ageStr+'</span>'+
      srcTag+
    '</div>'+
    '<div class="card-body">'+
      '<div class="card-img">'+imgHtml+'</div>'+
      '<div class="card-info">'+
        '<div class="card-name">'+x.item.nm+(x.item.sz?' · '+x.item.sz:'')+'</div>'+
        '<div class="card-bc">'+bc+'</div>'+
        '<div class="card-tags">'+
          '<span class="tag tag-loss">-£'+Math.round(x.totalLost)+' lost</span>'+
          '<span class="tag tag-day">-£'+Math.round(x.dayLoss)+'/day</span>'+
          (x.item.prc>0?'<span class="tag tag-info">£'+x.item.prc.toFixed(2)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="card-right">'+
        '<div class="card-loss">£'+Math.round(x.totalLost)+'</div>'+
        '<div class="card-dayloss">£'+Math.round(x.dayLoss)+'/day</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function openPanel(bc){
  var item=null;
  for(var b=0;b<3;b++){var p=bd[b].find(function(x){return x.bc===bc;});if(p&&!item)item=p;}
  if(!item)return;

  // Find all branch data
  var branches=[null,null,null];
  for(var b=0;b<3;b++){var p=bd[b].find(function(x){return x.bc===bc;});if(p)branches[b]=p;}

  var hero=document.getElementById('p-hero');
  var src=imgs[bc];
  if(src){hero.innerHTML='<img src="'+src+'" style="max-height:156px;max-width:100%;object-fit:contain">';}
  else{hero.innerHTML='<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';}

  document.getElementById('p-name').textContent=item.nm+(item.sz?' · '+item.sz:'');
  document.getElementById('p-dept').textContent=item.dp||'—';
  document.getElementById('p-bc').textContent=bc||'—';
  document.getElementById('p-prc').textContent=item.prc>0?'£'+item.prc.toFixed(2):'—';

  // Calculate for all out-of-stock branches
  var worstAge=0,worstDay=0,worstTotal=0;
  branches.forEach(function(p){
    if(!p||p.qty>0||p.ls==='Never')return;
    var age=dSince(p.ls);
    var r=dailyRate(age);
    var dl=item.prc>0?r*item.prc:0;
    if(dl>worstDay){worstAge=age;worstDay=dl;worstTotal=dl*age;}
  });
  document.getElementById('p-day').textContent=worstDay>0?'£'+Math.round(worstDay)+'/day':'—';
  document.getElementById('p-tot').textContent=worstTotal>0?'£'+Math.round(worstTotal):'—';

  var bhtml='<div class="p-branch-title">Stock by branch</div>';
  branches.forEach(function(p,i){
    bhtml+='<div class="p-brow"><span class="p-bchip '+URLS[i].chip+'">'+URLS[i].name+'</span>';
    if(!p){bhtml+='<span style="color:#333;font-size:11px">Not stocked</span></div>';return;}
    var qc=p.qty>0?'#4ade80':'#f87171';
    var qs=p.qty>0?p.qty+' in stock':'OUT of stock';
    bhtml+='<div style="flex:1"><div style="font-size:11px;font-weight:600;color:'+qc+'">'+qs+'</div>';
    bhtml+='<div style="font-size:9px;color:#444;margin-top:1px">Last sold: '+p.ls+'</div></div>';
    bhtml+='<span style="font-size:14px;font-weight:700;color:'+qc+';font-family:monospace">'+p.qty+'</span>';
    bhtml+='</div>';
  });
  document.getElementById('p-branches').innerHTML=bhtml;
  document.getElementById('pov').classList.add('open');
}

// ── CONTROLS ──────────────────────────────────────────────────
document.getElementById('btabs').addEventListener('click',function(e){
  var t=e.target.closest('.btab');if(!t)return;
  document.querySelectorAll('.btab').forEach(function(b){b.classList.remove('on');});
  t.classList.add('on');
  filterBranch=parseInt(t.dataset.b);
  render();
});

document.getElementById('filter-row').addEventListener('click',function(e){
  var p=e.target.closest('.fpill');if(!p)return;
  document.querySelectorAll('.fpill').forEach(function(b){b.classList.remove('on');});
  p.classList.add('on');
  filterDays=parseInt(p.dataset.d);
  render();
});

document.getElementById('refbtn').addEventListener('click',function(){
  loaded=0;bd=[[],[],[]];
  document.getElementById('out').innerHTML='<div class="loading"><div class="spin"></div>Refreshing…</div>';
  startApp();
});

document.getElementById('pov').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// ── START — parallel load all 3 ──────────────────────────────
function startApp(){
  document.getElementById('stime').textContent='loading…';
  Promise.all([loadBranch(0),loadBranch(1),loadBranch(2)]);
}

(function(){
  var ts=localStorage.getItem('cc_ls_ts');
  if(ts&&Date.now()-parseInt(ts)<8*3600*1000)startApp();
})();
</script>
</body>
