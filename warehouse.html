<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Warehouse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --red:#cc0000;--redbg:#fff0f0;--redtxt:#991b1b;
  --green:#15803d;--greenbg:#f0fdf4;--greentxt:#14532d;
  --amber:#b45309;--amberbg:#fffbeb;--ambertxt:#92400e;
  --purple:#6d28d9;--purplebg:#ede9fe;--purpletxt:#4c1d95;
  --blue:#1d4ed8;--bluebg:#eff6ff;--bluetxt:#1e3a8a;
  --bg:#f0f0f0;--s1:#fff;--border:#e0e0e0;
  --ink:#111;--sub:#777;--r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}

/* HEADER */
.hdr{background:var(--purple);padding:12px 14px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--purple)}
.title{color:#fff;font-size:17px;font-weight:700;margin-left:9px}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;font-family:monospace;margin-left:9px}
.refresh-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}

/* TROLLEY LEGEND */
.trolley{background:rgba(255,255,255,.12);border-radius:10px;padding:10px 12px}
.trolley-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.trolley-boxes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tbox{border-radius:8px;padding:7px 5px;text-align:center;border:2px solid}
.tbox-c{background:#fff3e0;border-color:#fb923c}
.tbox-x{background:var(--greenbg);border-color:#4ade80}
.tbox-r{background:var(--bluebg);border-color:#60a5fa}
.tbox-icon{font-size:15px;margin-bottom:2px}
.tbox-lbl{font-size:9px;font-weight:700}
.tbox-c .tbox-lbl{color:#b45309}
.tbox-x .tbox-lbl{color:var(--green)}
.tbox-r .tbox-lbl{color:var(--blue)}

/* SYNC BAR */
.sync-bar{display:flex;align-items:center;background:var(--greenbg);border-bottom:1px solid var(--border);padding:3px 10px;min-height:22px}
.sync-txt{font-size:10px;color:var(--green);font-weight:600;flex:1}
.sync-btn{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid var(--green);background:var(--greenbg);color:var(--green);cursor:pointer;font-family:var(--font)}

/* TIMER BAR */
.timer-bar{background:var(--purplebg);border-bottom:1px solid var(--border);padding:7px 12px;display:none}
.timer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.timer-txt{font-size:12px;font-weight:700;color:var(--purpletxt)}
.timer-meta{font-size:10px;color:var(--sub)}
.timer-last{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--purplebg);color:var(--purpletxt);font-weight:600}

/* PROGRESS */
.prog-wrap{background:var(--s1);padding:8px 13px;border-bottom:1px solid var(--border)}
.prog-row{display:flex;align-items:center;gap:7px}
.prog-bar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .3s}
.prog-txt{font-size:11px;font-weight:700;color:var(--purpletxt);min-width:30px;text-align:right}
.prog-sub{font-size:10px;color:var(--sub);margin-top:3px}

/* BRANCH STATUS CARDS */
.branch-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:7px 10px;background:var(--bg)}
.bc-card{background:var(--s1);border-radius:9px;padding:8px 5px;text-align:center;border:1px solid var(--border)}
.bc-name{font-size:10px;font-weight:700;margin-bottom:5px}
.bc-stats{display:flex;justify-content:space-around}
.bc-stat-val{font-size:14px;font-weight:700;font-family:monospace;line-height:1}
.bc-stat-lbl{font-size:7px;color:var(--sub);text-transform:uppercase;margin-top:1px}

/* SECTION HEADERS */
.sec-hdr{padding:11px 13px 3px}
.sec-title{font-size:19px;font-weight:700}
.sec-sub{font-size:10px;color:var(--sub);margin-top:2px;line-height:1.5}

/* DEPT HEADER */
.pk-dept{padding:7px 13px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pk-dept-name{font-size:13px;font-weight:700}
.pk-dept-sub{font-size:9px;color:var(--sub)}

/* PICK ROW */
.pk-row{background:var(--s1);border-bottom:1px solid var(--border);padding:9px 11px 11px}
.pk-row.all-done{background:var(--greenbg)}
.pk-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pk-img{width:44px;height:44px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pk-img img{width:44px;height:44px;object-fit:cover}
.pk-info{flex:1;min-width:0}
.pk-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.pk-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:3px}
.pk-tags{display:flex;gap:3px;flex-wrap:wrap}
.pk-tag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600}
.pk-tag-wh{background:var(--purplebg);color:var(--purpletxt)}
.pk-tag-dead{background:var(--redbg);color:var(--redtxt)}
.pk-tag-slow{background:var(--amberbg);color:var(--ambertxt)}
.pk-tag-fast{background:var(--greenbg);color:var(--greentxt)}
.pk-tag-price{background:var(--bg);color:var(--sub)}

/* SCAN-OUT TOTAL */
.pk-scanout{text-align:center;flex-shrink:0;min-width:52px;background:var(--purplebg);border-radius:9px;padding:5px 4px}
.pk-scanout .so-num{font-size:21px;font-weight:700;color:var(--purpletxt);font-family:monospace;line-height:1}
.pk-scanout .so-lbl{font-size:7px;color:var(--purpletxt);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;font-weight:700}
.pk-scanout.done{background:var(--greenbg)}
.pk-scanout.done .so-num,.pk-scanout.done .so-lbl{color:var(--green)}
.pk-scanout{cursor:pointer;-webkit-tap-highlight-color:transparent}
.pk-rowbar{height:5px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden}
.pk-rowbar-fill{height:100%;width:0;background:var(--green);border-radius:3px;transition:width .25s}
.zoomable{cursor:zoom-in}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
#lightbox img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.brand-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.brand-caret{font-size:11px;color:var(--sub);width:12px;flex-shrink:0}
.brand-name{font-weight:800;font-size:14px;color:var(--ink);flex:1;letter-spacing:.3px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.brand-meta{font-size:10px;color:var(--sub);font-family:monospace;flex-shrink:0}
.brand-prog{font-size:10px;font-weight:700;font-family:monospace;color:var(--purpletxt);background:var(--purplebg);border-radius:10px;padding:2px 7px;flex-shrink:0}
.brand-prog.done{color:var(--green);background:var(--greenbg)}
.brand-body.collapsed{display:none}
.wh-bulk{display:flex;gap:8px;padding:6px 11px 2px}
.wh-bulk button{flex:1;background:var(--card2,#f5f5f5);border:1px solid var(--border);border-radius:8px;padding:6px;font-size:11px;font-weight:600;color:var(--ink);cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.wh-tabs{display:flex;gap:6px;padding:8px 11px 2px}
.wh-tab{flex:1;background:var(--card2,#f5f5f5);border:1px solid var(--border);border-radius:9px;padding:9px 6px;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.wh-tab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.wh-tab-n{font-size:10px;background:rgba(0,0,0,.12);border-radius:8px;padding:1px 6px;font-family:monospace}
.wh-tab.active .wh-tab-n{background:rgba(255,255,255,.25)}
.brand-loc{font-size:9px;font-weight:700;font-family:monospace;color:var(--purpletxt);background:var(--purplebg);border-radius:6px;padding:1px 6px;margin-right:2px;flex-shrink:0;white-space:nowrap}
.map-wrap{padding:10px 11px 4px}
.map-intro{font-size:12px;color:var(--sub);line-height:1.4;margin-bottom:10px;background:var(--s1,#fff);border:1px solid var(--border);border-radius:9px;padding:9px 11px}
.map-sec{background:var(--s1,#fff);border:1px solid var(--border);border-radius:11px;padding:10px;margin-bottom:10px}
.map-sec-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.map-sec-no{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
.map-sec-name{flex:1;min-width:0;font-weight:700;font-size:14px;border:1px solid var(--border);border-radius:7px;padding:7px 9px;font-family:var(--font);color:var(--ink);background:var(--bg)}
.map-row{border:1px dashed var(--border);border-radius:9px;padding:8px;margin-bottom:7px;background:var(--bg)}
.map-row-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.map-row-name{flex:1;min-width:0;font-weight:600;font-size:13px;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-family:var(--font);color:var(--ink);background:#fff}
.map-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.map-chip{display:inline-flex;align-items:center;gap:5px;background:var(--purplebg);color:var(--purpletxt);border-radius:20px;padding:3px 5px 3px 10px;font-size:11px;font-weight:700}
.map-chip button{border:none;background:rgba(0,0,0,.12);color:inherit;border-radius:50%;width:16px;height:16px;cursor:pointer;font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
.map-addbrand{display:flex;gap:6px}
.map-brand-in{flex:1;min-width:0;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--ink)}
.map-addbrand button,.map-addrow,.map-addsec{background:var(--card2,#f5f5f5);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.map-addrow{width:100%;margin-top:2px}
.map-addsec{width:100%;background:var(--purple);color:#fff;border-color:var(--purple);padding:11px;font-size:13px;margin-bottom:14px}
.map-del{background:none;border:none;color:#c0392b;font-weight:700;cursor:pointer;font-size:14px;flex-shrink:0;padding:4px}
.map-del.sm{font-size:11px;color:var(--sub);font-weight:600}

/* PICK STRIP — horizontal 3 column */
.pk-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pk-cell-ns{border-radius:9px;padding:8px 5px;border:2px dashed #e8a3a3;background:#fdf3f3;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.pk-cell-ns .pc-bl{font-size:11px;font-weight:700;color:#b91c1c}
.pc-ns-x{font-size:20px;font-weight:800;color:#dc2626;line-height:1}
.pc-ns-lbl{font-size:9px;color:#b91c1c;text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.pk-cell{border-radius:9px;padding:8px 5px;border:2px solid;text-align:center;cursor:pointer;user-select:none;position:relative;transition:background .1s,border .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pk-cell-c{border-color:#fbd5aa;background:#fff8f0}
.pk-cell-x{border-color:#a7f3c8;background:#f0fdf6}
.pk-cell-r{border-color:#bfdbfe;background:#eff6ff}
.pk-cell-c.on{border-color:#fb923c;background:#fff3e0}
.pk-cell-x.on{border-color:#4ade80;background:var(--greenbg)}
.pk-cell-r.on{border-color:#60a5fa;background:#dbeafe}
.pc-tdot{position:absolute;top:4px;right:4px;width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:7px;background:var(--s1)}
.pk-cell.on .pc-tdot{background:var(--green);border-color:var(--green);color:#fff}
.pc-bl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.pk-cell-c .pc-bl{color:#b45309}
.pk-cell-x .pc-bl{color:var(--green)}
.pk-cell-r .pc-bl{color:var(--blue)}
.pc-has{font-size:8px;color:var(--sub);font-family:monospace;margin-bottom:2px}
.pc-num{font-size:20px;font-weight:700;font-family:monospace;line-height:1}
.pk-cell-c .pc-num{color:#b45309}
.pk-cell-x .pc-num{color:var(--green)}
.pk-cell-r .pc-num{color:var(--blue)}
.pc-qrow{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:2px}
.pc-qbtn{width:22px;height:22px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:14px;font-weight:700;line-height:1;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;padding:0}
.pc-qbtn:active{background:var(--border)}
.wh-target{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--s1,#fff);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin:8px 11px}
.wh-target-lbl{font-size:12px;font-weight:600;color:var(--ink)}
.wh-target-ctl{display:flex;align-items:center;gap:6px}
.wh-tbtn{width:26px;height:26px;border:1px solid var(--border);background:var(--card2,#f5f5f5);border-radius:6px;font-size:15px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.wh-tval{font-size:18px;font-weight:700;font-family:monospace;min-width:22px;text-align:center}
.wh-target-note{font-size:10px;color:var(--sub);flex-basis:100%;line-height:1.3}
.pc-sub{font-size:7px;color:var(--sub);text-transform:uppercase;margin-top:2px}
.pc-full{font-size:17px;font-weight:700;color:var(--green)}
.pc-low{font-size:17px;font-weight:700;color:var(--sub)}
/* Badge for 0 or low qty in branches */
.pc-badge{display:inline-block;border-radius:4px;font-size:7px;font-weight:700;padding:1px 4px;margin-bottom:2px}
.pc-badge-out{background:var(--redbg);color:var(--redtxt)}
.pc-badge-low{background:var(--amberbg);color:var(--ambertxt)}

/* WA BUTTON */
.wa-footer{background:var(--s1);border-top:1px solid var(--border);padding:9px 13px 18px;margin-top:12px}
.wa-row{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:6px}
.wa-btn{width:100%;background:#25d366;color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px}
.wa-btn-purple{background:var(--purple)}

/* LOADING */
.loading{padding:46px 14px;text-align:center;color:var(--sub);font-size:12px;line-height:2}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:36px 14px;text-align:center;color:var(--sub);font-size:12px;line-height:2}

/* SYSCHECK PANEL */
.sc-panel{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:none;max-width:480px;margin:0 auto}
.sc-panel.open{display:block}
.sc-body{position:absolute;bottom:0;left:0;right:0;background:var(--s1);border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;padding-bottom:30px}
.sc-handle{width:34px;height:3px;background:var(--border);border-radius:2px;margin:11px auto 0}
.sc-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sc-title{font-size:15px;font-weight:700}
.sc-close{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--bg);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sc-overall{margin:8px 12px;border-radius:10px;padding:11px 13px;border:2px solid}
.sc-overall.ok{background:var(--greenbg);border-color:#86efac}
.sc-overall.warn{background:var(--amberbg);border-color:#fcd34d}
.sc-overall.error{background:var(--redbg);border-color:#fca5a5}
.sc-overall-title{font-size:13px;font-weight:700}
.sc-overall-sub{font-size:10px;margin-top:2px;line-height:1.4;color:var(--sub)}
.sc-branch{background:var(--s1);border-radius:10px;margin:6px 12px;border:1px solid var(--border);overflow:hidden}
.sc-branch-hdr{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sc-branch-name{font-size:12px;font-weight:700}
.sc-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.sc-badge.ok{background:var(--greenbg);color:var(--green)}
.sc-badge.warn{background:var(--amberbg);color:var(--amber)}
.sc-badge.error{background:var(--redbg);color:var(--red)}
.sc-row{padding:6px 12px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;font-size:10px}
.sc-row:last-child{border-bottom:none}
.sc-lbl{color:var(--sub)}
.sc-val{font-weight:600;font-family:monospace}
.sc-val.ok{color:var(--green)}
.sc-val.warn{color:var(--amber)}
.sc-val.err{color:var(--red)}
.sc-issue{padding:6px 12px;font-size:10px;font-weight:600;border-bottom:0.5px solid var(--border)}
.sc-issue.warn{background:var(--amberbg);color:var(--ambertxt)}
.sc-issue.error{background:var(--redbg);color:var(--redtxt)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div style="display:flex;align-items:center">
      <div class="logo">CC</div>
      <div>
        <div class="title" style="margin-left:9px">🏭 Warehouse Manager</div>
        <div class="hdr-sub" id="stime" style="margin-left:9px">loading…</div>
      </div>
    </div>
    <button onclick="location.href='picco.html?branch=warehouse'" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:6px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);margin-right:6px">🔎 PICCO</button><button onclick="document.getElementById('sc-panel').classList.add('open');runSysCheck();" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:6px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);margin-right:6px">📡</button><button class="refresh-btn" id="refresh-btn">↺ Refresh</button>
  </div>
  <div class="trolley">
    <div class="trolley-title">🛒 Picking trolley — 3 colour-coded boxes</div>
    <div class="trolley-boxes">
      <div class="tbox tbox-c"><div class="tbox-icon">🟠</div><div class="tbox-lbl">Chapeltown</div></div>
      <div class="tbox tbox-x"><div class="tbox-icon">🟢</div><div class="tbox-lbl">City Center</div></div>
      <div class="tbox tbox-r"><div class="tbox-icon">🔵</div><div class="tbox-lbl">Roundhay</div></div>
    </div>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-txt" id="sync-txt"></div>
  <button class="sync-btn" id="sync-btn">↺ Sync now</button>
</div>

<div class="timer-bar" id="timer-bar">
  <div class="timer-row" id="timer-row"><span class="timer-txt">⏱ 0s</span></div>
  <div style="margin-top:4px">

  <div class="bc-card"><div class="bc-name" style="color:var(--green)">City Center</div><div class="bc-stats"><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">Neg</div></div><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">OOS</div></div><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">Picks</div></div></div></div>
  <div class="bc-card"><div class="bc-name" style="color:var(--blue)">Roundhay</div><div class="bc-stats"><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">Neg</div></div><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">OOS</div></div><div><div class="bc-stat-val" style="color:var(--sub)">…</div><div class="bc-stat-lbl">Picks</div></div></div></div>

<div id="out"><div class="loading"><div class="spin"></div>Loading all branches…</div></div>

<script>
var WA='447305505976';
var SPLIT={0:12,1:12,2:6}; // chapy, city, roundhay targets

var BR=[
  {id:'chapy',    name:'Chapeltown',short:'Chap',color:'#fb923c',url:'/api/stock-data?branch=chapy'},
  {id:'city',     name:'City Center',short:'City',color:'#4ade80',url:'/api/stock-data?branch=city'},
  {id:'roundhay', name:'Roundhay',   short:'Roun',color:'#60a5fa',url:'/api/stock-data?branch=roundhay'},
  {id:'warehouse',name:'Warehouse',  short:'WH',  color:'#a78bfa',url:'/api/stock-data?branch=warehouse'},
];
var VURL='/api/vendors'; // Vercel function: live barcode->vendor map straight from Shopify Admin API
var vmap={};
var IURL='/api/stock-data?branch=shopify-images'; // ShopifyImages tab — updated daily by Apps Script

var bd=[null,null,null,null],bm=[{},{},{},{}],imgs={},shopifyData={},loaded=0;
var pkTx={};
try{pkTx=JSON.parse(localStorage.getItem('cc_pk_ticks')||'{}');}catch(e){}
// editable warehouse send quantities: whQty[bc] = [n,n,n]; and top-up target (default 7)
var whQty={};try{whQty=JSON.parse(localStorage.getItem('cc_wh_qty')||'{}');}catch(e){}
var whNS={0:{},1:{},2:{}};
function whNSat(bi,bc){return !!(whNS[bi]&&whNS[bi][bc]);}
async function loadNS(){try{var r=await Promise.all([syncLoad('cc_whns0'),syncLoad('cc_whns1'),syncLoad('cc_whns2')]);whNS={0:r[0]||{},1:r[1]||{},2:r[2]||{}};}catch(e){}}
var pickCounts=[0,0,0];
var brandCollapsed={};try{brandCollapsed=JSON.parse(localStorage.getItem('cc_wh_brandcollapsed')||'{}');}catch(e){}
var whTab=(function(){try{var v=localStorage.getItem('cc_wh_tab');return (v==='oos'||v==='topup'||v==='map')?v:'topup';}catch(e){return 'topup';}})();
var whMapData={sections:[]};try{whMapData=JSON.parse(localStorage.getItem('cc_wh_map')||'{"sections":[]}');if(!whMapData.sections)whMapData.sections=[];}catch(e){whMapData={sections:[]};}
function saveMap(){try{localStorage.setItem('cc_wh_map',JSON.stringify(whMapData));}catch(e){}if(typeof syncSave==='function')syncSave('cc_wh_map',whMapData);}
function brandPosMap(){var m={};(whMapData.sections||[]).forEach(function(sec,si){(sec.rows||[]).forEach(function(row,ri){(row.brands||[]).forEach(function(b){var k=(''+b).toUpperCase();if(!(k in m))m[k]={s:si,r:ri,label:(sec.name||('S'+(si+1)))+' \u00b7 '+(row.name||('R'+(ri+1)))};});});});return m;}
function whAllBrands(){var s={};(bd[3]||[]).forEach(function(p){if(p.bc&&p.nm)s[brandOf(p.nm,p.bc)]=1;});return Object.keys(s).sort();}
// brand is derived from the product name (no brand field in EPOS). Aliases merge split/multi-word brands.
var BRAND_ALIASES={'CHER':'CHERISH','BLUE':'BLUE MAGIC','SHEA':'SHEA MOISTURE','JUST':'JUST 4 ME','KERA':'KERACARE','KERACARE':'KERACARE','AUNT':'AUNT JACKIES','JANET':'JANET COLLECTION'};
var VENDOR_SKIP={'':1,'CCHAIRANDBEAUTY':1,'CC HAIR AND BEAUTY':1,'CC HAIR & BEAUTY':1};
// brand from a Shopify vendor string: first word (collapses "Redken Extreme"->REDKEN), then alias cleanup
function vendorBrand(v){
  if(!v)return '';
  var V=(''+v).trim().toUpperCase();
  if(VENDOR_SKIP[V])return '';
  var first=(V.split(/\s+/)[0]||'').replace(/[^A-Z0-9&\/+-]/g,'');
  if(!first||/^[0-9]+$/.test(first))return '';
  return BRAND_ALIASES[first]||first;
}
function brandOf(nm,bc){
  if(bc&&vmap[bc]){var vb=vendorBrand(vmap[bc]);if(vb)return vb;}
  if(!nm)return 'OTHER';
  var w=(''+nm).trim().toUpperCase().split(/\s+/);
  var first=(w[0]||'').replace(/[^A-Z0-9&\/+-]/g,'');
  if(!first||/^[0-9]+$/.test(first))first=((w[1]||'OTHER').replace(/[^A-Z0-9&\/+-]/g,''))||'OTHER';
  return BRAND_ALIASES[first]||first;
}
function loadTarget(){var v=parseInt(localStorage.getItem('cc_wh_target'));return (isNaN(v)||v<1)?7:v;}
function saveTarget(v){try{localStorage.setItem('cc_wh_target',String(v));}catch(e){}}

// ── TIMER ──────────────────────────────────────────────────
var tmr={on:false,start:0,last:0,count:0,gaps:[],iv:null};
function tmrPick(){
  var now=Date.now();
  if(!tmr.on){tmr.on=true;tmr.start=now;tmr.last=now;tmr.count=0;tmr.gaps=[];document.getElementById('timer-bar').style.display='block';tmr.iv=setInterval(tmrUpdate,1000);}
  if(tmr.last)tmr.gaps.push(now-tmr.last);
  tmr.last=now;tmr.count++;
  tmrUpdate();
}
function tmrReset(){
  tmr.on=false;tmr.start=0;tmr.count=0;tmr.gaps=[];
  clearInterval(tmr.iv);
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('timer-row').innerHTML='<span class="timer-txt">⏱ 0s</span>';
}
function tmrUpdate(){
  var el=document.getElementById('timer-row');if(!el||!tmr.start)return;
  var total=Date.now()-tmr.start;
  var avg=tmr.gaps.length?tmr.gaps.reduce(function(a,b){return a+b;})/tmr.gaps.length:0;
  var last=tmr.gaps.length?tmr.gaps[tmr.gaps.length-1]:0;
  el.innerHTML='<span class="timer-txt">⏱ '+fmt(total)+' picking</span>'+
    '<span class="timer-meta">'+tmr.count+' done</span>'+
    (avg>0?'<span class="timer-meta">avg '+fmt(avg)+'/item</span>':'')+
    (last>0?'<span class="timer-last">last: '+fmt(last)+'</span>':'');
}
function fmt(ms){var s=Math.floor((ms||0)/1000),m=Math.floor(s/60),h=Math.floor(m/60);m=m%60;s=s%60;return(h>0?h+'h ':'')+(m>0?m+'m ':'')+s+'s';}

// ── SYNC ───────────────────────────────────────────────────
var syncOk=true,syncPend=null;
async function syncLoad(k){
  try{var r=await fetch('/api/ticks?key='+k,{signal:AbortSignal.timeout(3000)});var d=await r.json();if(d.fallback){syncOk=false;return null;}return d.data||null;}
  catch(e){syncOk=false;return null;}
}
function syncSave(k,v){
  if(!syncOk)return;
  if(syncPend)clearTimeout(syncPend);
  syncPend=setTimeout(function(){
    fetch('/api/ticks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,value:v})}).catch(function(){});
    syncPend=null;setSyncTxt('✓ Synced');
  },500);
}
function setSyncTxt(t){var el=document.getElementById('sync-txt');if(!el)return;el.textContent=t;clearTimeout(el._t);el._t=setTimeout(function(){el.textContent='';},3000);}
async function doSync(){
  setSyncTxt('Syncing…');
  var shared=await syncLoad('cc_pk_ticks');
  if(shared){Object.keys(shared).forEach(function(k){if(!pkTx[k])pkTx[k]=shared[k];else for(var i=0;i<3;i++){if(shared[k][i])pkTx[k][i]=true;}});}
  try{localStorage.setItem('cc_pk_ticks',JSON.stringify(pkTx));}catch(e){}
  setSyncTxt(syncOk?'✓ Synced':'Offline — local only');
  if(loaded>=4)renderWH();
}

// ── HELPERS ────────────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}
function pD(s){if(!s||s==='Never'||s==='NULL')return null;var p=s.split('/');if(p.length===3){var d=new Date(+p[2],+p[1]-1,+p[0]);return isNaN(d)?null:d;}return null;}
function dAgo(s){var d=pD(s);return d?Math.floor((Date.now()-d)/86400000):null;}
function getQty(bi,bc){var p=bm[bi]?bm[bi][bc]:null;return p?p.qty:0;}
function imgPH(){return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';}
function imgErr(img){try{img.outerHTML=imgPH();}catch(e){img.style.display='none';}}
function imgEl(bc,sz){sz=sz||44;if(imgs[bc])return '<img src="'+imgs[bc]+'" loading="lazy" data-full="'+imgs[bc]+'" class="zoomable" onerror="imgErr(this)" style="width:'+sz+'px;height:'+sz+'px;object-fit:cover">';return imgPH();}

// ── DEAD STOCK CLASSIFIER (uses branch sales, not WH) ──────
// Warehouse has no till — LastSold there is meaningless
// Use most recent sale across all 3 branches instead
function gst(bc,whProd){
  var minDays=9999;
  for(var b=0;b<3;b++){
    var bp=bm[b]?bm[b][bc]:null;
    if(bp&&bp.ls&&bp.ls!=='Never'&&bp.ls!=='NULL'){
      var d=dAgo(bp.ls);
      if(d!==null&&d<minDays)minDays=d;
    }
  }
  if(minDays===9999||minDays>=90)return{type:'dead',d:minDays===9999?null:minDays};
  if(minDays>=30)return{type:'slow',d:minDays};
  return{type:'fast',d:minDays};
}

// ── SMART SPLIT (priority to lowest-stock branch) ──────────
function whSplit(bc,whQty){
  var needs=[
    {i:0,need:Math.max(0,SPLIT[0]-getQty(0,bc)),cur:getQty(0,bc)},
    {i:1,need:Math.max(0,SPLIT[1]-getQty(1,bc)),cur:getQty(1,bc)},
    {i:2,need:Math.max(0,SPLIT[2]-getQty(2,bc)),cur:getQty(2,bc)},
  ];
  needs.sort(function(a,b){return a.cur-b.cur;});
  var rem=whQty,res=[0,0,0];
  needs.forEach(function(n){if(n.need>0&&rem>0){var g=Math.min(n.need,rem);res[n.i]=g;rem-=g;}});
  return res;
}

// ── LOAD ───────────────────────────────────────────────────
async function loadImgs(){
  try{
    // 1 hour cache
    var cached=localStorage.getItem('cc_shopify_imgs');
    if(cached){
      var o=JSON.parse(cached);
      if(Date.now()-o.ts<60*60*1000){imgs=o.d;shopifyData=o.s||{};return;}
    }
    var r=await fetch(IURL);var t=await r.text();
    Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
      var bc=(row['Barcode']||'').trim();if(!bc)return;
      var url=(row['ImageURL']||'').trim();
      var status=(row['Status']||'').trim();
      shopifyData[bc]={on_shopify:true,has_image:status==='HAS_IMAGE',image_url:url||null};
      if(url&&url.startsWith('http'))imgs[bc]=url;
    });
    try{localStorage.setItem('cc_shopify_imgs',JSON.stringify({ts:Date.now(),d:imgs,s:shopifyData}));}catch(e){}
  }catch(e){}
}
async function loadVendors(){
  try{
    var cached=localStorage.getItem('cc_shopify_vendors');
    if(cached){var o=JSON.parse(cached);if(Date.now()-o.ts<60*60*1000){vmap=o.d||{};return;}}
    var r=await fetch(VURL);var t=await r.text();var m={};var tr=t.trim();
    if(tr.charAt(0)==='{'){                         // JSON {barcode:vendor} from /api/vendors
      try{var obj=JSON.parse(tr);if(obj&&!obj.error){Object.keys(obj).forEach(function(bc){var v=(''+obj[bc]).trim();if(bc&&v)m[bc]=v;});}}catch(e){}
    }else{                                          // CSV fallback (Barcode/Variant Barcode + Vendor)
      Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
        var bc=(row['Barcode']||row['Variant Barcode']||'').trim();if(!bc)return;
        var v=(row['Vendor']||'').trim();if(v)m[bc]=v;
      });
    }
    if(Object.keys(m).length){vmap=m;try{localStorage.setItem('cc_shopify_vendors',JSON.stringify({ts:Date.now(),d:vmap}));}catch(e){}if(loaded>=4)renderWH();}
  }catch(e){}
}
async function loadBranch(i){
  try{
    var r=await fetch(BR[i].url);var t=await r.text();
    bd[i]=Papa.parse(t,{header:true,skipEmptyLines:true}).data.map(function(row){
      var ls=cl(row['LastSold']);
      return{bc:cl(row['Barcode']),nm:cl(row['ProductName']),sz:cl(row['Size']),
             qty:parseInt(row['StockQty'])||0,prc:parseFloat(row['Price'])||0,
             dp:cl(row['Department']),ls:(ls&&ls!=='NULL')?ls:'Never'};
    }).filter(function(p){return p.bc&&p.nm;});
    bm[i]={};bd[i].forEach(function(p){if(p.bc)bm[i][p.bc]=p;});
  }catch(e){bd[i]=[];}
  loaded++;
  var t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('stime').textContent=loaded<4?'loading '+loaded+'/4…':'live · '+t;
  updateBranchCards();
  if(loaded>=4)renderWH();
}

function updateBranchCards(){
  var bColors=['#b45309','var(--green)','var(--blue)'];
  var bNames=['Chapeltown','City Center','Roundhay'];
  var cards=document.getElementById('branch-cards');
  if(!cards)return;
  var html='';
  [0,1,2].forEach(function(bi){
    var data=bd[bi]||[];
    var neg=data.filter(function(p){return p.qty<0;}).length;
    var oos=data.filter(function(p){return p.qty===0&&p.ls&&p.ls!=='Never';}).length;
    var picks=(typeof pickCounts!=='undefined'&&pickCounts[bi])||0;  // items needing picking for this branch
    var nc=neg>0?'var(--red)':'var(--green)';
    html+='<div class="bc-card">'+
      '<div class="bc-name" style="color:'+bColors[bi]+'">'+bNames[bi]+'</div>'+
      '<div class="bc-stats">'+
        '<div><div class="bc-stat-val" style="color:'+nc+'">'+neg+'</div><div class="bc-stat-lbl">Neg</div></div>'+
        '<div><div class="bc-stat-val" style="color:var(--amber)">'+oos+'</div><div class="bc-stat-lbl">OOS</div></div>'+
        '<div><div class="bc-stat-val" style="color:var(--purpletxt)">'+picks+'</div><div class="bc-stat-lbl">To Pick</div></div>'+
      '</div>'+
    '</div>';
  });
  cards.innerHTML=html;
}

// ── BUILD PICK LIST ─────────────────────────────────────────
function buildPickList(){
  var whData=bd[3];if(!whData)return{dead:[],normal:[]};
  var T=loadTarget();
  var dead=[],normal=[];
  whData.forEach(function(p){
    if(!p.bc||!p.nm||p.qty<=0)return;
    var st=gst(p.bc,p);
    var tgts=[T,T,T];
    var c=[getQty(0,p.bc),getQty(1,p.bc),getQty(2,p.bc)];
    var need=[Math.max(0,T-c[0]),Math.max(0,T-c[1]),Math.max(0,T-c[2])];
    if(whNSat(0,p.bc))need[0]=0;if(whNSat(1,p.bc))need[1]=0;if(whNSat(2,p.bc))need[2]=0;
    if(need[0]+need[1]+need[2]<=0)return;
    var sp;
    if(whQty[p.bc]){
      var o=whQty[p.bc];
      sp=[Math.max(0,o[0]|0),Math.max(0,o[1]|0),Math.max(0,o[2]|0)];
      var tot=sp[0]+sp[1]+sp[2];
      if(tot>p.qty){var over=tot-p.qty;for(var k=2;k>=0&&over>0;k--){var cut=Math.min(sp[k],over);sp[k]-=cut;over-=cut;}}
    }else{
      var needs=[{i:0,n:need[0],c:c[0]},{i:1,n:need[1],c:c[1]},{i:2,n:need[2],c:c[2]}];
      needs.sort(function(a,b){return a.c-b.c;});
      var rem=p.qty;sp=[0,0,0];
      needs.forEach(function(n){if(n.n>0&&rem>0){var g=Math.min(n.n,rem);sp[n.i]=g;rem-=g;}});
    }
    if(whNSat(0,p.bc))sp[0]=0;if(whNSat(1,p.bc))sp[1]=0;if(whNSat(2,p.bc))sp[2]=0;
    var item={bc:p.bc,nm:p.nm,sz:p.sz,dp:p.dp||'General',prc:p.prc,wh:p.qty,st:st,bq:c,sp:sp,tgts:tgts};
    if(st.type==='dead')dead.push(item);else normal.push(item);
  });
  dead.sort(function(a,b){return a.nm.localeCompare(b.nm);});
  normal.sort(function(a,b){return a.nm.localeCompare(b.nm);});
  return{dead:dead,normal:normal};
}

// ── RENDER ─────────────────────────
// ---- LIVE Shopify photo backfill (shows the real photo for any product the daily
//      image sheet is missing; fail-soft if the endpoint is unavailable) ----
var existsCheck={}, __existsTried={};
(function(){try{localStorage.removeItem('cc_shop_exists');}catch(e){}})();
function verifyExists(barcodes,done){
  var todo=[];(barcodes||[]).forEach(function(bc){if(bc&&!__existsTried[bc]&&!imgs[bc]){__existsTried[bc]=1;todo.push(bc);}});
  if(!todo.length){if(done)done(false);return;}
  var batches=[];for(var i=0;i<todo.length;i+=30)batches.push(todo.slice(i,i+30));
  var changed=false,pending=batches.length;
  batches.forEach(function(group){
    fetch('/api/shopify/exists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({barcodes:group})})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(j){
        if(j&&j.results){Object.keys(j.results).forEach(function(bc){var info=j.results[bc]||{};existsCheck[bc]={exists:!!info.exists,hasImage:!!info.hasImage};if(info.exists){if(!shopifyData[bc])shopifyData[bc]={on_shopify:true,has_image:!!info.hasImage,image_url:info.imageUrl||null};if(info.imageUrl&&!imgs[bc]){imgs[bc]=info.imageUrl;changed=true;}}});}
        group.forEach(function(bc){if(!(bc in existsCheck))existsCheck[bc]={exists:false,hasImage:false};});
      })
      .catch(function(){})
      .then(function(){if(--pending===0){try{localStorage.setItem('cc_shopify_imgs',JSON.stringify({ts:Date.now(),d:imgs,s:shopifyData}));}catch(e){}if(done)done(changed);}});
  });
}
function backfillVisibleImages(){
  var el=document.getElementById('out'); if(!el)return;
  var need=[]; el.querySelectorAll('[data-bc]').forEach(function(r){var bc=r.getAttribute('data-bc'); if(bc&&!imgs[bc]&&!__existsTried[bc])need.push(bc);});
  if(!need.length)return;
  verifyExists(need,function(changed){if(changed&&typeof renderWH==='function')renderWH();});
}
function renderWH(){
  var el=document.getElementById('out');
  if(!bd[3]){el.innerHTML='<div class="loading"><div class="spin"></div>Loading warehouse…</div>';return;}
  var L=buildPickList(),allItems=L.dead.concat(L.normal);
  var oosList=allItems.filter(function(it){return Math.min(it.bq[0],it.bq[1],it.bq[2])<=0;});
  var tabBar='<div class="wh-tabs">'+
    '<button class="wh-tab'+(whTab==='topup'?' active':'')+'" data-tab="topup">⬆ Top up <span class="wh-tab-n">'+allItems.length+'</span></button>'+
    '<button class="wh-tab'+(whTab==='oos'?' active':'')+'" data-tab="oos">⚠ Out of stock <span class="wh-tab-n">'+oosList.length+'</span></button>'+
    '<button class="wh-tab'+(whTab==='map'?' active':'')+'" data-tab="map">🗺 Map</button>'+
  '</div>';
  function wireTabsBar(){el.querySelectorAll('.wh-tab').forEach(function(b){b.addEventListener('click',function(){whTab=this.dataset.tab;try{localStorage.setItem('cc_wh_tab',whTab);}catch(e){}renderWH();});});}
  if(whTab==='map'){
    el.innerHTML=tabBar+renderMapHTML();
    wireTabsBar();wireMap(el);
    return;
  }
  var list=(whTab==='oos')?oosList:allItems;
  var tp=[0,0,0],dp=[0,0,0];
  list.forEach(function(item){var t=pkTx[item.bc]||[false,false,false];for(var b=0;b<3;b++){if(item.sp[b]>0){tp[b]++;if(t[b])dp[b]++;}}});
  var totalCells=tp[0]+tp[1]+tp[2],doneCells=dp[0]+dp[1]+dp[2];
  var pct=totalCells>0?Math.round(doneCells/totalCells*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=doneCells+' of '+totalCells+' picks done · '+list.length+' products';
  pickCounts=tp.slice();
  updateBranchCards();
  var T=loadTarget();

  wrap.querySelectorAll('.map-brand-in').forEach(function(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addBrand(+this.dataset.s,+this.dataset.r,this);}});});

    b.addEventListener('click',function(){

function renderSection(items,dp,tp){
  var html='';
  items.slice().sort(function(a,b){return a.nm.localeCompare(b.nm);}).forEach(function(item){html+=mkRow(item);});
  return html;
}

function renderBrandGroups(all){
  var groups={};
  all.forEach(function(it){var b=brandOf(it.nm,it.bc);(groups[b]=groups[b]||[]).push(it);});
  var pos=brandPosMap();
  var brands=Object.keys(groups).sort(function(a,b){
    var pa=pos[a],pb=pos[b];
    if(pa&&pb){if(pa.s!==pb.s)return pa.s-pb.s;if(pa.r!==pb.r)return pa.r-pb.r;return a.localeCompare(b);}
    if(pa)return -1;if(pb)return 1;return a.localeCompare(b);
  });
  var html='';
  brands.forEach(function(b){
    var items=groups[b].slice().sort(function(x,y){return x.nm.localeCompare(y.nm);});
    var cells=0,done=0,pcs=0;
    items.forEach(function(it){var t=pkTx[it.bc]||[false,false,false];for(var k=0;k<3;k++){if(it.sp[k]>0){cells++;pcs+=it.sp[k];if(t[k])done++;}}});
    var coll=!!brandCollapsed[b], allDone=cells>0&&done===cells;
    var key=b.replace(/"/g,'');
    html+='<div class="brand-hdr" data-brand="'+key+'">'+
      '<span class="brand-caret">'+(coll?'▸':'▾')+'</span>'+
      (pos[b]?'<span class="brand-loc">'+pos[b].label+'</span>':'')+
      '<span class="brand-name">'+b+'</span>'+
      '<span class="brand-meta">'+items.length+' items · '+pcs+' pcs</span>'+
      '<span class="brand-prog'+(allDone?' done':'')+'">'+done+'/'+cells+'</span>'+
    '</div>'+
    '<div class="brand-body'+(coll?' collapsed':'')+'" data-brand="'+key+'">';
    items.forEach(function(it){html+=mkRow(it);});
    html+='</div>';
  });
  return html;
}

function mkRow(item){
  var t=pkTx[item.bc]||[false,false,false];
  var anyPick=(item.sp[0]+item.sp[1]+item.sp[2])>0;
  var allDone=anyPick;for(var b=0;b<3;b++){if(item.sp[b]>0&&!t[b])allDone=false;}
  var stag=item.st.type==='dead'?'<span class="pk-tag pk-tag-dead">☠ DEAD '+(item.st.d!==null?item.st.d+'d':'?')+'</span>':
           item.st.type==='slow'?'<span class="pk-tag pk-tag-slow">🐌 SLOW '+item.st.d+'d</span>':
           '<span class="pk-tag pk-tag-fast">⚡ FAST '+item.st.d+'d</span>';
  var BN=['Chapeltown','City','Roundhay'];
  var BC=['c','x','r'];
  var BCOL=['#b45309','var(--green)','var(--blue)'];
  var scan=item.sp[0]+item.sp[1]+item.sp[2];
  var html='<div class="pk-row'+(allDone?' all-done':'')+'" data-bc="'+item.bc+'">'+
    '<div class="pk-top">'+
      '<div class="pk-img">'+imgEl(item.bc,44)+'</div>'+
      '<div class="pk-info">'+
        '<div class="pk-name">'+item.nm+(item.sz?' · '+item.sz:'')+'</div>'+
        '<div class="pk-bc">'+item.bc+'</div>'+
        '<div class="pk-tags">'+
          '<span class="pk-tag pk-tag-wh">WH: '+item.wh+'</span>'+
          stag+
          (item.prc>0?'<span class="pk-tag pk-tag-price">£'+item.prc.toFixed(2)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="pk-scanout'+(allDone?' done':'')+'"><div class="so-num">'+scan+'</div><div class="so-lbl">'+(allDone?'✓ out':'scan out')+'</div></div>'+
    '</div>'+
    '<div class="pk-strip">';
  for(var bi=0;bi<3;bi++){
    if(whNSat(bi,item.bc)){html+='<div class="pk-cell-ns" data-bi="'+bi+'"><div class="pc-bl">'+BN[bi]+'</div><div class="pc-ns-x">✕</div><div class="pc-ns-lbl">not stocked</div></div>';continue;}
    var take=item.sp[bi],has=item.bq[bi],tgt=item.tgts[bi],ticked=!!(t[bi]);
    var badge=has<=0?'<div class="pc-badge pc-badge-out">OUT</div>':(has<tgt?'<div class="pc-badge pc-badge-low">LOW</div>':'');
    var hasLbl=has>=tgt?'has '+has+' ✓':'has '+has+' → '+tgt;
    html+='<div class="pk-cell pk-cell-'+BC[bi]+(ticked?' on':'')+'" data-bc="'+item.bc+'" data-bi="'+bi+'" data-take="'+(take>0?'1':'0')+'">'+
      '<div class="pc-tdot">'+(ticked?'✓':'')+'</div>'+
      '<div class="pc-bl">'+BN[bi]+'</div>'+
      badge+
      '<div class="pc-has">'+hasLbl+'</div>'+
      '<div class="pc-qrow">'+
        '<button class="pc-qbtn" data-bc="'+item.bc+'" data-bi="'+bi+'" data-d="-1">−</button>'+
        '<span class="pc-num" style="color:'+BCOL[bi]+'">'+take+'</span>'+
        '<button class="pc-qbtn" data-bc="'+item.bc+'" data-bi="'+bi+'" data-d="1">+</button>'+
      '</div>'+
      '<div class="pc-sub">'+(ticked?'packed':(take>0?'tap to pack':'—'))+'</div>'+
    '</div>';
  }
  html+='</div>';
  var rTot=0,rDone=0;for(var b2=0;b2<3;b2++){if(item.sp[b2]>0){rTot++;if(t[b2])rDone++;}}
  var rpct=rTot>0?Math.round(rDone/rTot*100):0;
  html+='<div class="pk-rowbar"><div class="pk-rowbar-fill" style="width:'+rpct+'%"></div></div></div>';
  return html;
}

function wireTicks(all){
  var el=document.getElementById('out');
  function findItem(bc){for(var i=0;i<all.length;i++)if(all[i].bc===bc)return all[i];return null;}
  function refreshRow(row){
    if(!row)return;
    var scan=0;row.querySelectorAll('.pc-num').forEach(function(n){scan+=parseInt(n.textContent)||0;});
    var sn=row.querySelector('.pk-scanout .so-num');if(sn)sn.textContent=scan;
    var cells=row.querySelectorAll('.pk-cell[data-take="1"]');var allDone=cells.length>0;
    cells.forEach(function(c){if(!c.classList.contains('on'))allDone=false;});
    row.classList.toggle('all-done',allDone);
    var __bar=row.querySelector('.pk-rowbar-fill');if(__bar){var __dd=0;cells.forEach(function(c){if(c.classList.contains('on'))__dd++;});__bar.style.width=(cells.length>0?Math.round(__dd/cells.length*100):0)+'%';}
    var __bd=row.closest('.brand-body');
    if(__bd){var __h=__bd.previousElementSibling;var __bc=__bd.querySelectorAll('.pk-cell[data-take="1"]');var __bdone=__bd.querySelectorAll('.pk-cell[data-take="1"].on').length;var __p=__h&&__h.querySelector('.brand-prog');if(__p){__p.textContent=__bdone+'/'+__bc.length;__p.classList.toggle('done',__bc.length>0&&__bdone===__bc.length);}}
    var so=row.querySelector('.pk-scanout');
    if(so){so.classList.toggle('done',allDone);var sl=so.querySelector('.so-lbl');if(sl)sl.textContent=allDone?'✓ out':'scan out';}
  }
  el.querySelectorAll('.pc-qbtn').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      var bc=this.dataset.bc,bi=+this.dataset.bi,d=+this.dataset.d;
      var item=findItem(bc);if(!item)return;
      var next=item.sp[bi]+d;if(next<0)next=0;
      var others=0;for(var k=0;k<3;k++)if(k!==bi)others+=item.sp[k];
      if(next+others>item.wh)next=Math.max(0,item.wh-others);
      item.sp[bi]=next;
      whQty[bc]=item.sp.slice();
      try{localStorage.setItem('cc_wh_qty',JSON.stringify(whQty));}catch(e){}
      if(typeof syncSave==='function')syncSave('cc_wh_qty',whQty);
      var cell=this.closest('.pk-cell');
      var num=cell.querySelector('.pc-num');if(num)num.textContent=next;
      cell.dataset.take=next>0?'1':'0';
      if(next<=0){
        if(pkTx[bc])pkTx[bc][bi]=false;
        try{localStorage.setItem('cc_pk_ticks',JSON.stringify(pkTx));}catch(e){}
        cell.classList.remove('on');var dot=cell.querySelector('.pc-tdot');if(dot)dot.textContent='';
      }
      var sub=cell.querySelector('.pc-sub');if(sub)sub.textContent=cell.classList.contains('on')?'packed':(next>0?'tap to pack':'—');
      refreshRow(cell.closest('.pk-row'));
      updateProgress();
    });
  });
  // tap the SCAN OUT box to pack/unpack the whole item at once
  el.querySelectorAll('.pk-scanout').forEach(function(box){
    box.addEventListener('click',function(){
      var row=this.closest('.pk-row');if(!row)return;
      var bc=row.dataset.bc;
      var cells=row.querySelectorAll('.pk-cell[data-take="1"]');
      if(!cells.length)return;
      var allDone=true;cells.forEach(function(c){if(!c.classList.contains('on'))allDone=false;});
      var mark=!allDone;
      if(!pkTx[bc])pkTx[bc]=[false,false,false];
      cells.forEach(function(c){var bi=+c.dataset.bi;pkTx[bc][bi]=mark;c.classList.toggle('on',mark);var dot=c.querySelector('.pc-tdot');if(dot)dot.textContent=mark?'✓':'';var sub=c.querySelector('.pc-sub');if(sub)sub.textContent=mark?'packed':'tap to pack';});
      try{localStorage.setItem('cc_pk_ticks',JSON.stringify(pkTx));}catch(e){}
      if(typeof syncSave==='function')syncSave('cc_pk_ticks',pkTx);
      refreshRow(row);updateProgress();updateBranchCards();
      if(mark&&typeof tmrPick==='function')tmrPick();
    });
  });
  el.querySelectorAll('.pk-cell').forEach(function(cell){
    cell.addEventListener('click',function(){
      var bc=this.dataset.bc,bi=+this.dataset.bi;
      var num=this.querySelector('.pc-num');var cur=num?(parseInt(num.textContent)||0):0;
      if(cur<=0)return;
      if(!pkTx[bc])pkTx[bc]=[false,false,false];
      var nowDone=!pkTx[bc][bi];
      pkTx[bc][bi]=nowDone;
      try{localStorage.setItem('cc_pk_ticks',JSON.stringify(pkTx));}catch(e){}
      if(typeof syncSave==='function')syncSave('cc_pk_ticks',pkTx);
      this.classList.toggle('on',nowDone);
      var dot=this.querySelector('.pc-tdot');if(dot)dot.textContent=nowDone?'✓':'';
      var sub=this.querySelector('.pc-sub');if(sub)sub.textContent=nowDone?'packed':'tap to pack';
      refreshRow(this.closest('.pk-row'));
      updateProgress();
      updateBranchCards();
      if(nowDone&&typeof tmrPick==='function')tmrPick();
    });
  });
}

function updateProgress(){
  var cells=document.querySelectorAll('.pk-cell[data-take="1"]');
  var done=document.querySelectorAll('.pk-cell[data-take="1"].on');
  var tot=cells.length,dn=done.length;
  var pct=tot>0?Math.round(dn/tot*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=dn+' of '+tot+' picks done';
  // Update dept counters
  document.querySelectorAll('.pk-dept').forEach(function(h){
    var dept=h.dataset.dept;
    var rows=[].filter.call(document.querySelectorAll('.pk-row'),function(r){
      var item=bd[3]&&bd[3].find(function(p){return p.bc===r.dataset.bc;});
      return item&&(item.dp||'General')===dept;
    });
    var picked=rows.filter(function(r){
      var bc=r.dataset.bc,t=pkTx[bc]||[false,false,false];
      var need=r.querySelectorAll('.pk-cell[data-take="1"]').length;
      var dn=r.querySelectorAll('.pk-cell[data-take="1"].on').length;
      return need>0&&need===dn;
    }).length;
    var sub=h.querySelector('.pk-dept-sub');
    if(sub)sub.textContent=picked+'/'+rows.length+' picked';
  });
}

function sendWA(all){
  var date=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  var time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  var sorted=all.slice().sort(function(a,b){return a.nm.localeCompare(b.nm);});
  var grandOut=all.reduce(function(s,it){return s+it.sp[0]+it.sp[1]+it.sp[2];},0);
  var msg='CC Warehouse Pick List\n'+date+' '+time+'\nTOTAL TO SCAN OUT: '+grandOut+' pcs\n\n';
  ['Chapeltown','City Center','Roundhay'].forEach(function(bn,bi){
    var bTotal=sorted.reduce(function(s,it){return s+(it.sp[bi]>0?it.sp[bi]:0);},0);
    msg+=bn.toUpperCase()+' ('+bTotal+' pcs):\n';
    sorted.forEach(function(item){if(item.sp[bi]>0)msg+='  '+item.nm+(item.sz?' ('+item.sz+')':'')+' x'+item.sp[bi]+'\n';});
    msg+='\n';
  });
  msg+='Sent from CC Warehouse App';
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
}

var SC_BRANCHES=[
  {id:'chapy',    name:'Chapeltown', color:'#fb923c',url:'/api/stock-data?branch=chapy',     logUrl:'/api/stock-data?branch=chapy-log'},
  {id:'city',     name:'City Center',color:'#22c55e',url:'/api/stock-data?branch=city',      logUrl:'/api/stock-data?branch=city-log'},
  {id:'roundhay', name:'Roundhay',   color:'#3b82f6',url:'/api/stock-data?branch=roundhay',  logUrl:'/api/stock-data?branch=roundhay-log'},
  {id:'warehouse',name:'Warehouse',  color:'#a78bfa',url:'/api/stock-data?branch=warehouse', logUrl:'/api/stock-data?branch=warehouse-log'},
];
var SC_STALE_WARN=2,SC_STALE_ERR=5;

function scParseDate(s){try{var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}catch(e){return null;}}
function scParseLogDate(s){
  // Handles TWO Apps Script formats:
  //   Branch scripts (UK):   "21/05/2026 17:34:27"  or  "21/05/2026, 17:34:27"
  //   Warehouse script (US): "5/21/2026, 5:13:01 PM" (M/D/YYYY 12hr with AM/PM)
  if(!s)return null;
  try{
    var clean=s.trim().replace(/,/g,'');     // drop any commas between date and time
    var parts=clean.split(/\s+/);            // [date, time, optional AM/PM]
    var dp=parts[0].split('/');
    if(dp.length!==3)return null;
    var tp=(parts[1]||'00:00:00').split(':');
    var hh=parseInt(tp[0])||0;
    var mm=parseInt(tp[1])||0;
    var ss=parseInt(tp[2])||0;
    var ampm=(parts[2]||'').toUpperCase();
    if(ampm==='PM'&&hh<12)hh+=12;
    if(ampm==='AM'&&hh===12)hh=0;
    var d1=parseInt(dp[0]),d2=parseInt(dp[1]),yr=parseInt(dp[2]);
    // If first segment > 12 it has to be a day (UK dd/MM); if second > 12 it has to be a day (US M/D).
    // When both are <=12 we use the AM/PM presence as a tiebreaker: AM/PM = US format.
    var day,mon;
    if(d1>12){day=d1;mon=d2;}                // unambiguous UK
    else if(d2>12){mon=d1;day=d2;}            // unambiguous US
    else if(ampm){mon=d1;day=d2;}             // AM/PM marker → US format
    else{day=d1;mon=d2;}                      // default to UK
    return new Date(yr,mon-1,day,hh,mm,ss);
  }catch(e){return null;}
}
function scDaysAgo(d){return d?Math.floor((Date.now()-d.getTime())/86400000):null;}
function scMinsAgo(d){return d?Math.floor((Date.now()-d.getTime())/60000):null;}
function scFmtDate(d){return d?d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'Unknown';}
function scFmtTimeAgo(d){
  if(!d)return'Unknown';
  var m=scMinsAgo(d);
  if(m<1)return'Just now';
  if(m<60)return m+' min'+(m===1?'':'s')+' ago';
  var h=Math.floor(m/60);
  if(h<24)return h+' hr'+(h===1?'':'s')+' ago';
  var dys=Math.floor(h/24);
  return dys+' day'+(dys===1?'':'s')+' ago';
}
function scFmtDateTime(d){
  if(!d)return'Unknown';
  var today=new Date();today.setHours(0,0,0,0);
  var dd=new Date(d);dd.setHours(0,0,0,0);
  var diff=Math.round((today.getTime()-dd.getTime())/86400000);
  var time=d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(diff===0)return'Today '+time;
  if(diff===1)return'Yesterday '+time;
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+time;
}
function scParseCsvLine(line){
  // Simple CSV parser supporting quoted fields
  var out=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(c===','&&!inQ){out.push(cur);cur='';}
    else cur+=c;
  }
  out.push(cur);
  return out;
}

async function scCheckLog(b){
  // Fetches the ImportLog CSV and returns {csvModified, runTime, rows, status, duration} from the most recent row
  if(!b.logUrl)return null;
  try{
    var res=await fetch(b.logUrl+'&_sc='+Date.now(),{signal:AbortSignal.timeout(10000)});
    if(!res.ok)return{logError:'HTTP '+res.status};
    var text=await res.text();
    var lines=text.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
    if(lines.length<2)return{logError:'No log entries'};
    var h=scParseCsvLine(lines[0]);
    var ri=h.indexOf('RunTime'),ci=h.indexOf('CSVModified'),si=h.indexOf('Status'),di=h.indexOf('Duration');
    // Branch scripts use 'RowsWritten', warehouse script uses 'RowCount' — accept either
    var rwi=h.indexOf('RowsWritten');if(rwi<0)rwi=h.indexOf('RowCount');
    // Find the most recent row by RunTime (Apps Script writes newest at row 2, but be defensive)
    var bestRow=null,bestTime=null;
    for(var i=1;i<lines.length;i++){
      var p=scParseCsvLine(lines[i]);
      if(ri<0||!p[ri])continue;
      var rt=scParseLogDate(p[ri]);
      if(rt&&(!bestTime||rt>bestTime)){bestTime=rt;bestRow=p;}
    }
    if(!bestRow)return{logError:'No parseable log rows'};
    var csvMod=ci>=0?scParseLogDate(bestRow[ci]):null;
    var rows=rwi>=0?parseInt(bestRow[rwi])||0:0;
    var status=si>=0?(bestRow[si]||'').trim():'';
    var dur=di>=0?(bestRow[di]||'').trim():'';
    return{csvModified:csvMod,runTime:bestTime,rowsWritten:rows,importStatus:status,duration:dur};
  }catch(e){return{logError:e.message};}
}

async function scCheckBranch(b){
  var t0=Date.now();
  try{
    // Fetch stock + log in parallel for speed
    var stockP=fetch(b.url+'&_sc='+Date.now(),{signal:AbortSignal.timeout(15000)});
    var logP=scCheckLog(b);
    var res=await stockP;
    var elapsed=Date.now()-t0;
    if(!res.ok)return{id:b.id,name:b.name,color:b.color,status:'error',error:'HTTP '+res.status,elapsed:elapsed};
    var text=await res.text();
    var lines=text.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
    if(!lines.length)return{id:b.id,name:b.name,color:b.color,status:'error',error:'Empty response',elapsed:elapsed};
    var h=lines[0].split(',');
    var qi=h.indexOf('StockQty'),li=h.indexOf('LastSold');
    var total=lines.length-1,pos=0,neg=0,latestDate=null;
    for(var i=1;i<lines.length;i++){
      var p=lines[i].split(',');
      if(qi>=0&&p[qi]){var q=parseInt(p[qi]);if(!isNaN(q)){if(q>0)pos++;else if(q<0)neg++;}}
      if(li>=0&&p[li]&&p[li]!=='NULL'&&p[li]!=='Never'){
        var d=scParseDate(p[li]);if(d&&(!latestDate||d>latestDate))latestDate=d;
      }
    }
    var days=scDaysAgo(latestDate);
    var issues=[],status='ok';
    var isWarehouse=b.id==='warehouse';
    if(pos===0){issues.push('No positive stock — possible export issue');status='error';}
    // Warehouse has no till so LastSold dates are old — skip staleness check
    if(!isWarehouse){
      if(days!==null&&days>=SC_STALE_ERR){issues.push('Data '+days+'d old — EPOS export broken?');status='error';}
      else if(days!==null&&days>=SC_STALE_WARN){issues.push('Data '+days+'d old — check bat file');if(status==='ok')status='warn';}
    }
    // Wait for log fetch
    var log=await logP;
    if(log&&log.csvModified){
      var csvMinsAgo=scMinsAgo(log.csvModified);
      // Bat file runs every 30 mins → if CSV not refreshed in 90 mins something is wrong
      if(csvMinsAgo>180){issues.push('CSV not exported for '+Math.floor(csvMinsAgo/60)+' hrs — bat file may have stopped');status='error';}
      else if(csvMinsAgo>90){issues.push('CSV last exported '+csvMinsAgo+' min ago — bat file may be late');if(status==='ok')status='warn';}
    }
    if(log&&log.importStatus&&log.importStatus.indexOf('ERROR')===0){
      issues.push('Last import failed: '+log.importStatus);status='error';
    }
    return{id:b.id,name:b.name,color:b.color,status:status,elapsed:elapsed,
           total:total,pos:pos,neg:neg,latestDate:latestDate,days:days,
           log:log,issues:issues,isWarehouse:isWarehouse};
  }catch(e){return{id:b.id,name:b.name,color:b.color,status:'error',error:e.message,elapsed:Date.now()-t0};}
}

async function runSysCheck(){
  document.getElementById('sc-content').innerHTML='<div style="padding:30px;text-align:center;color:var(--sub);font-size:12px"><div class="spin" style="border-top-color:var(--purple);margin:0 auto 10px"></div>Checking all 4 branches…</div>';
  var results=await Promise.all(SC_BRANCHES.map(scCheckBranch));
  var anyErr=results.some(function(r){return r.status==='error';});
  var anyWarn=results.some(function(r){return r.status==='warn';});
  var overall=anyErr?'error':anyWarn?'warn':'ok';
  var overallMsg={ok:'✅ All systems live — data is fresh',warn:'⚠️ Systems running with warnings',error:'❌ Data issue detected — action needed'}[overall];
  var now=new Date();
  var html='<div class="sc-overall '+overall+'">'+
    '<div class="sc-overall-title">'+overallMsg+'</div>'+
    '<div class="sc-overall-sub">Checked: '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' · '+results.filter(function(r){return r.status==='ok';}).length+'/4 branches healthy</div>'+
  '</div>';
  results.forEach(function(r){
    html+='<div class="sc-branch">'+
      '<div class="sc-branch-hdr">'+
        '<div style="display:flex;align-items:center;gap:7px">'+
          '<div style="width:9px;height:9px;border-radius:50%;background:'+r.color+'"></div>'+
          '<div class="sc-branch-name">'+r.name+'</div>'+
        '</div>'+
        '<div class="sc-badge '+r.status+'">'+(r.status==='ok'?'✓ Live':r.status==='warn'?'⚠ Warning':'✗ Error')+'</div>'+
      '</div>';
    if(r.error){
      html+='<div class="sc-issue error">❌ '+r.error+'</div>';
    }else{
      (r.issues||[]).forEach(function(issue){
        html+='<div class="sc-issue '+(issue.indexOf('broken')>=0?'error':'warn')+'">'+issue+'</div>';
      });
      // ── CSV export timestamp (real Google Drive modification time from ImportLog) ─
      if(r.log&&r.log.csvModified){
        var csvMins=scMinsAgo(r.log.csvModified);
        var csvCls=csvMins>180?'err':csvMins>90?'warn':'ok';
        var csvBg=csvMins<=60?'var(--greenbg)':csvMins<=180?'var(--amberbg)':'var(--redbg)';
        html+='<div class="sc-row" style="background:'+csvBg+'">'+
          '<span class="sc-lbl" style="font-weight:700">CSV exported</span>'+
          '<span class="sc-val '+csvCls+'">'+scFmtDateTime(r.log.csvModified)+' ('+scFmtTimeAgo(r.log.csvModified)+')</span>'+
        '</div>';
        if(r.log.rowsWritten){
          html+='<div class="sc-row"><span class="sc-lbl">Rows imported</span><span class="sc-val ok">'+r.log.rowsWritten.toLocaleString()+'</span></div>';
        }
        if(r.log.duration){
          html+='<div class="sc-row"><span class="sc-lbl">Import duration</span><span class="sc-val">'+r.log.duration+'</span></div>';
        }
        if(r.log.runTime){
          html+='<div class="sc-row"><span class="sc-lbl">Last script run</span><span class="sc-val">'+scFmtDateTime(r.log.runTime)+'</span></div>';
        }
        if(r.log.importStatus&&r.log.importStatus!=='OK'&&r.log.importStatus!==''){
          var stCls=r.log.importStatus.indexOf('ERROR')===0?'err':'warn';
          html+='<div class="sc-row"><span class="sc-lbl">Import status</span><span class="sc-val '+stCls+'">'+r.log.importStatus+'</span></div>';
        }
      }else if(r.log&&r.log.logError){
        html+='<div class="sc-row"><span class="sc-lbl">CSV exported</span><span class="sc-val warn">Log unavailable: '+r.log.logError+'</span></div>';
      }
      if(r.isWarehouse){
        html+='<div class="sc-row"><span class="sc-lbl">LastSold check</span><span class="sc-val ok">Skipped — no till ✓</span></div>';
      }else if(r.latestDate){
        var dClass=r.days>=SC_STALE_ERR?'err':r.days>=SC_STALE_WARN?'warn':'ok';
        html+='<div class="sc-row"><span class="sc-lbl">Most recent sale</span><span class="sc-val '+dClass+'">'+scFmtDate(r.latestDate)+(r.days!==null?' ('+r.days+'d ago)':'')+'</span></div>';
      }
      html+='<div class="sc-row"><span class="sc-lbl">Products in stock</span><span class="sc-val ok">'+r.pos.toLocaleString()+'</span></div>';
      html+='<div class="sc-row"><span class="sc-lbl">Negatives</span><span class="sc-val '+(r.neg>0?'err':'ok')+'">'+r.neg+'</span></div>';
      html+='<div class="sc-row"><span class="sc-lbl">Total products</span><span class="sc-val">'+r.total.toLocaleString()+'</span></div>';
      html+='<div class="sc-row"><span class="sc-lbl">Response time</span><span class="sc-val">'+(Math.round(r.elapsed/100)/10)+'s</span></div>';
    }
    html+='</div>';
  });
  html+='<div style="padding:10px 13px;font-size:10px;color:var(--sub);line-height:1.8">'+
    '<strong style="color:var(--ink)">Reading this panel:</strong><br>'+
    '• <b>CSV exported</b> = real Google Drive timestamp from ImportLog tab<br>'+
    '• Bat file runs every 30 min → CSV should be &lt; 60 min old<br>'+
    '• 60–180 min = amber, &gt; 180 min = red (bat file likely stopped)<br>'+
    '<br><strong style="color:var(--ink)">If data looks stale:</strong><br>'+
    '1. Check CC-StockExport folder on branch PC — CSV modified today?<br>'+
    '2. Check Task Scheduler — bat file running every 30 mins?<br>'+
    '3. Check Google Drive — CSV synced?<br>'+
    '4. Open Google Sheet → Apps Script → check trigger & ImportLog tab'+
  '</div>';
  document.getElementById('sc-content').innerHTML=html;
}

document.getElementById('sc-panel').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('sc-recheck').addEventListener('click',runSysCheck);
