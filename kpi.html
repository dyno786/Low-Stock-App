<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Branch KPIs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#1a1a1a;--s3:#222;--border:#1e1e1e;--text:#fff;--sub:#555;--red:#f87171;--redbg:#2a0000;--amber:#fbbf24;--amberbg:#1a1500;--green:#4ade80;--greenbg:#001a08;--blue:#60a5fa;--bluebg:#001020;--purple:#a78bfa;--purplebg:#0f0020;--gold:#ffd700;--r:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
/* PIN */
.pinov{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:480px;margin:0 auto}
.pinlogo{width:68px;height:68px;background:linear-gradient(135deg,#cc0000,#ff4444);border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:26px;color:#fff;margin-bottom:18px;box-shadow:0 8px 32px rgba(204,0,0,.4)}
.pintitle{font-size:20px;font-weight:700;margin-bottom:4px}
.pinsub{font-size:13px;color:var(--sub);margin-bottom:40px}
.pindots{display:flex;gap:16px;margin-bottom:36px}
.pindot{width:14px;height:14px;border-radius:50%;background:var(--s3);transition:all .15s}
.pindot.filled{background:#cc0000;transform:scale(1.1)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:260px}
.pinkey{background:var(--s2);border:0.5px solid var(--s3);border-radius:14px;height:68px;font-size:24px;font-weight:500;color:#fff;cursor:pointer;touch-action:manipulation}
.pinkey:active{background:var(--s3)}
.pinerr{color:var(--red);font-size:13px;margin-top:18px;height:20px;text-align:center}
/* HEADER */
.hdr{background:linear-gradient(180deg,#1a0000 0%,var(--s1) 100%);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hdr-logo{width:34px;height:34px;background:#cc0000;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#fff}
.hdr-title{font-size:15px;font-weight:700;margin-left:10px}
.hdr-date{font-size:10px;color:var(--sub);font-family:monospace;margin-left:10px;margin-top:2px}
.hdr-btn{background:var(--s2);border:0.5px solid var(--s3);color:var(--sub);border-radius:7px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer}
/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 16px;font-size:11px;font-weight:600;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;user-select:none;white-space:nowrap}
.tab.on{color:#cc0000;border-bottom-color:#cc0000}
/* LEADERBOARD */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:20px 16px 16px;background:linear-gradient(180deg,#1a0800 0%,var(--bg) 100%)}
.pod{display:flex;flex-direction:column;align-items:center;gap:6px}
.pod-medal{font-size:28px}
.pod-bar{border-radius:6px 6px 0 0;width:80px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;position:relative}
.pod-score{font-size:14px;font-weight:700;font-family:monospace;color:#fff}
.pod-name{font-size:11px;font-weight:600;color:#fff;margin-top:4px}
.pod-pts{font-size:10px;color:rgba(255,255,255,.5)}
/* DAILY SCORES CARD */
.score-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin:10px 12px;overflow:hidden}
.score-card-hdr{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;display:flex;justify-content:space-between}
.kpi-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--border)}
.kpi-row:last-child{border-bottom:none}
.kpi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.kpi-info{flex:1;min-width:0}
.kpi-name{font-size:12px;font-weight:500;margin-bottom:2px}
.kpi-desc{font-size:9px;color:var(--sub)}
.kpi-scores{display:flex;gap:6px;flex-shrink:0}
.kpi-score{text-align:center;min-width:44px}
.kpi-val{font-size:14px;font-weight:700;font-family:monospace;display:block}
.kpi-branch{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px}
.kpi-pts{font-size:9px;font-weight:600;padding:1px 5px;border-radius:20px;margin-top:2px;display:inline-block}
/* ENTER DATA SECTION */
.enter-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin:10px 12px;overflow:hidden}
.enter-hdr{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px}
.enter-row{padding:10px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.enter-row:last-child{border-bottom:none}
.enter-label{font-size:12px;flex:1}
.enter-sub{font-size:10px;color:var(--sub);margin-top:1px}
.enter-inputs{display:flex;gap:5px;flex-shrink:0}
.branch-input{width:60px;background:var(--s2);border:1px solid var(--s3);border-radius:7px;padding:6px 4px;font-size:13px;font-weight:600;color:#fff;text-align:center;font-family:monospace;outline:none}
.branch-input:focus{border-color:#cc0000}
.branch-lbl{font-size:8px;color:var(--sub);text-align:center;margin-top:2px;text-transform:uppercase}
.save-btn{width:calc(100% - 24px);margin:10px 12px;padding:13px;background:#cc0000;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.save-btn:active{opacity:.85}
/* HISTORY */
.hist-day{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin:10px 12px;overflow:hidden}
.hist-day-hdr{padding:10px 14px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-day-title{font-size:13px;font-weight:600}
.hist-day-winner{font-size:10px;color:var(--gold);font-weight:600}
.hist-body{display:none}
.hist-body.open{display:block}
/* STATS */
.big-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 12px 8px;display:flex;align-items:center;gap:12px}
.big-stat-icon{font-size:28px}
.big-stat-val{font-size:28px;font-weight:700;font-family:monospace}
.big-stat-lbl{font-size:11px;color:var(--sub);margin-top:2px}
/* TARGET PROGRESS */
.target-row{display:flex;align-items:center;gap:8px;padding:0 14px 10px}
.target-bar{flex:1;height:8px;background:var(--s3);border-radius:4px;overflow:hidden}
.target-fill{height:100%;border-radius:4px;transition:width .5s}
.target-label{font-size:10px;color:var(--sub);width:40px;text-align:right;flex-shrink:0}
/* WEEKLY CHAMP */
.champ-banner{background:linear-gradient(135deg,#1a1000,#2a1a00);border:1px solid #3a2a00;border-radius:var(--r);margin:10px 12px;padding:14px;display:flex;align-items:center;gap:12px}
.champ-trophy{font-size:36px}
.champ-info{flex:1}
.champ-title{font-size:10px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.champ-name{font-size:20px;font-weight:700;color:#fff}
.champ-pts{font-size:12px;color:var(--sub);margin-top:2px}
/* LOADING */
.loading{padding:40px 20px;text-align:center;color:var(--sub)}
.spin{width:26px;height:26px;border:2px solid var(--s3);border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--s1);border-top:0.5px solid var(--border);display:flex;z-index:200;padding:5px 0 16px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.ni{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;padding:4px 10px}
.ni svg{width:19px;height:19px;color:var(--sub)}
.ni span{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:600;white-space:nowrap}
.ni.home{background:#cc0000;border-radius:10px;margin:4px}
.ni.home svg,.ni.home span{color:#fff}
.ni.active svg,.ni.active span{color:#cc0000}
</style>
</head>
<body>

<!-- PIN -->
<div class="pinov" id="pinov">
  <div class="pinlogo">🏆</div>
  <div class="pintitle">Branch KPIs</div>
  <div class="pinsub">Daily competition dashboard</div>
  <div class="pindots"><div class="pindot" id="pd0"></div><div class="pindot" id="pd1"></div><div class="pindot" id="pd2"></div><div class="pindot" id="pd3"></div></div>
  <div class="pinpad" id="pinpad">
    <button class="pinkey" data-n="1">1</button><button class="pinkey" data-n="2">2</button><button class="pinkey" data-n="3">3</button>
    <button class="pinkey" data-n="4">4</button><button class="pinkey" data-n="5">5</button><button class="pinkey" data-n="6">6</button>
    <button class="pinkey" data-n="7">7</button><button class="pinkey" data-n="8">8</button><button class="pinkey" data-n="9">9</button>
    <button class="pinkey" data-n="del" style="font-size:18px">⌫</button><button class="pinkey" data-n="0">0</button>
    <button class="pinkey" style="opacity:0;pointer-events:none" disabled></button>
  </div>
  <div class="pinerr" id="pinerr"></div>
</div>
<script>
var pe='';
function pd2(){for(var i=0;i<4;i++)document.getElementById('pd'+i).className='pindot'+(i<pe.length?' filled':'');}
function pc(){
  if(pe==='2025'||pe==='3030'||pe==='1979'){
    localStorage.setItem('cc_kpi_ts',Date.now().toString());
    localStorage.setItem('cc_kpi_role',pe==='2025'?'director':pe==='3030'?'manager':'staff');
    document.getElementById('pinov').style.display='none';
    startApp();
  }else{
    document.getElementById('pinerr').textContent='Incorrect PIN';pe='';pd2();
    setTimeout(function(){document.getElementById('pinerr').textContent='';},2000);
  }
}
document.getElementById('pinpad').addEventListener('click',function(e){
  var b=e.target.closest('.pinkey');if(!b||b.disabled)return;
  var n=b.dataset.n;
  if(n==='del'){if(pe.length>0){pe=pe.slice(0,-1);pd2();}}
  else{if(pe.length<4){pe+=n;pd2();if(pe.length===4)setTimeout(pc,150);}}
});
(function(){var ts=localStorage.getItem('cc_kpi_ts');if(ts&&Date.now()-parseInt(ts)<8*3600*1000)document.getElementById('pinov').style.display='none';})();
</script>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-row">
    <div style="display:flex;align-items:center">
      <div class="hdr-logo">CC</div>
      <div><div class="hdr-title">Branch KPIs</div><div class="hdr-date" id="hdr-date"></div></div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="hdr-btn" id="refresh-btn">↺ Refresh</button>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab on" data-t="today">Today</div>
  <div class="tab" data-t="enter">Enter data</div>
  <div class="tab" data-t="week">This week</div>
  <div class="tab" data-t="history">History</div>
</div>

<div id="out"><div class="loading"><div class="spin"></div>Loading…</div></div>

<!-- NAV -->
<nav class="nav">
  <a href="home.html" class="ni home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
  <a href="compare.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Compare</span></a>
  <a href="lostsales.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>Lost £</span></a>
  <a href="director.html" class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg><span>Director</span></a>
  <a href="kpi.html" class="ni active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/><path d="M15 7a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg><span>KPIs</span></a>
</nav>

<script>
// ── BRANCHES ─────────────────────────────────────────────────
var BRANCHES=[
  {id:'roundhay',name:'Roundhay',short:'R',color:'#60a5fa',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2w5wBKrzvkoUPjEB_f7K9_vyehT9MCAxJ32AwtSmNqZzVwJZaH2G0kg7YuRTjstWGZSLpGCVj9NzM/pub?gid=0&single=true&output=csv'},
  {id:'chapy',name:'Chapy',short:'C',color:'#fb923c',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ2DoIGJsmVoJOmShcLoUJ6wFrwbVSejnPy7uft8UEf1Brj5gRNBmSTO4eRqZQkDsldlsD6GiBs2Bo/pub?gid=0&single=true&output=csv'},
  {id:'city',name:'City',short:'X',color:'#4ade80',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfK3RbCr-2FPtGFXio6aL6UMnYrlNupoJ259jlHuLIXKkOBLraZxgcb8WvCj2ndeARlp-uVRyNMyKt/pub?gid=0&single=true&output=csv'},
  {name:'Warehouse',short:'WH',chip:'bc-w',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7w_JR_xjlsZTD4-WMWoxotOPHDGg7Kgj7yvGGtJLZUL8apgHzBTOQxM7eBNu2VVirn6ehnlNR4vC6/pub?gid=0&single=true&output=csv'}
];

// ── KPI DEFINITIONS ──────────────────────────────────────────
// Points awarded per KPI — these drive the leaderboard
var KPIS=[
  {id:'google_views',   name:'Google views',       icon:'👁',  unit:'views',  target:50, pts:2,  color:'#60a5fa', manual:true,
   desc:'Daily Google Business profile views (enter from Google dashboard)'},
  {id:'neg_fixed',      name:'Negatives fixed',    icon:'✅',  unit:'items',  target:10, pts:5,  color:'#4ade80', manual:false,
   desc:'Negative stock items brought above zero (auto from EPOS changes)'},
  {id:'transfers_done', name:'Transfers completed', icon:'🔄',  unit:'items',  target:5,  pts:4,  color:'#a78bfa', manual:true,
   desc:'Items physically moved between branches today'},
  {id:'photos_taken',   name:'Photos taken',        icon:'📸',  unit:'photos', target:10, pts:3,  color:'#f472b6', manual:false,
   desc:'Products photographed for Shopify (auto from images page)'},
  {id:'stock_checks',   name:'Stock checks done',   icon:'📋',  unit:'checks', target:20, pts:2,  color:'#fbbf24', manual:true,
   desc:'Number of stock checks completed today'},
  {id:'customers',      name:'Customers served',    icon:'👥',  unit:'people', target:30, pts:1,  color:'#fb923c', manual:true,
   desc:'Number of customers served (from till or manual count)'},
  {id:'zero_cleared',   name:'Zero stock cleared',  icon:'📦',  unit:'items',  target:5,  pts:3,  color:'#34d399', manual:false,
   desc:'Items that were zero stock, now restocked (auto from EPOS)'},
];

// ── STATE ─────────────────────────────────────────────────────
var section='today';
var bd=[[],[],[]],loaded=0;
var role=localStorage.getItem('cc_kpi_role')||'staff';
var GOOGLE_VIEWS_TARGET=50;

// ── DATA STORE ────────────────────────────────────────────────
// Stored as: kpi_data = { "YYYY-MM-DD": { roundhay:{google_views:42,...}, chapy:{...}, city:{...} } }
function todayKey(){return new Date().toISOString().split('T')[0];}
function getKpiData(){try{return JSON.parse(localStorage.getItem('cc_kpi_data')||'{}');}catch(e){return{};}}
function saveKpiData(d){try{localStorage.setItem('cc_kpi_data',JSON.stringify(d));}catch(e){}}

function getTodayBranch(branchId){
  var d=getKpiData();
  var today=todayKey();
  if(!d[today])d[today]={};
  if(!d[today][branchId])d[today][branchId]={};
  return d[today][branchId];
}

function setTodayKpi(branchId,kpiId,val){
  var d=getKpiData();
  var today=todayKey();
  if(!d[today])d[today]={};
  if(!d[today][branchId])d[today][branchId]={};
  d[today][branchId][kpiId]=val;
  saveKpiData(d);
}

// ── AUTO KPIs from existing localStorage data ─────────────────
function getAutoKpis(branchId){
  var result={};

  // 1. Negatives fixed today — from change log
  try{
    var changeLog=JSON.parse(localStorage.getItem('cc_change_log')||'[]');
    var todayStart=new Date();todayStart.setHours(0,0,0,0);
    var fixed=changeLog.filter(function(e){
      return e.branchId===branchId&&e.ts>=todayStart.getTime()&&e.prev<0&&e.curr>=0;
    });
    result.neg_fixed=fixed.length;
  }catch(e){result.neg_fixed=0;}

  // 2. Zero stock cleared today — from change log
  try{
    var changeLog2=JSON.parse(localStorage.getItem('cc_change_log')||'[]');
    var todayStart2=new Date();todayStart2.setHours(0,0,0,0);
    var cleared=changeLog2.filter(function(e){
      return e.branchId===branchId&&e.ts>=todayStart2.getTime()&&e.prev<=0&&e.curr>0;
    });
    result.zero_cleared=cleared.length;
  }catch(e){result.zero_cleared=0;}

  // 3. Photos taken today — from images tick data
  try{
    var ticks=JSON.parse(localStorage.getItem('cc_img_ticks')||'{}');
    var today=todayKey();
    var photos=Object.values(ticks).filter(function(t){
      if(t.status!=='done')return false;
      if(!t.ts)return false;
      var d=new Date(t.ts);
      return d.toISOString().split('T')[0]===today&&(t.branch<0||BRANCHES[t.branch]&&BRANCHES[t.branch].id===branchId);
    });
    result.photos_taken=photos.length;
  }catch(e){result.photos_taken=0;}

  return result;
}

// ── COMPUTE POINTS ────────────────────────────────────────────
function computeScore(branchId){
  var manual=getTodayBranch(branchId);
  var auto=getAutoKpis(branchId);
  var total=0;
  var breakdown={};
  KPIS.forEach(function(kpi){
    var val=kpi.manual?( manual[kpi.id]||0):(auto[kpi.id]||0);
    var pctOfTarget=kpi.target>0?Math.min(val/kpi.target,1):0;
    var pts=Math.round(pctOfTarget*kpi.pts*10)/10;
    breakdown[kpi.id]={val:val,pts:pts,pctOfTarget:pctOfTarget};
    total+=pts;
  });
  return{total:Math.round(total*10)/10,breakdown:breakdown};
}

// ── LOAD STOCK DATA ───────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}
function pDate(s){
  if(!s||s==='Never'||s==='Unknown'||s==='NULL')return null;
  var p=s.split('/');
  if(p.length===3){var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return isNaN(d)?null:d;}
  var d=new Date(s);return isNaN(d)?null:d;
}
function dSince(s){var d=pDate(s);return d?Math.floor((Date.now()-d)/86400000):9999;}
function isDead(p){
  if(!p||p.qty<=5)return false;
  if(p.ls==='Never'&&dSince(p.dc)>=90)return true;
  if(dSince(p.ls)>=90)return true;
  return false;
}
async function loadBranch(i){
  try{
    var r=await fetch(BRANCHES[i].url+'&t='+Date.now());
    var t=await r.text();
    bd[i]=Papa.parse(t,{header:true,skipEmptyLines:true}).data.map(function(row){
      var ls=cl(row['LastSold']),dc=cl(row['DateCreated']);
      return{bc:cl(row['Barcode']),qty:parseInt(row['StockQty'])||0,
             ls:(ls&&ls!=='NULL')?ls:'Never',dc:(dc&&dc!=='NULL')?dc:'Unknown',dp:cl(row['Department'])};
    });
  }catch(e){bd[i]=[];}
  loaded++;
  if(loaded===3)render();
}

// ── RENDER FUNCTIONS ─────────────────────────────────────────
function render(){
  if(section==='today')renderToday();
  else if(section==='enter')renderEnter();
  else if(section==='week')renderWeek();
  else renderHistory();
}

// TODAY LEADERBOARD
function renderToday(){
  var el=document.getElementById('out');
  // Compute scores for all branches
  var scores=BRANCHES.map(function(b,i){
    var s=computeScore(b.id);
    return{branch:b,idx:i,score:s.total,breakdown:s.breakdown};
  });
  scores.sort(function(a,b){return b.score-a.score;});

  var medals=['🥇','🥈','🥉'];
  var heights=[120,90,70];
  var bgColors=['rgba(255,215,0,.15)','rgba(192,192,192,.1)','rgba(205,127,50,.1)'];
  var borderColors=['rgba(255,215,0,.4)','rgba(192,192,192,.3)','rgba(205,127,50,.3)'];

  // PODIUM
  var podOrder=[1,0,2]; // 2nd, 1st, 3rd for visual layout
  var html='<div class="podium">';
  podOrder.forEach(function(rank){
    var s=scores[rank];
    if(!s)return;
    html+='<div class="pod">';
    html+='<div class="pod-medal">'+medals[rank]+'</div>';
    html+='<div class="pod-bar" style="height:'+heights[rank]+'px;background:'+bgColors[rank]+';border:1px solid '+borderColors[rank]+';border-bottom:none">';
    html+='<div class="pod-score">'+s.score+'</div>';
    html+='</div>';
    html+='<div class="pod-name" style="color:'+s.branch.color+'">'+s.branch.name+'</div>';
    html+='<div class="pod-pts">pts today</div>';
    html+='</div>';
  });
  html+='</div>';

  // GOOGLE VIEWS TARGET BAR (big focus)
  html+='<div class="score-card">';
  html+='<div class="score-card-hdr"><span>👁 Google views today — target: '+GOOGLE_VIEWS_TARGET+'/day</span></div>';
  var totalViews=0;
  BRANCHES.forEach(function(b,i){
    var views=getTodayBranch(b.id).google_views||0;
    totalViews+=views;
    var pct=Math.min(Math.round(views/GOOGLE_VIEWS_TARGET*100),100);
    var hitTarget=views>=GOOGLE_VIEWS_TARGET;
    html+='<div class="kpi-row">';
    html+='<div class="kpi-icon" style="background:'+b.color+'22;font-size:12px;font-weight:700;color:'+b.color+'">'+b.name.slice(0,1)+'</div>';
    html+='<div class="kpi-info">';
    html+='<div class="kpi-name">'+b.name+'</div>';
    html+='<div style="display:flex;align-items:center;gap:6px;margin-top:4px">';
    html+='<div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">';
    html+='<div style="width:'+pct+'%;height:100%;background:'+(hitTarget?'var(--green)':b.color)+';border-radius:3px"></div>';
    html+='</div>';
    html+='<span style="font-size:11px;font-family:monospace;color:'+(hitTarget?'var(--green)':'var(--sub)')+'">'+views+'/'+(GOOGLE_VIEWS_TARGET)+(hitTarget?' ✓':'')+'</span>';
    html+='</div></div>';
    html+='<span style="font-size:20px;font-weight:700;color:'+(hitTarget?'var(--green)':b.color)+';font-family:monospace">'+views+'</span>';
    html+='</div>';
  });
  html+='<div style="padding:8px 14px;border-top:0.5px solid var(--border);display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--sub)">Combined total</span><span style="font-family:monospace;font-weight:700;color:'+(totalViews>=(GOOGLE_VIEWS_TARGET*3)?'var(--green)':'var(--text)')+'">'+totalViews+' / '+(GOOGLE_VIEWS_TARGET*3)+'</span></div>';
  html+='</div>';

  // KPI BREAKDOWN TABLE
  html+='<div class="score-card">';
  html+='<div class="score-card-hdr"><span>All KPIs — today</span><span style="font-weight:400;font-size:10px">pts = progress toward target</span></div>';
  KPIS.forEach(function(kpi){
    html+='<div class="kpi-row">';
    html+='<div class="kpi-icon" style="background:'+kpi.color+'22">'+kpi.icon+'</div>';
    html+='<div class="kpi-info"><div class="kpi-name">'+kpi.name+'</div>';
    html+='<div class="kpi-desc">Target: '+kpi.target+' '+kpi.unit+' · '+kpi.pts+'pts max · '+(kpi.manual?'manual entry':'auto tracked')+'</div></div>';
    html+='<div class="kpi-scores">';
    scores.forEach(function(s){
      var bd2=s.breakdown[kpi.id]||{val:0,pts:0,pctOfTarget:0};
      var hit=bd2.pctOfTarget>=1;
      html+='<div class="kpi-score">';
      html+='<span class="kpi-val" style="color:'+(hit?'var(--green)':bd2.val>0?kpi.color:'var(--sub)')+'">'+bd2.val+'</span>';
      html+='<span class="kpi-branch" style="color:'+s.branch.color+'">'+s.branch.short+'</span>';
      html+='<span class="kpi-pts" style="background:'+kpi.color+'22;color:'+kpi.color+'">'+bd2.pts+'pt</span>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // STOCK HEALTH (from live data)
  if(loaded>=3){
    html+='<div class="score-card">';
    html+='<div class="score-card-hdr"><span>📊 Live stock health</span></div>';
    BRANCHES.forEach(function(b,i){
      if(!bd[i].length)return;
      var neg=bd[i].filter(function(p){return p.qty<0;}).length;
      var total=bd[i].length;
      var pct=total?Math.round((1-neg/total)*100):0;
      html+='<div class="kpi-row">';
      html+='<div class="kpi-icon" style="background:'+b.color+'22;font-size:12px;font-weight:700;color:'+b.color+'">'+b.name.slice(0,1)+'</div>';
      html+='<div class="kpi-info"><div class="kpi-name">'+b.name+'</div>';
      html+='<div style="display:flex;align-items:center;gap:6px;margin-top:4px">';
      html+='<div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden">';
      html+='<div style="width:'+pct+'%;height:100%;background:'+(pct>95?'var(--green)':pct>85?b.color:'var(--red)')+';border-radius:3px"></div>';
      html+='</div>';
      html+='<span style="font-size:10px;color:var(--sub)">'+neg+' neg · '+pct+'% healthy</span>';
      html+='</div></div>';
      html+='<span style="font-size:18px;font-weight:700;font-family:monospace;color:'+(pct>95?'var(--green)':pct>85?b.color:'var(--red)')+'">'+pct+'%</span>';
      html+='</div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

// ENTER DATA
function renderEnter(){
  var el=document.getElementById('out');
  var manualKpis=KPIS.filter(function(k){return k.manual;});

  var html='';
  html+='<div style="padding:10px 12px 4px"><div style="font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.6px">Enter today\'s figures</div></div>';

  // Column headers
  html+='<div class="enter-card">';
  html+='<div class="enter-hdr" style="display:grid;grid-template-columns:1fr repeat(3,60px);gap:6px">';
  html+='<span>KPI</span>';
  BRANCHES.forEach(function(b){html+='<span style="text-align:center;color:'+b.color+'">'+b.name+'</span>';});
  html+='</div>';

  manualKpis.forEach(function(kpi){
    html+='<div class="enter-row">';
    html+='<div><div class="enter-label">'+kpi.icon+' '+kpi.name+'</div>';
    html+='<div class="enter-sub">Target: '+kpi.target+' '+kpi.unit+'</div></div>';
    html+='<div class="enter-inputs">';
    BRANCHES.forEach(function(b){
      var cur=getTodayBranch(b.id)[kpi.id]||'';
      html+='<div>';
      html+='<input class="branch-input" type="number" min="0" id="inp_'+kpi.id+'_'+b.id+'" value="'+cur+'" placeholder="0">';
      html+='<div class="branch-lbl" style="color:'+b.color+'">'+b.name+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  html+='<button class="save-btn" id="save-kpi-btn">💾 Save today\'s figures</button>';
  html+='<div style="padding:8px 14px;font-size:10px;color:var(--sub);line-height:1.8">';
  html+='Auto-tracked (no entry needed):<br>';
  html+='✅ Negatives fixed · 📦 Zero stock cleared · 📸 Photos taken<br>';
  html+='These pull from EPOS change log and images page automatically.';
  html+='</div>';

  el.innerHTML=html;

  document.getElementById('save-kpi-btn').addEventListener('click',function(){
    manualKpis.forEach(function(kpi){
      BRANCHES.forEach(function(b){
        var el2=document.getElementById('inp_'+kpi.id+'_'+b.id);
        if(el2){
          var val=parseInt(el2.value)||0;
          setTodayKpi(b.id,kpi.id,val);
        }
      });
    });
    this.textContent='✓ Saved!';
    this.style.background='var(--green)';
    setTimeout(function(){section='today';document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('on',t.dataset.t==='today');});render();},1200);
  });
}

// WEEK VIEW
function renderWeek(){
  var el=document.getElementById('out');
  var data=getKpiData();
  var days=[];
  for(var i=6;i>=0;i--){
    var d=new Date();d.setDate(d.getDate()-i);
    days.push(d.toISOString().split('T')[0]);
  }

  // Total points per branch over 7 days
  var weekTotals=BRANCHES.map(function(b){return{branch:b,total:0,days:[]};});
  days.forEach(function(day){
    BRANCHES.forEach(function(b,i){
      var manual=(data[day]&&data[day][b.id])||{};
      var pts=0;
      KPIS.forEach(function(kpi){
        if(kpi.manual){
          var val=manual[kpi.id]||0;
          pts+=Math.min(val/kpi.target,1)*kpi.pts;
        }
      });
      weekTotals[i].total+=pts;
      weekTotals[i].days.push({day:day,pts:pts});
    });
  });

  weekTotals.sort(function(a,b){return b.total-a.total;});

  var html='';

  // Weekly champion
  var champ=weekTotals[0];
  html+='<div class="champ-banner">';
  html+='<div class="champ-trophy">🏆</div>';
  html+='<div class="champ-info"><div class="champ-title">This week\'s leader</div>';
  html+='<div class="champ-name" style="color:'+champ.branch.color+'">'+champ.branch.name+'</div>';
  html+='<div class="champ-pts">'+Math.round(champ.total*10)/10+' points this week</div></div>';
  html+='</div>';

  // 7-day chart per branch
  html+='<div class="score-card">';
  html+='<div class="score-card-hdr"><span>7-day points trend</span></div>';
  var maxPts=Math.max.apply(null,weekTotals.flatMap(function(w){return w.days.map(function(d){return d.pts;});}));
  weekTotals.forEach(function(w){
    html+='<div style="padding:10px 14px;border-bottom:0.5px solid var(--border)">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<span style="font-size:12px;font-weight:600;color:'+w.branch.color+'">'+w.branch.name+'</span>';
    html+='<span style="font-size:14px;font-weight:700;font-family:monospace">'+Math.round(w.total*10)/10+' pts</span>';
    html+='</div>';
    // Mini bar chart
    html+='<div style="display:flex;gap:2px;align-items:flex-end;height:40px">';
    var dayLabels=['M','T','W','T','F','S','S'];
    w.days.forEach(function(d,di){
      var pct=maxPts>0?Math.round(d.pts/maxPts*100):0;
      var dayName=new Date(d.day+'T12:00:00').toLocaleDateString('en-GB',{weekday:'narrow'});
      var isToday=d.day===todayKey();
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">';
      html+='<div style="flex:1;width:100%;display:flex;align-items:flex-end">';
      html+='<div style="width:100%;height:'+Math.max(pct,2)+'%;background:'+(isToday?'#cc0000':w.branch.color)+';border-radius:2px 2px 0 0;opacity:'+(isToday?1:.7)+';min-height:2px"></div>';
      html+='</div>';
      html+='<div style="font-size:8px;color:'+(isToday?'#cc0000':'var(--sub)')+'">'+dayName+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // Google views weekly total
  html+='<div class="score-card">';
  html+='<div class="score-card-hdr"><span>👁 Google views this week</span></div>';
  BRANCHES.forEach(function(b,i){
    var total=0;
    days.forEach(function(day){total+=(data[day]&&data[day][b.id]&&data[day][b.id].google_views)||0;});
    var target=GOOGLE_VIEWS_TARGET*7;
    var pct=Math.min(Math.round(total/target*100),100);
    html+='<div class="kpi-row"><div class="kpi-icon" style="background:'+b.color+'22;font-size:12px;font-weight:700;color:'+b.color+'">'+b.name.slice(0,1)+'</div>';
    html+='<div class="kpi-info"><div class="kpi-name">'+b.name+'</div>';
    html+='<div style="display:flex;align-items:center;gap:6px;margin-top:4px">';
    html+='<div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:'+b.color+';border-radius:3px"></div></div>';
    html+='<span style="font-size:10px;color:var(--sub)">'+total+'/'+target+'</span></div></div>';
    html+='<span style="font-size:18px;font-weight:700;font-family:monospace;color:'+b.color+'">'+total+'</span>';
    html+='</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

// HISTORY
function renderHistory(){
  var el=document.getElementById('out');
  var data=getKpiData();
  var days=Object.keys(data).sort().reverse();

  if(!days.length){
    el.innerHTML='<div class="loading" style="padding:40px">No history yet.<br>Start entering daily figures.</div>';
    return;
  }

  var html='';
  days.slice(0,30).forEach(function(day){
    var dayData=data[day];
    var scores=BRANCHES.map(function(b){
      var manual=dayData[b.id]||{};
      var pts=0;
      KPIS.forEach(function(kpi){if(kpi.manual){var val=manual[kpi.id]||0;pts+=Math.min(val/kpi.target,1)*kpi.pts;}});
      return{branch:b,pts:Math.round(pts*10)/10};
    }).sort(function(a,b){return b.pts-a.pts;});
    var winner=scores[0];
    var dateStr=new Date(day+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    var isToday=day===todayKey();

    html+='<div class="hist-day">';
    html+='<div class="hist-day-hdr" data-day="'+day+'">';
    html+='<div><div class="hist-day-title">'+(isToday?'Today — ':'')+dateStr+'</div>';
    html+='<div style="font-size:10px;color:var(--sub);margin-top:2px">'+scores.map(function(s){return s.branch.name+': '+s.pts+'pt';}).join(' · ')+'</div></div>';
    html+='<div style="display:flex;align-items:center;gap:6px">';
    html+='<span style="font-size:16px">🏆</span>';
    html+='<span class="hist-day-winner" style="color:'+winner.branch.color+'">'+winner.branch.name+'</span>';
    html+='</div></div>';
    // Details (collapsed)
    html+='<div class="hist-body'+(isToday?' open':'')+'" id="hist_'+day+'">';
    BRANCHES.forEach(function(b){
      var manual=dayData[b.id]||{};
      html+='<div style="padding:8px 14px;border-bottom:0.5px solid var(--border)">';
      html+='<div style="font-size:11px;font-weight:600;color:'+b.color+';margin-bottom:5px">'+b.name+'</div>';
      html+='<div style="display:flex;flex-wrap:wrap;gap:6px">';
      KPIS.forEach(function(kpi){
        if(!kpi.manual)return;
        var val=manual[kpi.id]||0;
        html+='<span style="font-size:10px;padding:2px 7px;background:var(--s3);border-radius:4px">'+kpi.icon+' '+val+' '+kpi.unit+'</span>';
      });
      html+='</div></div>';
    });
    html+='<button onclick="deleteDay(\''+day+'\')" style="margin:8px 14px;background:none;border:none;color:var(--red);font-size:11px;cursor:pointer">Delete this day</button>';
    html+='</div></div>';
  });

  el.innerHTML=html;
  el.querySelectorAll('.hist-day-hdr').forEach(function(hdr){
    hdr.addEventListener('click',function(){
      var day=this.dataset.day;
      var body=document.getElementById('hist_'+day);
      if(body)body.classList.toggle('open');
    });
  });
}

function deleteDay(day){
  if(!confirm('Delete data for '+day+'?'))return;
  var d=getKpiData();delete d[day];saveKpiData(d);renderHistory();
}

// ── CONTROLS ─────────────────────────────────────────────────
document.querySelector('.tabs').addEventListener('click',function(e){
  var t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  t.classList.add('on');section=t.dataset.t;render();
});
document.getElementById('refresh-btn').addEventListener('click',function(){
  loaded=0;bd=[[],[],[]];
  Promise.all([loadBranch(0),loadBranch(1),loadBranch(2)]);
});

// ── START ─────────────────────────────────────────────────────
function startApp(){
  var now=new Date();
  document.getElementById('hdr-date').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  Promise.all([loadBranch(0),loadBranch(1),loadBranch(2)]);
  render(); // Show immediately with stored data
}

(function(){
  var ts=localStorage.getItem('cc_kpi_ts');
  if(ts&&Date.now()-parseInt(ts)<8*3600*1000)startApp();
})();
</script>
