<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PICCO · Scan monitor</title>
<style>
  html,body{margin:0;background:#F4F6F8;font-family:Inter,system-ui,sans-serif}
  #boot{max-width:560px;margin:18vh auto;padding:0 24px;color:#69727E;text-align:center}
  #boot h1{font-size:18px;color:#171A21;margin:0 0 8px}
  #boot p{font-size:14px;line-height:1.5;margin:0}
  #boot .err{color:#B42318;font-weight:600;margin-top:14px;display:none}
  #boot a{color:#0B545C}
</style>
</head>
<body>
<div id="boot">
  <h1>Loading PICCO…</h1>
  <p>Fetching the live dashboard and applying the warehouse Scanned&nbsp;in&nbsp;/&nbsp;Scanned&nbsp;out view.</p>
  <p class="err" id="bootErr"></p>
</div>
<script>
/* ============================================================================
   PICCO loader + warehouse table patch.
   This file is tiny and safe: it loads your real, live picco.html from Vercel,
   then patches ONE function (mvCell) so the Warehouse table reads
   "Scanned in / Scanned out · In stock" instead of the confusing
   Was / Adjusted / On shelf row. Shop tabs are untouched.
   Because the big file is fetched (never retyped), it can't be corrupted.
   ============================================================================ */
(function(){
  var SRC = "https://low-stock-app.vercel.app/picco.html";

  function fail(msg){
    var e=document.getElementById("bootErr");
    if(e){e.style.display="block";
      e.innerHTML="Couldn't load automatically: "+msg+"<br>Open the live dashboard directly: <a href=\""+SRC+"\">"+SRC+"</a>";}
  }

  fetch(SRC, {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(function(html){
      // Pull out the <script> body (the app) and the <style> body so we can run them here.
      var appScript = "";
      html.replace(/<script>([\s\S]*?)<\/script>/g, function(_, body){ appScript += body + "\n"; return _; });
      var styleCss = "";
      var sm = html.match(/<style>([\s\S]*?)<\/style>/);
      if(sm) styleCss = sm[1];

      if(!appScript) throw new Error("no app script found in source");

      // --- THE WAREHOUSE PATCH -------------------------------------------------
      // Append code that overrides mvCell so warehouse rows show plain scanned in/out.
      // Defined after the app's own code, so these win.
      var patch = [
        "\n/* ---- warehouse table patch (added by loader) ---- */",
        "function activeIsWarehouse(){ try{ var b=CONFIG.branches.find(function(x){return x.key===state.active;}); return !!(b&&b.warehouse); }catch(e){ return false; } }",
        "function mvFlowCell(p){",
        "  var moved=(p.scans||[]).reduce(function(s,x){return s+(toNumber(x.qty)||0);},0);",
        "  var stk=inStock(p);",
        "  var big=(typeof getSetting==='function'?getSetting('correctionAboveUnits',(CONFIG.correctionAboveUnits||5000)):(CONFIG.correctionAboveUnits||5000));",
        "  var shelf='<span style=\"display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px\">In stock '+(stk==null?'\u00b7':fmt(stk))+'</span>';",
        "  var lead;",
        "  if(Math.abs(moved)>=big) lead='<b style=\"color:var(--bad)\">Correction '+(moved>0?'+':'\u2212')+fmt(Math.abs(moved))+'</b>';",
        "  else if(moved>0) lead='<b style=\"color:var(--ok)\">Scanned in '+fmt(moved)+'</b>';",
        "  else if(moved<0) lead='<b style=\"color:var(--bad)\">Scanned out '+fmt(Math.abs(moved))+'</b>';",
        "  else lead='<b style=\"color:var(--muted)\">No change</b>';",
        "  return lead+shelf;",
        "}",
        "mvCell=function(p){ return activeIsWarehouse()?mvFlowCell(p):mvTriple(p); };",
        // Re-render so the override takes effect immediately if the app already drew once.
        "try{ if(typeof renderPanel==='function') renderPanel(); }catch(e){}"
      ].join("\n");

      // Inject styles
      if(styleCss){
        var st=document.createElement("style");
        st.textContent=styleCss;
        document.head.appendChild(st);
      }
      // Build the body the app expects (it looks for #updated, #tabs, #panel, #footer, #refresh).
      document.body.innerHTML =
        '<header class="topbar"><div class="wrap"><div class="topbar__inner">'+
        '<div class="brand"><span class="brand__mark">PICCO<span class="brand__dot">.</span></span>'+
        '<span class="brand__sub">Scan monitor &mdash; CC Hair &amp; Beauty</span></div>'+
        '<div class="updated" id="updated">&mdash;</div>'+
        '<button class="btn" id="refresh" type="button">Refresh</button>'+
        '</div><div class="tabwrap"><nav class="tabs" id="tabs" role="tablist" aria-label="Views"></nav></div></div></header>'+
        '<main class="wrap"><div id="panel" class="panel" role="tabpanel"></div></main>'+
        '<footer class="wrap" id="footer"></footer>';

      // Run the app, then the patch.
      var s=document.createElement("script");
      s.textContent = appScript + "\n" + patch;
      document.body.appendChild(s);
    })
    .catch(function(err){ fail(String(err&&err.message||err)); });
})();
</script>
</body>
</html>
