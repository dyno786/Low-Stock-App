<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PICCO · Scan monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F6F8; --surface:#FFFFFF; --surface-2:#FBFCFD;
    --ink:#171A21; --muted:#69727E; --faint:#9AA3AD;
    --line:#E3E8EE; --line-strong:#D2D9E1;
    --brand:#0F6E78; --brand-ink:#0B545C; --brand-wash:#E4F1F2;
    --ok:#11804A; --ok-wash:#DCF3E6;
    --warn:#9A6700; --warn-wash:#FFF4D6;
    --bad:#B42318; --bad-wash:#FDE6E3;
    --viol:#5B3FB5; --viol-wash:#ECE7FB;
    --radius:12px; --radius-sm:8px;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --shadow:0 1px 2px rgba(20,30,45,.04),0 4px 16px rgba(20,30,45,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:"Inter",system-ui,sans-serif; font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px; margin:0 auto; padding:0 20px}

  .topbar{position:sticky; top:0; z-index:30; background:rgba(244,246,248,.86); backdrop-filter:saturate(140%) blur(8px); border-bottom:1px solid var(--line)}
  .topbar__inner{display:flex; align-items:center; gap:16px; height:62px}
  .brand{display:flex; align-items:baseline; gap:10px; margin-right:auto}
  .brand__mark{font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:22px; letter-spacing:.14em}
  .brand__dot{color:var(--brand)}
  .brand__sub{font-size:12px; color:var(--muted)}
  .updated{font-size:12px; color:var(--muted); text-align:right; line-height:1.3}
  .updated b{color:var(--ink); font-weight:600}
  .btn{font:inherit; font-weight:600; font-size:13px; cursor:pointer; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink); padding:8px 13px; border-radius:var(--radius-sm); display:inline-flex; align-items:center; gap:7px; transition:border-color .15s,background .15s,transform .05s}
  .btn:hover{border-color:var(--brand); color:var(--brand-ink)}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:14px; height:14px}
  .btn.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .tabs{display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; padding:10px 0 0}
  .tabs::-webkit-scrollbar{display:none}
  .tab{position:relative; flex:0 0 auto; background:transparent; border:0; cursor:pointer; font:inherit; font-weight:600; font-size:13.5px; color:var(--muted); padding:11px 15px 14px; border-radius:8px 8px 0 0; white-space:nowrap; display:flex; align-items:center; gap:9px; transition:color .15s}
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{color:var(--ink)}
  .tab[aria-selected="true"]::after{content:""; position:absolute; left:12px; right:12px; bottom:-1px; height:2.5px; background:var(--brand); border-radius:2px}
  .tab__count{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--muted); background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:1px 7px}
  .tab--exc[aria-selected="true"]::after{background:var(--warn)}
  .tab--exc .tab__count.hot{background:var(--warn-wash); color:var(--warn); border-color:transparent}
  .statusdot{width:8px; height:8px; border-radius:50%; flex:0 0 auto; background:var(--faint)}
  .statusdot--live{background:var(--ok); box-shadow:0 0 0 3px var(--ok-wash); animation:pulse 2.4s ease-in-out infinite}
  .statusdot--stale{background:var(--warn); box-shadow:0 0 0 3px var(--warn-wash)}
  .statusdot--none{background:var(--faint)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

  main{padding:22px 0 80px}
  .panel{animation:rise .25s ease both}
  @keyframes rise{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

  .branchhead{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap}
  .branchhead__name{font-family:"Space Grotesk",sans-serif; font-size:25px; font-weight:600; letter-spacing:-.01em}
  .lede{color:var(--muted); margin:-6px 0 16px; max-width:660px}
  .lede code,.state code,.demobar code{font-family:var(--mono); font-size:12px; background:var(--surface-2); border:1px solid var(--line); border-radius:6px; padding:1px 6px}

  .freshness{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; padding:6px 11px; border-radius:20px; border:1px solid var(--line); background:var(--surface)}
  .freshness--live{color:var(--ok); border-color:transparent; background:var(--ok-wash)}
  .freshness--stale{color:var(--warn); border-color:transparent; background:var(--warn-wash)}
  .freshness--none{color:var(--muted)}

  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px}
  .kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:15px 17px; box-shadow:var(--shadow)}
  .kpi__label{font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
  .kpi__value{font-family:"Space Grotesk",sans-serif; font-size:27px; font-weight:600; margin-top:6px; font-variant-numeric:tabular-nums; letter-spacing:-.01em}
  .kpi__value small{font-size:13px; color:var(--faint); font-weight:500; margin-left:4px}
  .kpi--exc.hot .kpi__value{color:var(--warn)}
  .kpi--age .kpi__value{font-size:21px}

  .overview{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
  .bcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; cursor:pointer; transition:border-color .15s,transform .06s; text-align:left; width:100%; font:inherit; color:inherit; display:block}
  .bcard:hover{border-color:var(--brand)}
  .bcard:active{transform:translateY(1px)}
  .bcard:focus-visible{outline:2px solid var(--brand); outline-offset:2px}
  .bcard__top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:15px}
  .bcard__name{font-family:"Space Grotesk",sans-serif; font-size:19px; font-weight:600}
  .bcard__kpis{display:flex; gap:20px}
  .bcard__kpi .l{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600}
  .bcard__kpi .v{font-family:"Space Grotesk",sans-serif; font-size:22px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:3px}
  .bcard__kpi.exc.hot .v{color:var(--warn)}
  .demohint{margin-top:13px; font-size:12px; color:var(--warn); font-weight:600}

  .toolbar{display:flex; align-items:center; gap:10px; margin-bottom:13px; flex-wrap:wrap}
  .search{position:relative; flex:1 1 240px; min-width:0}
  .search input{width:100%; font:inherit; font-size:13.5px; padding:9px 12px 9px 34px; border:1px solid var(--line-strong); border-radius:var(--radius-sm); background:var(--surface); color:var(--ink)}
  .search input:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-wash)}
  .search svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--faint)}
  .seg{display:inline-flex; border:1px solid var(--line-strong); border-radius:var(--radius-sm); overflow:hidden; background:var(--surface)}
  .seg button{font:inherit; font-weight:600; font-size:13px; border:0; background:transparent; color:var(--muted); padding:9px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:6px}
  .seg button[aria-pressed="true"]{background:var(--brand); color:#fff}
  .seg button[aria-pressed="true"].warnsel{background:var(--warn)}
  .seg svg{width:15px;height:15px}

  /* product media (photo slot, falls back to clean placeholder — never a barcode) */
  .media{position:relative; background:var(--surface-2); display:flex; align-items:center; justify-content:center; overflow:hidden}
  .media .ph{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:var(--brand-ink)}
  .media .ph .ini{font-family:"Space Grotesk",sans-serif; font-weight:600; font-size:20px}
  .media .ph .lbl{font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint)}
  .media img{position:relative; z-index:1; max-width:100%; max-height:100%; object-fit:contain}

  .cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px}
  .icard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column}
  .icard.is-exc{border-color:#EFCF86}
  .icard .media{height:104px; border-bottom:1px solid var(--line); padding:10px}
  .icard__body{padding:12px 13px; display:flex; flex-direction:column; gap:5px; flex:1}
  .icard__desc{font-weight:600; font-size:13.5px; line-height:1.3}
  .icard__sub{font-family:var(--mono); font-size:11px; color:var(--muted)}
  .icard__mv{margin-top:4px}
  .icard__foot{margin-top:auto; padding-top:8px; display:flex; align-items:flex-end; justify-content:space-between; gap:8px}
  .icard__qty{font-family:"Space Grotesk",sans-serif; font-size:22px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1}
  .icard__qty small{font-size:10.5px; color:var(--faint); font-weight:500; margin-left:3px}

  /* movement from -> to */
  .mv{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:12.5px; font-variant-numeric:tabular-nums}
  .mv .from{color:var(--muted)} .mv .to{font-weight:600}
  .mv .arr{color:var(--faint)}
  .mv.to-bad .to{color:var(--bad)}
  .mv.to-up .to{color:var(--ok)}
  .mv.to-down .to{color:var(--warn)} .mv.to-down .arr{color:var(--warn)}
  .add{font-family:var(--mono); font-weight:600; font-variant-numeric:tabular-nums}
  .add.pos{color:var(--ok)} .add.neg{color:var(--bad)}
  .addtag{margin-left:10px; padding-left:10px; border-left:1px solid var(--line)}
  td.mv-cell .mv{display:inline-flex}
  .listtop{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 16px; border-bottom:1px solid var(--line); background:var(--surface-2)}
  .listtop__val{font-size:13px; color:var(--muted)} .listtop__val b{color:var(--ink); font-family:var(--mono); font-size:14px; margin-left:4px}
  .listtop__cnt{font-size:12px; color:var(--faint); font-family:var(--mono)}
  .freshwrap{display:inline-flex; flex-direction:column; align-items:flex-end; gap:4px}
  .checked{font-size:12px; color:var(--muted); font-family:var(--mono)}
  .checked b{color:var(--ink); font-weight:600}
  .bcard .checked{align-self:flex-start; margin-top:2px}
  .traceprod{display:flex; align-items:center; gap:13px; margin:4px 0 18px}
  .traceprod .media{width:54px; height:54px; border-radius:9px; border:1px solid var(--line)}
  .traceprod .nm{font-weight:600; font-size:16px} .traceprod .sub{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .provtag{display:inline-block; font-size:11.5px; font-weight:600; padding:2px 9px; border-radius:20px; white-space:nowrap}
  .prov--from{color:var(--brand-ink); background:#E2F1F2}
  .prov--store{color:var(--muted); background:var(--surface-2)}
  .prov--out{color:var(--warn); background:var(--warn-wash)}
  .prov--in{color:var(--ok); background:var(--ok-wash)}
  .prov--neg{color:var(--warn); background:var(--warn-wash)}
  .prov--fixed{color:var(--viol); background:var(--viol-wash); white-space:normal}
  .provrow{margin-top:5px}
  .provsum{display:flex; flex-wrap:wrap; gap:8px 18px; align-items:center; margin:2px 0 14px; padding:11px 14px; background:var(--surface-2); border:1px solid var(--line); border-radius:12px; font-size:13px; color:var(--ink)}
  .provsum__i{display:inline-flex; align-items:center; gap:7px} .provsum__i b{font-weight:700}
  .provsum__sub{color:var(--muted); font-weight:500}
  .provsum__dot{width:9px; height:9px; border-radius:50%; flex:none}
  .provsum__dot.prov--from{background:var(--brand)} .provsum__dot.prov--fixed{background:var(--viol)} .provsum__dot.prov--neg{background:var(--warn)}
  .bcard__prov{display:flex; flex-direction:column; gap:3px; margin-top:11px; padding-top:11px; border-top:1px solid var(--line); font-size:12.5px; color:var(--muted)}
  .bcard__prov span{display:inline-flex; align-items:center; gap:6px} .bcard__prov b{color:var(--ink); font-weight:700}
  .seg--prov button[aria-pressed="true"].prov-from{background:var(--brand)} .seg--prov button[aria-pressed="true"].prov-fixed{background:var(--viol)} .seg--prov button[aria-pressed="true"].prov-neg{background:var(--warn)}
  .traceverdict{margin:-4px 0 10px; font-size:13.5px}
  .trace-ok{color:var(--ok); font-weight:600}
  .trace-warn{color:var(--warn); font-weight:600}
  .trace-muted{color:var(--muted)}
  td .add{white-space:nowrap}

  .tablecard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden}
  .tablescroll{overflow-x:auto}
  table{border-collapse:collapse; width:100%; min-width:560px}
  thead th{background:var(--surface-2); text-align:left; font-size:11.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); padding:11px 14px; border-bottom:1px solid var(--line)}
  th.num,td.num{text-align:right; font-family:var(--mono); font-variant-numeric:tabular-nums}
  tbody td{padding:11px 14px; border-bottom:1px solid var(--line); vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr.row{cursor:pointer}
  tbody tr.row:hover{background:var(--surface-2)}
  td.media-cell{width:54px; padding:6px 14px}
  td.media-cell .media{width:42px; height:42px; border-radius:7px; border:1px solid var(--line)}
  td.media-cell .ph .ini{font-size:13px}
  td.media-cell .ph .lbl{display:none}
  td.prod{min-width:220px}
  td.prod .nm{font-weight:600}
  td.prod .sub{font-family:var(--mono); font-size:11px; color:var(--muted)}
  td.time{color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums}
  td.time .since{display:block; font-size:11px; color:var(--faint)}
  tr.is-exc{background:var(--warn-wash)}
  tr.is-exc:hover{background:#FCEDC4}
  .pill{display:inline-block; font-size:11.5px; font-weight:600; padding:2px 9px; border-radius:20px}
  .pill--ok{color:var(--ok); background:var(--ok-wash)}
  .pill--exc{color:var(--warn); background:#FBE7B8}
  .branchtag{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--muted)}
  .branchtag .statusdot{width:7px; height:7px; box-shadow:none; animation:none}
  tr.detail td{background:var(--surface-2); padding:0}
  .fields{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:2px 22px; padding:14px 16px}
  .field{display:flex; gap:8px; font-size:12.5px; padding:3px 0; border-bottom:1px dotted var(--line)}
  .field b{color:var(--muted); font-weight:600; min-width:108px; flex:0 0 auto}
  .field span{font-family:var(--mono); color:var(--ink); word-break:break-word}

  .listfoot{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 4px 0; font-size:12.5px; color:var(--muted); flex-wrap:wrap}
  .tablecard .listfoot{padding:12px 16px; border-top:1px solid var(--line)}
  .linkbtn{font:inherit; font-weight:600; font-size:12.5px; color:var(--brand-ink); background:none; border:0; cursor:pointer; padding:0}
  .linkbtn:hover{text-decoration:underline}

  .board{margin-bottom:24px}
  .agetag{font-size:12px; font-weight:600; padding:2px 9px; border-radius:20px; display:inline-block}
  .age--live{color:var(--ok); background:var(--ok-wash)}
  .age--stale{color:var(--warn); background:var(--warn-wash)}
  .age--none{color:var(--muted); background:var(--surface-2)}
  .age--err{color:var(--bad); background:var(--bad-wash)}
  .sectionlabel{font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin:0 0 10px}

  .state{text-align:center; padding:50px 20px; color:var(--muted)}
  .state h3{font-family:"Space Grotesk",sans-serif; font-size:18px; color:var(--ink); margin:0 0 6px; font-weight:600}
  .state p{margin:0 auto; max-width:470px; font-size:13.5px}
  .state--err h3{color:var(--bad)}
  .demobar{display:flex; align-items:center; gap:9px; font-size:12.5px; font-weight:600; color:var(--warn); background:var(--warn-wash); border:1px solid #F2DFA8; border-radius:var(--radius-sm); padding:9px 13px; margin-bottom:14px}
  .demobar svg{width:15px; height:15px; flex:0 0 auto}

  .mapnote{margin-top:16px}
  .mapnote summary{cursor:pointer; font-size:12.5px; color:var(--muted); font-weight:600; list-style:none}
  .mapnote summary::-webkit-details-marker{display:none}
  .mapnote summary::before{content:"▸ "; color:var(--faint)}
  .mapnote[open] summary::before{content:"▾ "}
  .mapnote__body{margin-top:10px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; font-size:12.5px}
  .mapnote__row{display:flex; gap:10px; padding:4px 0}
  .mapnote__row b{min-width:108px; color:var(--muted); font-weight:600}
  .mapnote__row span{font-family:var(--mono); color:var(--ink)}
  .mapnote__row .miss{color:var(--bad)}

  .daynav{display:inline-flex; align-items:center; border:1px solid var(--line-strong); border-radius:var(--radius-sm); background:var(--surface); overflow:hidden}
  .daynav button{font:inherit; border:0; background:transparent; color:var(--ink); padding:8px 9px; cursor:pointer; display:inline-flex; align-items:center}
  .daynav button:hover:not(:disabled){background:var(--surface-2); color:var(--brand-ink)}
  .daynav button:disabled{color:var(--faint); cursor:default}
  .daynav .lbl{font-weight:600; font-size:13px; padding:0 8px; min-width:158px; text-align:center; font-variant-numeric:tabular-nums}
  .daynav .latest{font-weight:600; font-size:12px; border-left:1px solid var(--line)}
  .daynav svg{width:15px; height:15px}
  .scanline{display:flex; gap:10px; font-size:12.5px; padding:4px 0; border-bottom:1px dotted var(--line); font-family:var(--mono)}
  .scanline b{color:var(--muted); font-weight:600; min-width:74px; flex:0 0 auto}
  footer{border-top:1px solid var(--line); padding:18px 0; font-size:12px; color:var(--faint)}

  @media (max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:760px){.overview{grid-template-columns:1fr}}
  @media (max-width:560px){
    .kpis{grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:14px} .branchhead__name{font-size:21px}
    .kpi{padding:10px 12px} .kpi__label{font-size:10px}
    .kpi__value{font-size:18px; margin-top:2px} .kpi--age .kpi__value{font-size:14px}
    /* tabs: compact, snap-scroll, hide line-count chips (keep exceptions count) */
    /* tabs: fixed 4-across grid (wraps to rows of 4), no sideways scroll */
    .tabwrap{position:static}
    .tabwrap::after{display:none}
    .tabs{display:grid; grid-template-columns:repeat(4,1fr); gap:5px; overflow:visible; padding:8px 0 2px}
    .tab{flex:none; justify-content:center; text-align:center; gap:5px; padding:9px 4px; font-size:11.5px; line-height:1.15; border-radius:9px; white-space:normal; min-height:42px; background:var(--surface); border:1px solid var(--line)}
    .tab[aria-selected="true"]{background:#E2F1F2; border-color:transparent; color:var(--ink)}
    .tab[aria-selected="true"]::after{display:none}
    .tab .statusdot{width:7px; height:7px}
    .tab .tab__count{display:none}
    .tab--exc .tab__count{display:none}
    .seg--flow{overflow-x:auto; scrollbar-width:none} .seg--flow::-webkit-scrollbar{display:none}
    .seg--flow button{white-space:nowrap}
    /* product table: everything on one screen — image, product, movement+added, time */
    .tablescroll{overflow-x:visible}
    table{min-width:0; width:100%; table-layout:fixed}
    thead th, tbody td{padding:9px 8px}
    td.media-cell{width:40px; padding:7px 0 7px 10px}
    th.media-cell{width:40px}
    td.media-cell .media{width:34px; height:34px}
    td.prod{min-width:0} td.prod .nm{font-size:13.5px; line-height:1.25} td.prod .sub{font-size:10.5px}
    th.mv-cell, td.mv-cell{width:104px; white-space:nowrap}
    .mv{font-size:12px; gap:4px}
    .addtag{margin-left:6px; padding-left:6px}
    th.time-cell, td.time-cell{width:58px}
    td.time-cell .ts{display:none}            /* phone: show only "x ago", not the clock */
    td.time-cell .since{font-size:11px}
    .listtop{padding:9px 12px} .listtop__cnt{display:none}
    .scanline{flex-wrap:wrap}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}
</style>
</head>
<body>

function pad(d){const z=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;}

const state={ active:"__overview", data:{}, search:"", filter:"all", flow:"all", prov:"all", itemView:"table", expanded:{}, showAll:{}, log:[], lastUpdated:null, day:null, days:[], images:{map:null,count:0,total:0,error:null,urlKey:null,keyKey:null} };

/* CSV + gviz handling */
function parseCSV(text){
  const rows=[]; let row=[],field="",inQ=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false;} else field+=c; }
    else{ if(c==='"')inQ=true; else if(c===","){row.push(field);field="";}
      else if(c==="\n"){row.push(field);rows.push(row);row=[];field="";}
      else if(c==="\r"){} else field+=c; }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.length>1||(r.length===1&&r[0].trim()!==""));
}
// gviz returns date cells as Date(y,m,d,h,mi,s) with 0-based month
function cleanCell(v){
  if(v==null)return "";
  const m=/^Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)$/.exec(String(v).trim());
  if(m){const z=n=>String(n).padStart(2,"0");
    return `${+m[1]}-${z(+m[2]+1)}-${z(+m[3])} ${z(+(m[4]||0))}:${z(+(m[5]||0))}:${z(+(m[6]||0))}`;}
  return v;
}
function resolveCol(headers,name){
  if(name==null)return -1;
  return headers.findIndex(h=>h.trim().toLowerCase()===String(name).trim().toLowerCase());
}
function buildMap(headers){const m={};for(const k in CONFIG.columns)m[k]=resolveCol(headers,CONFIG.columns[k]);return m;}
function toNumber(v){if(v==null||v==="")return null;const n=parseFloat(String(v).replace(/[^0-9.\-]/g,""));return isNaN(n)?null:n;}
function normalise(rows){
  if(!rows.length)return{headers:[],map:{},items:[]};
  const headers=rows[0].map(h=>cleanCell(h).trim());
  const map=buildMap(headers);
  const items=rows.slice(1).map(r=>{
    const get=i=>(i>=0&&i<r.length)?cleanCell(r[i]):"";
    const o={ barcode:String(get(map.barcode)).replace(/\.0$/,""), description:get(map.description), size:get(map.size),
      qty:toNumber(get(map.qty)), qtyRaw:get(map.qty), value:toNumber(get(map.value)),
      before:toNumber(get(map.before)), after:toNumber(get(map.after)),
      time:(CONFIG.branchTimeUTC?utcToLocal(get(map.timestamp)):get(map.timestamp)), productId:String(get(map.productId)).replace(/\.0$/,""),
      ownCode:String(get(map.ownCode)||"").trim(),
      stock:get(map.stock), reason:get(map.reason),
      raw:headers.reduce((a,h,i)=>{a[h]=r[i]!==undefined?cleanCell(r[i]):"";return a;},{}) };
    o.isExc=!!CONFIG.isException(o);
    return o;
  });
  return{headers,map,items};
}
function gvizUrl(b){ return b.url || `https://docs.google.com/spreadsheets/d/${b.sheetId}/gviz/tq?tqx=out:csv`; }
function movementsUrl(m){ return m.url || `https://docs.google.com/spreadsheets/d/${m.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(m.tab||"Movements")}`; }

/* dd/mm/yyyy [hh:mm:ss] -> yyyy-mm-dd hh:mm:ss (so dayKey/newest work). Leaves yyyy-… untouched. */
function ukDate(s){const m=/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[ ,T]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/.exec(String(s||"").trim());
  if(!m)return s;const z=n=>String(n).padStart(2,"0");return `${m[3]}-${z(m[2])}-${z(m[1])} ${z(m[4]||0)}:${z(m[5]||0)}:${z(m[6]||0)}`;}

/* "yyyy-mm-dd hh:mm:ss" understood as UTC -> same format in the viewer's local timezone.
   Fixes branch scans showing ~1h stale on BST when the till stores UTC. */
function utcToLocal(s){const m=/^(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{2})(?::(\d{2}))?/.exec(String(s||"").trim());
  if(!m)return s;const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]||0));
  if(isNaN(d))return s;const z=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;}

/* trackMovementsAll "Movements" tab -> picco-shaped items, but before/after are REAL stock
   levels and qty is the signed delta. Reuses collapse/render so warehouse shows in-stock -> reduced-to. */
function normaliseMovements(rows){
  if(!rows.length)return{headers:[],map:{},items:[],movements:true};
  const r0=rows[0].map(c=>cleanCell(c).trim());
  const looksHeader=r0.some(c=>/^(barcode|before|after|delta|reason|product|name|date|branch)$/i.test(c));
  let idx,data;
  if(looksHeader){const H=r0.map(h=>h.toLowerCase());const f=(re,fb)=>{const i=H.findIndex(h=>re.test(h));return i<0?fb:i;};
    idx={date:f(/date|time/,0),branch:f(/branch/,1),barcode:f(/barcode|ean|^code$/,2),name:f(/name|product/,3),before:f(/before/,4),after:f(/after/,5),delta:f(/delta|change|qty/,6),reason:f(/reason|status|type/,8)};data=rows.slice(1);}
  else{idx={date:0,branch:1,barcode:2,name:3,before:4,after:5,delta:6,reason:8};data=rows;}
  const headers=["Date","Branch","Barcode","Product","Before","After","Delta","Suspicious","Reason"];
  let items=data.map(r=>{const g=i=>(i>=0&&i<r.length)?cleanCell(r[i]):"";
    const before=toNumber(g(idx.before)),after=toNumber(g(idx.after));
    let delta=toNumber(g(idx.delta));if(delta==null&&before!=null&&after!=null)delta=after-before;
    const reason=String(g(idx.reason)||"").trim();
    return{ barcode:String(g(idx.barcode)).replace(/\.0$/,""), ownCode:"", productId:"", description:g(idx.name), size:"",
      before, after, qty:delta, qtyRaw:(delta==null?"":String(delta)), value:null,
      time:ukDate(g(idx.date)), reason,
      raw:{Date:ukDate(g(idx.date)),Branch:g(idx.branch),Barcode:g(idx.barcode),Product:g(idx.name),Before:g(idx.before),After:g(idx.after),Delta:(delta==null?"":delta),Reason:reason},
      isExc:(after!=null&&after<0) };
  }).filter(it=>it.barcode||it.description);
  // Drop PHANTOM movements from a bad/empty stock snapshot: a single timestamp where many
  // products all drop to 0 (an empty export) and then get "re-delivered" next snapshot.
  // Those net to nothing and aren't real stock moving anywhere.
  const byTs={}; for(const it of items){(byTs[it.time]=byTs[it.time]||[]).push(it);}
  const badTs=new Set();
  for(const ts in byTs){const arr=byTs[ts], zeros=arr.filter(x=>x.after===0&&(x.before||0)>0).length;
    if(arr.length>=4 && zeros>=4 && zeros/arr.length>=0.5) badTs.add(ts);}
  let dropped=0;
  if(badTs.size){
    const phantom=new Set(); // barcode|day that suffered a phantom zero-out
    for(const it of items){if(badTs.has(it.time)&&it.after===0)phantom.add(it.barcode+"|"+dayKey(it.time));}
    items=items.filter(it=>{
      if(badTs.has(it.time)&&it.after===0){dropped++;return false;}                                  // the →0 leg
      if((it.before===0)&&(it.qty||0)>0&&phantom.has(it.barcode+"|"+dayKey(it.time))){dropped++;return false;} // the 0→ restore leg
      return true;});
  }
  return{headers,map:idx,items,movements:true,dropped};
}

  const d=`${z(now.getDate())}/${z(now.getMonth()+1)}/${now.getFullYear()} ${z(now.getHours())}:${z(now.getMinutes())}:${z(now.getSeconds())}`;

/* shopify-images feed -> { barcode/code : imageUrl } */
async function loadImages(){
  const out={map:null,count:0,total:0,error:null,urlKey:null,keyKey:null};
  if(!CONFIG.imagesFeedUrl)return out;
  try{
    const res=await fetch(CONFIG.imagesFeedUrl,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const text=await res.text();
    let records=null;
    try{const j=JSON.parse(text); if(Array.isArray(j))records=j; else if(j&&Array.isArray(j.rows))records=j.rows; else if(j&&Array.isArray(j.data))records=j.data; else if(j&&Array.isArray(j.values))records=j.values;}catch(e){}
    if(!records){const rows=parseCSV(text); if(rows.length){const hs=rows[0].map(h=>cleanCell(h).trim()); records=rows.slice(1).map(r=>hs.reduce((a,h,i)=>{a[h]=r[i]!==undefined?cleanCell(r[i]):"";return a;},{}));}}
    if(!records||!records.length)throw new Error("empty feed");
    const keys=Object.keys(records[0]);
    const urlKey=keys.find(k=>/^image\s*url$|^imageurl$|^image$|^url$|image_url|^img$|photo/i.test(k.trim()))
              || keys.find(k=>records.some(r=>/^https?:\/\//i.test(String(r[k]||""))));
    const keyKey=keys.find(k=>/^barcode$/i.test(k.trim()))
              || keys.find(k=>/barcode|ean|^bar$|^code$/i.test(k.trim()))
              || keys.find(k=>records.some(r=>/^\d{6,}$/.test(String(r[k]||"").trim()))) || keys[0];
    const map={};
    for(const r of records){const k=String(r[keyKey]||"").trim().replace(/\.0$/,"");const u=String(r[urlKey]||"").trim();if(k&&/^https?:\/\//i.test(u))map[k]=u;}
    out.map=map;out.total=records.length;out.count=Object.keys(map).length;out.urlKey=urlKey;out.keyKey=keyKey;
    return out;
  }catch(err){out.error=String(err.message||err);return out;}
}

async function loadBranch(b){
  const useMv=!!b.movements;
  try{
    const res=await fetch(useMv?movementsUrl(b.movements):gvizUrl(b),{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const text=await res.text();
    if(/^\s*</.test(text)) throw new Error(useMv?"Movements tab not shared / wrong tab name":"not shared for link access");
    const d=useMv?normaliseMovements(parseCSV(text)):normalise(parseCSV(text));
    if(!d.items.length) throw new Error(useMv?"no movement rows found":"empty sheet");
    return{demo:false,movements:useMv,checkedAt:new Date(),...d};
  }catch(err){
    if(useMv)return{demo:true,movements:true,error:String(err.message||err),...normaliseMovements(demoMovementRows())};
    return{demo:true, error:String(err.message||err), ...normalise([DEMO_HEADERS,...demoRows(b.key.length)])};
  }
}
async function loadAll(){
  setRefreshing(true);
  const [imgs, ...results]=await Promise.all([loadImages(), ...CONFIG.branches.map(loadBranch)]);
  state.images=imgs;
  CONFIG.branches.forEach((b,i)=>state.data[b.key]=results[i]);
  buildDays(); resolveDay();
  state.lastUpdated=new Date(); logCheck(state.lastUpdated);
  setRefreshing(false);
  renderTabs();renderPanel();renderUpdated();renderFooter();
}
function logCheck(at){
  const e={at,branches:{}};
  for(const b of CONFIG.branches){const d=state.data[b.key];let r={lines:null,exc:0,ageMin:null,demo:false};
    if(d&&d.items){const n=newest(d.items);r.lines=d.items.length;r.exc=branchExceptions(d).length;r.demo=!!d.demo;r.ageMin=n?Math.max(0,Math.round((at.getTime()-n.getTime())/60000)):null;}
    e.branches[b.key]=r;}
  state.log.unshift(e); if(state.log.length>150)state.log.pop();
}

/* freshness */
function newest(items){let max=null;for(const it of items){if(!it.time)continue;const d=new Date(String(it.time).replace(/-/g,"/").replace("T"," "));if(!isNaN(d)){if(!max||d>max)max=d;}}return max;}
function freshness(d){if(!d)return{cls:"none",label:"No timestamp",dot:"none"};const m=Math.round((Date.now()-d.getTime())/60000);
  if(m<=0)return{cls:"live",label:"Live · just now",dot:"live"};
  if(m<=CONFIG.staleAfterMinutes)return{cls:"live",label:"Live · "+ago(m),dot:"live"};
  return{cls:"stale",label:"Stale · "+ago(m),dot:"stale"};}
function ago(m){if(m<1)return"just now";if(m<60)return m+" min ago";const h=Math.floor(m/60);if(h<24)return h+(h===1?" hr ago":" hrs ago");const dys=Math.floor(h/24);return dys+(dys===1?" day ago":" days ago");}
function agoShort(d){if(!d)return"—";return ago(Math.max(0,Math.round((Date.now()-d.getTime())/60000)));}
function timeOnly(t){const m=/\d{4}-\d{1,2}-\d{1,2}[ T](\d{1,2}:\d{2}(?::\d{2})?)/.exec(String(t||""));return m?m[1]:(String(t||"").trim()||"—");}
/* dual readout: when the till last SCANNED vs when the monitor last CHECKED (read) the sheet */
function freshBlock(d){
  const n=newest(d.items), f=freshness(n);
  const scan=n?agoShort(n):"no scans yet";
  const checked=d.demo?"sample":(d.checkedAt?ago(Math.max(0,Math.round((Date.now()-d.checkedAt.getTime())/60000))):"—");
  return `<div class="freshwrap">
    <span class="freshness freshness--${f.cls}"><span class="statusdot statusdot--${f.dot}"></span>Scan · ${esc(scan)}</span>
    <span class="checked">Checked <b>${esc(checked)}</b></span></div>`;
}

/* helpers */
const $=(s,el=document)=>el.querySelector(s);
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmt(n){return n==null?"—":n.toLocaleString("en-GB");}
function money(n){return n==null?"—":"£"+n.toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});}
function branchExceptions(d){return(d&&d.items)?d.items.filter(i=>i.isExc):[];}
function totalExceptions(){return CONFIG.branches.reduce((a,b)=>{const d=state.data[b.key];return a+(d&&d.items?branchExceptions(d).length:0);},0);}
function initials(name){const w=String(name||"").trim().split(/\s+/).filter(Boolean);return ((w[0]?w[0][0]:"")+(w[1]?w[1][0]:"")||"·").toUpperCase();}
function imageSrc(it){
  const M=state.images&&state.images.map;
  if(M){const u=M[(it.barcode||"").trim()]||M[(it.ownCode||"").trim()];if(u)return u;}
  const p=CONFIG.imageUrlPattern;
  if(p)return p.replace(/\{barcode\}/gi,encodeURIComponent(it.barcode||"")).replace(/\{productId\}/gi,encodeURIComponent(it.productId||""));
  return"";
}
function mediaHTML(it){const src=imageSrc(it);
  return `<div class="media"><span class="ph"><span class="ini">${esc(initials(it.description))}</span><span class="lbl">no photo</span></span>${src?`<img loading="lazy" src="${esc(src)}" alt="" onerror="this.remove()">`:""}</div>`;}
function mvHTML(it){const a=it.after, b=it.before;
  const cls=(a!=null&&a<0)?"to-bad":((it.qty||0)>0?"to-up":"");
  return `<span class="mv ${cls}"><span class="from">${b==null?"·":b}</span><span class="arr">→</span><span class="to">${a==null?"·":a}</span></span>`;}
function addHTML(it){const q=it.qty;if(q==null)return esc(it.qtyRaw)||"—";return `<span class="add ${q<0?"neg":"pos"}">${q>0?"+":""}${fmt(q)}</span>`;}
function addNum(q){if(q==null)return "—";return `<span class="add ${q<0?"neg":"pos"}">${q>0?"+":""}${fmt(q)}</span>`;}
function mvPair(from,to){const cls=(to!=null&&to<0)?"to-bad":((to!=null&&from!=null&&to>from)?"to-up":((to!=null&&from!=null&&to<from)?"to-down":""));
  return `<span class="mv ${cls}"><span class="from">${from==null?"·":from}</span><span class="arr">→</span><span class="to">${to==null?"·":to}</span></span>`;}

/* ---- day handling ---- */
function dayKey(t){const s=String(t||"");const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(s);if(m)return m[1]+"-"+m[2]+"-"+m[3];
  const d=new Date(s.replace(/-/g,"/"));if(!isNaN(d)){const z=n=>String(n).padStart(2,"0");return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());}return "";}
function buildDays(){const set=new Set();for(const b of CONFIG.branches){const d=state.data[b.key];if(d&&d.items)for(const it of d.items){const k=dayKey(it.time);if(k)set.add(k);}}state.days=[...set].sort();}
function resolveDay(){if(!state.days.length){state.day=null;return;}if(!state.day||state.days.indexOf(state.day)<0)state.day=state.days[state.days.length-1];}
function itemsForDay(items){if(!state.day)return items;return items.filter(it=>dayKey(it.time)===state.day);}
function humanDay(dk){if(!dk)return "All dates";const [y,m,d]=dk.split("-").map(Number);const dt=new Date(y,m-1,d);
  const wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()], mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1];
  const now=new Date(),z=n=>String(n).padStart(2,"0");
  const tk=now.getFullYear()+"-"+z(now.getMonth()+1)+"-"+z(now.getDate());
  const ye=new Date(now.getTime()-864e5),yk=ye.getFullYear()+"-"+z(ye.getMonth()+1)+"-"+z(ye.getDate());
  const suffix=dk===tk?" · Today":dk===yk?" · Yesterday":"";
  return `${wd} ${d} ${mo}${y!==now.getFullYear()?" "+y:""}${suffix}`;}
function daynavHTML(){const idx=state.days.indexOf(state.day);const atStart=idx<=0,atEnd=idx<0||idx>=state.days.length-1;
  return `<div class="daynav" role="group" aria-label="Day">
    <button data-day="prev" ${atStart?"disabled":""} aria-label="Previous day"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    <span class="lbl">${esc(humanDay(state.day))}</span>
    <button data-day="next" ${atEnd?"disabled":""} aria-label="Next day"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
    <button class="latest" data-day="latest" ${atEnd?"disabled":""}>Latest</button></div>`;}

/* ---- collapse scan-pairs into one row per product (for the selected day) ---- */
function firstNonNull(a){for(const v of a)if(v!=null)return v;return null;}
function lastNonNull(a){for(let i=a.length-1;i>=0;i--)if(a[i]!=null)return a[i];return null;}
function tval(t){return Date.parse(String(t).replace(/-/g,"/"))||0;}
function collapse(items){
  const groups=new Map();
  for(const it of items){const key=(it.barcode||it.ownCode||it.productId||it.description||"?").trim();
    if(!groups.has(key))groups.set(key,[]);groups.get(key).push(it);}
  const out=[];
  for(const grp of groups.values()){
    grp.sort((a,b)=>{const d=tval(a.time)-tval(b.time);if(d)return d;return (toNumber(a.raw&&a.raw.TransactionID)||0)-(toNumber(b.raw&&b.raw.TransactionID)||0);});
    const rep=grp.find(g=>g.description)||grp[0];
    const from=firstNonNull(grp.map(g=>g.before)), to=lastNonNull(grp.map(g=>g.after));
    // "added" is measured FROM ZERO: clearing a negative (oversold) balance up to 0 is NOT stock arriving,
    // only the part at/above 0 counts. e.g. -1 -> 4 is +4, not +5; 2 -> 6 is +4; 610 -> 500 is -110.
    const fz=v=>Math.max(0, v==null?0:v);
    const added=fz(to)-fz(from), value=grp.reduce((a,g)=>a+(g.value||0),0);
    out.push({ barcode:rep.barcode, ownCode:rep.ownCode, productId:rep.productId, description:rep.description, size:rep.size,
      from, to, added, value, net:(to==null?0:to)-(from==null?0:from), scans:grp, count:grp.length, time:grp[grp.length-1].time,
      isExc:grp.some(g=>g.isExc)||(to!=null&&to<0) });
  }
  out.sort((a,b)=>tval(b.time)-tval(a.time));
  return out;
}
function applyFlow(products){
  if(state.flow==="added")return products.filter(p=>p.net>0||(p.net===0&&p.added>0));
  if(state.flow==="reduced")return products.filter(p=>p.net<0);
  if(state.flow==="exc")return products.filter(p=>p.isExc);
  return products;
}

function matchSearch(p){const q=state.search.trim().toLowerCase();if(!q)return true;return ((p.barcode||"")+" "+(p.description||"")).toLowerCase().includes(q);}
function listFoot(cap,total,key){return `<div class="listfoot"><span>Showing ${fmt(cap)} of ${fmt(total)} products</span>${cap<total?`<button class="linkbtn" data-showall="${key}">Show all ${fmt(total)}</button>`:""}</div>`;}

/* warehouse "scanned OUT" history: barcode -> [{day, qty}] of units that left the warehouse */
function normBar(b){return String(b==null?"":b).trim().replace(/\.0$/,"");}
function dayNum(dk){const m=/^(\d{4})-(\d{1,2})-(\d{1,2})/.exec(String(dk||""));return m?Math.round(Date.UTC(+m[1],+m[2]-1,+m[3])/864e5):null;}
function warehouseOutMap(){
  const wb=CONFIG.branches.find(b=>b.movements); if(!wb)return null;
  const d=state.data[wb.key]; if(!d||!d.items)return null;
  if(d.demo)return {demo:true,by:{}};
  const by={};
  for(const it of d.items){ if((it.qty||0)<0){ const bc=normBar(it.barcode), dk=dayKey(it.time); if(!bc||!dk)continue; (by[bc]=by[bc]||[]).push({day:dk,qty:-(it.qty||0)}); } }
  return {demo:false,by};
}
/* was the item in a negative / not-stock-controlled state? (oversold value, negative stock, or flagged exception) */
function wasNegative(p){
  if(p.isExc)return true;
  if(p.scans&&p.scans.some(s=>toNumber(s.stock)<0))return true;
  if(p.from!=null&&p.from<0)return true;
  return false;
}
/* classify one shop product by warehouse provenance within the lookback window.
   kind: "from" (clean warehouse transfer) | "fixed" (warehouse top-up of a negative/oversold item) | "neg" (no warehouse dispatch). */
function classifyProv(p,wh){
  if(!wh||wh.demo)return null;
  const list=wh.by[normBar(p.barcode)], pd=dayNum(dayKey(p.time)), N=CONFIG.transferLookbackDays||0;
  let out=0,when=null,wd=-1;
  if(list&&pd!=null){for(const e of list){const ed=dayNum(e.day); if(ed==null)continue; const diff=pd-ed; if(diff>=0&&diff<=N){out+=e.qty; if(ed>wd){wd=ed;when=e.day;}}}}
  if(out>0)return {kind:wasNegative(p)?"fixed":"from",out,when};
  return {kind:"neg",out:0,when:null};
}
function provTag(p,wh){
  const c=classifyProv(p,wh); if(!c)return ""; const N=CONFIG.transferLookbackDays||0;
  if(c.kind==="fixed")return `<span class="provtag prov--fixed" title="stock had gone negative (not stock-controlled); warehouse sent ${fmt(c.out)} on ${esc(c.when)} to top it up">warehouse top-up · was negative</span>`;
  if(c.kind==="from")return `<span class="provtag prov--from" title="warehouse scanned out ${fmt(c.out)} on ${esc(c.when)} (within ${fmt(N)} days)">warehouse transfer</span>`;
  return `<span class="provtag prov--neg" title="no warehouse dispatch in the ${fmt(N)} days before this scan">negative scanned in</span>`;
}
/* per shop-branch totals for the selected day: how much came from the warehouse, and how much of that
   was topping up a negative item. Units = what the shop actually scanned in (matches the +N on each row). */
function provStats(d){
  const wh=warehouseOutMap();
  if(!wh||wh.demo||!d||!d.items||d.movements)return null;
  const products=collapse(itemsForDay(d.items));
  const s={whItems:0,whUnits:0,topItems:0,topUnits:0,negItems:0,negUnits:0};
  for(const p of products){const c=classifyProv(p,wh); if(!c)continue; const u=Math.max(0,Math.round(p.added||0));
    if(c.kind==="from"){s.whItems++;s.whUnits+=u;}
    else if(c.kind==="fixed"){s.whItems++;s.whUnits+=u;s.topItems++;s.topUnits+=u;}
    else{s.negItems++;s.negUnits+=u;}}
  return s;
}
function applyProv(products){
  if(!state.prov||state.prov==="all")return products;
  const wh=warehouseOutMap(); if(!wh||wh.demo)return products;
  return products.filter(p=>{const c=classifyProv(p,wh); return c&&c.kind===state.prov;});
}

  for(let i=0;i<cap;i++){const p=products[i];const tag=wh?provTag(p,wh):"";
    html+=`<div class="icard ${p.isExc?"is-exc":""}">${mediaHTML(p)}

        <div class="icard__desc">${esc(p.description)||"—"}</div>

function tableHTML(products,key,withBranch,showProv){

  let rows="";
  for(let i=0;i<cap;i++){const p=products[i];const id=key+"_"+i;const open=state.expanded[id];const tag=wh?provTag(p,wh):"";
    rows+=`<tr class="row ${p.isExc?"is-exc":""}" data-id="${id}">
      ${withBranch?`<td><span class="branchtag"><span class="statusdot statusdot--live"></span>${esc(p._branch)}</span></td>`:""}

      <td class="prod"><div class="nm">${esc(p.description)||"—"}</div><div class="sub">${esc(p.barcode)||"—"}${p.size?" · "+esc(p.size):""}</div>${tag?`<div class="provrow">${tag}</div>`:""}</td>
      <td class="mv-cell">${mvPair(p.from,p.to)}<span class="addtag">${addNum(p.added)}</span></td>
      <td class="time time-cell"><span class="ts">${timeOnly(p.time)}</span><span class="since">${p.time?agoShort(new Date(String(p.time).replace(/-/g,"/"))):""}</span></td></tr>`;
    if(open){const span=4+(withBranch?1:0);
      const sc=(p.scans||[]).map(s=>`<div class="scanline"><b>${esc(timeOnly(s.time)||"—")}</b><span>${mvPair(s.before,s.after)} &nbsp; ${addNum(s.qty)} &nbsp; ${money(s.value)}${s.reason?" &nbsp; "+(p.scans&&p.scans[0]&&p.scans[0].reason&&isNaN(+s.reason)?esc(s.reason):"RC "+esc(s.reason)):""}</span></div>`).join("");
      rows+=`<tr class="detail"><td colspan="${span}"><div style="padding:14px 16px"><div class="sectionlabel">${fmt(p.count)} scan${p.count===1?"":"s"} this day</div>${sc}</div></td></tr>`;}
  }
  const top=`<div class="listtop"><span class="listtop__val">Total value<b>${money(totalVal)}</b></span><span class="listtop__cnt">${fmt(products.length)} product${products.length===1?"":"s"}</span></div>`;
  return `<div class="tablecard">${top}<div class="tablescroll"><table>
    <thead><tr>${withBranch?"<th>Branch</th>":""}<th class="media-cell"></th><th>Product</th><th class="mv-cell">From → To · Added</th><th class="time-cell">Time</th></tr></thead>
    <tbody>${rows}</tbody></table></div>${listFoot(cap,products.length,key)}</div>`;
}

function mapNote(d){
  const rows=Object.entries(d.map).map(([k,ix])=>`<div class="mapnote__row"><b>${k}</b><span class="${ix>=0?"":"miss"}">${ix>=0?esc(d.headers[ix]):"not found"}</span></div>`).join("");
  const im=state.images||{};
  let matched=0; if(im.map){for(const it of d.items){if(im.map[(it.barcode||"").trim()]||im.map[(it.ownCode||"").trim()])matched++;}}
  const imgLine = im.error
    ? `<div class="mapnote__row"><b>images</b><span class="miss">feed error — ${esc(im.error)}</span></div>`
    : (im.map
        ? `<div class="mapnote__row"><b>images</b><span>${fmt(matched)} of ${fmt(d.items.length)} rows matched · feed "${esc(im.keyKey)}" → "${esc(im.urlKey)}" (${fmt(im.count)} mapped)</span></div>`
        : `<div class="mapnote__row"><b>images</b><span class="miss">feed not loaded yet</span></div>`);
  return `<details class="mapnote"><summary>Column mapping &amp; image match</summary><div class="mapnote__body">${rows}${imgLine}</div></details>`;
}

    if(!d){cards+=`<div class="bcard"><div class="bcard__name">${esc(b.name)}</div><p class="lede">Loading…</p></div>`;continue;}

function renderBranch(b){

  const units=d.movements?dayItems.reduce((a,i)=>a+(i.qty||0),0):products.reduce((a,p)=>a+(p.added||0),0);
  const n=newest(d.items),f=freshness(n);

  return `<div class="branchhead"><div class="branchhead__name">${esc(b.name)}</div>

function renderExceptions(){
  const all=[];
  for(const b of CONFIG.branches){const d=state.data[b.key];if(d&&d.items){
    collapse(itemsForDay(d.items)).filter(p=>p.isExc).forEach(p=>all.push(Object.assign({_branch:b.name},p)));}}
  const view=all.filter(matchSearch);
  const head=`<div class="branchhead"><div class="branchhead__name">Exceptions</div>
    <span class="freshness freshness--${all.length?"stale":"live"}"><span class="statusdot statusdot--${all.length?"stale":"live"}"></span>${all.length?fmt(all.length)+" to check":"All clear"}</span></div>

  if(!all.length)return head+`<div class="tablecard"><div class="state"><h3>Nothing flagged</h3><p>Every product on this day reconciles.</p></div></div>`;

function renderLog(){
  let board="";
  for(const b of CONFIG.branches){const d=state.data[b.key];
    if(!d){board+=`<tr><td>${esc(b.name)}</td><td>—</td><td>—</td><td class="num">—</td><td class="num">—</td><td>—</td></tr>`;continue;}
    const n=newest(d.items),f=freshness(n);
    board+=`<tr><td><span class="statusdot statusdot--${f.dot}"></span> ${esc(b.name)}</td><td class="time">${n?pad(n):"—"}</td>
      <td><span class="agetag age--${f.cls}">${esc(f.label)}</span></td><td class="num">${fmt(d.items.length)}</td>
      <td class="num">${fmt(branchExceptions(d).length)}</td><td>${d.demo?"sample":"live"}</td></tr>`;}
  let logRows="";
  for(const e of state.log){let cells="";
    for(const b of CONFIG.branches){const r=e.branches[b.key];let cls="age--none",txt="—";
      if(r&&r.ageMin!=null){cls=r.ageMin<=CONFIG.staleAfterMinutes?"age--live":"age--stale";txt=ago(r.ageMin);}
      else if(r&&r.lines!=null){txt="no time";}
      cells+=`<td><span class="agetag ${cls}">${txt}</span></td>`;}
    logRows+=`<tr><td class="time">${e.at.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</td>${cells}</tr>`;}
  const heads=CONFIG.branches.map(b=>`<th>${esc(b.name)}</th>`).join("");
  const last=state.lastUpdated, z=n=>String(n).padStart(2,"0");
  const lastStr=last?`${z(last.getHours())}:${z(last.getMinutes())}:${z(last.getSeconds())}`:"—";
  const nextStr=(last&&CONFIG.refreshMinutes)?(()=>{const t=new Date(last.getTime()+CONFIG.refreshMinutes*6e4);return `${z(t.getHours())}:${z(t.getMinutes())}`;})():"—";
  const sched=`<p class="sectionlabel">What updates when</p>
    <div class="tablecard"><div class="tablescroll"><table><thead><tr><th>Step</th><th>How often</th><th>What it does</th></tr></thead><tbody>
      <tr><td>Till export (each shop PC)</td><td>every 3 min</td><td>writes the latest scans to picco.csv</td></tr>
      <tr><td>Sheet import (Apps Script)</td><td>every 10 min</td><td>loads picco.csv into each branch's picco sheet</td></tr>
      <tr><td>Warehouse stock snapshot</td><td>~hourly (8×/day)</td><td>diffs warehouse stock → Movements (deliveries / removals)</td></tr>
      <tr><td>This monitor re-reads sheets</td><td>every ${fmt(CONFIG.refreshMinutes)} min</td><td>last checked <b>${esc(lastStr)}</b> · next ≈ <b>${esc(nextStr)}</b></td></tr>
    </tbody></table></div></div>
    <p class="lede" style="margin-top:6px">A fresh scan can take up to ~13 min to reach this page (3-min export + 10-min import), plus up to ${fmt(CONFIG.refreshMinutes)} more for the page to pull it. Warehouse stock changes show after the next hourly snapshot.</p>`;
  return `<div class="branchhead"><div class="branchhead__name">Update log</div></div>
    <p class="lede">How long since each branch last scanned, and a running log of every refresh this session. If an age stops shrinking, that branch's export or importer has stalled. (Resets on reload — say the word for a permanent sheet-backed log.)</p>
    ${sched}
    <p class="sectionlabel">Freshness now</p>
    <div class="tablecard board"><div class="tablescroll"><table><thead><tr><th>Branch</th><th>Last scan</th><th>Age</th><th class="num">Lines</th><th class="num">Exceptions</th><th>Source</th></tr></thead><tbody>${board}</tbody></table></div></div>
    <p class="sectionlabel">Refresh log · ${fmt(state.log.length)} check${state.log.length===1?"":"s"}</p>
    <div class="tablecard"><div class="tablescroll"><table><thead><tr><th>Checked at</th>${heads}</tr></thead><tbody>${logRows||`<tr><td colspan="${CONFIG.branches.length+1}" style="padding:16px;color:var(--muted)">No checks yet.</td></tr>`}</tbody></table></div></div>`;
}

/* ---- barcode trace across branches + warehouse ---- */
function traceEvents(query){
  const q=String(query||"").trim().toLowerCase(); if(!q)return [];
  const evs=[];
  for(const b of CONFIG.branches){const d=state.data[b.key]; if(!d||!d.items)continue;
    for(const it of d.items){
      const hay=((it.barcode||"")+" "+(it.description||"")).toLowerCase();
      if(!hay.includes(q))continue;
      evs.push({key:b.key,branch:b.name,movements:!!d.movements,time:it.time,day:dayKey(it.time),
        from:it.before,to:it.after,qty:it.qty,reason:it.reason,desc:it.description,size:it.size,barcode:it.barcode});
    }}
  return evs;
}
function renderTrace(){
  const head=`<div class="branchhead"><div class="branchhead__name">Trace a product</div></div>
    <p class="lede">Search a barcode (or name). For each day it shows what each shop <b>scanned IN</b> and how much the Warehouse <b>scanned OUT</b> — so if Roundhay took in 6, you can see whether the warehouse dispatched 6.</p>
    ${toolbar({day:false,flow:false,view:false})}`;
  const q=state.search.trim();
  if(!q)return head+`<div class="tablecard"><div class="state"><h3>Enter a barcode</h3><p>Type a barcode or product name above to trace it across the shops and warehouse.</p></div></div>`;
  const evs=traceEvents(q);
  if(!evs.length)return head+`<div class="tablecard"><div class="state"><h3>Nothing found</h3><p>No activity for “${esc(q)}” in the loaded data (the feeds usually hold the last day or two).</p></div></div>`;
  const rep=evs.find(e=>e.desc)||evs[0];
  const prod=`<div class="traceprod">${mediaHTML({description:rep.desc,barcode:rep.barcode})}<div><div class="nm">${esc(rep.desc)||"—"}</div><div class="sub">${esc(rep.barcode||q)}</div></div></div>`;
  const days=[...new Set(evs.map(e=>e.day))].filter(Boolean).sort().reverse();
  let blocks="";
  for(const day of days){
    const de=evs.filter(e=>e.day===day);
    let whOut=0, whIn=0; const byBranch=new Map();
    for(const e of de){
      if(e.movements){ if((e.qty||0)<0)whOut+=-(e.qty); else if((e.qty||0)>0)whIn+=(e.qty||0); }
      else{ const o=byBranch.get(e.key)||{name:e.branch,inq:0,count:0,last:e.time}; o.inq+=(e.qty||0); o.count++; if(tval(e.time)>tval(o.last))o.last=e.time; byBranch.set(e.key,o); }
    }
    const totalIn=[...byBranch.values()].reduce((a,o)=>a+o.inq,0);
    let rows="";
    for(const o of byBranch.values()){
      const tag = whOut>0 ? `<span class="provtag prov--from">likely from warehouse</span>` : `<span class="provtag prov--store">in-store / supplier</span>`;
      rows+=`<tr><td class="prod"><div class="nm">${esc(o.name)}</div><div class="sub">${fmt(o.count)} scan${o.count===1?"":"s"} · last ${esc(timeOnly(o.last))}</div></td>
        <td><span class="add pos">scanned IN +${fmt(o.inq)}</span></td><td style="text-align:right">${tag}</td></tr>`;
    }
    if(whOut>0)rows+=`<tr><td class="prod"><div class="nm">Warehouse</div></td><td><span class="add neg">scanned OUT −${fmt(whOut)}</span></td><td style="text-align:right"><span class="provtag prov--out">dispatched</span></td></tr>`;
    if(whIn>0)rows+=`<tr><td class="prod"><div class="nm">Warehouse</div></td><td><span class="add pos">delivered IN +${fmt(whIn)}</span></td><td style="text-align:right"><span class="provtag prov--in">delivery</span></td></tr>`;
    let verdict="";
    if(byBranch.size&&whOut>0) verdict = (totalIn===whOut)
      ? `<span class="trace-ok">✓ Matches — shops took in ${fmt(totalIn)}, warehouse sent out ${fmt(whOut)}</span>`
      : `<span class="trace-warn">Shops took in ${fmt(totalIn)} · warehouse sent out ${fmt(whOut)}${totalIn>whOut?" (more taken in than warehouse dispatched)":" (warehouse sent out more than shops logged)"}</span>`;
    else if(byBranch.size) verdict = `<span class="trace-muted">No warehouse dispatch this day — added in-store / from supplier</span>`;
    blocks+=`<p class="sectionlabel">${esc(humanDay(day))}</p>${verdict?`<p class="traceverdict">${verdict}</p>`:""}<div class="tablecard"><div class="tablescroll"><table><tbody>${rows}</tbody></table></div></div>`;
  }
  return head+prod+blocks;
}

function renderPanel(){
  resolveDay();
  const panel=$("#panel");panel.classList.remove("panel");void panel.offsetWidth;panel.classList.add("panel");
  if(state.active==="__overview")panel.innerHTML=renderOverview();
  else if(state.active==="__exc")panel.innerHTML=renderExceptions();
  else if(state.active==="__trace")panel.innerHTML=renderTrace();
  else if(state.active==="__log")panel.innerHTML=renderLog();
  else panel.innerHTML=renderBranch(CONFIG.branches.find(x=>x.key===state.active));
  wirePanel();
}
function wirePanel(){
  const s=$("#search");if(s)s.addEventListener("input",e=>{state.search=e.target.value;renderPanel();const f=$("#search");if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length);}});
  document.querySelectorAll(".seg button[data-flow]").forEach(b=>b.addEventListener("click",()=>{state.flow=b.dataset.flow;renderPanel();}));
  document.querySelectorAll(".seg button[data-prov]").forEach(b=>b.addEventListener("click",()=>{state.prov=b.dataset.prov;renderPanel();}));
  document.querySelectorAll(".seg button[data-v]").forEach(b=>b.addEventListener("click",()=>{state.itemView=b.dataset.v;renderPanel();}));
  document.querySelectorAll(".daynav button[data-day]").forEach(b=>b.addEventListener("click",()=>{
    const idx=state.days.indexOf(state.day);
    if(b.dataset.day==="prev"&&idx>0)state.day=state.days[idx-1];
    else if(b.dataset.day==="next"&&idx>=0&&idx<state.days.length-1)state.day=state.days[idx+1];
    else if(b.dataset.day==="latest"&&state.days.length)state.day=state.days[state.days.length-1];
    state.expanded={}; renderPanel();
  }));
  document.querySelectorAll(".bcard[data-key]").forEach(c=>{const go=()=>{state.active=c.dataset.key;state.search="";state.flow="all";renderTabs();renderPanel();window.scrollTo({top:0,behavior:"smooth"});};
    c.addEventListener("click",go);c.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}});});
  document.querySelectorAll("tr.row").forEach(tr=>tr.addEventListener("click",()=>{const id=tr.dataset.id;state.expanded[id]=!state.expanded[id];renderPanel();}));
  document.querySelectorAll("[data-showall]").forEach(b=>b.addEventListener("click",()=>{state.showAll[b.dataset.showall]=true;renderPanel();}));
}
function renderUpdated(){const el=$("#updated");if(!state.lastUpdated){el.textContent="";return;}
  el.innerHTML=`Updated <b>${state.lastUpdated.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</b>${CONFIG.refreshMinutes?` · auto every ${CONFIG.refreshMinutes} min`:""}`;}
function renderFooter(){$("#footer").innerHTML="PICCO scan monitor · reads each branch's picco sheet directly · imports run every 10 min, exports every 3 min.";}
function setRefreshing(on){const b=$("#refresh");if(!b)return;b.classList.toggle("spin",on);b.disabled=on;}

$("#refresh").addEventListener("click",loadAll);
renderTabs();renderPanel();loadAll();
if(CONFIG.refreshMinutes>0)setInterval(loadAll,CONFIG.refreshMinutes*60000);
</script>
