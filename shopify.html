<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC · Not on Shopify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --red:#cc0000;--redbg:#fff0f0;--redtxt:#991b1b;
  --green:#15803d;--greenbg:#f0fdf4;--greentxt:#14532d;
  --amber:#b45309;--amberbg:#fffbeb;--ambertxt:#92400e;
  --bg:#f0f0f0;--s1:#fff;--border:#e0e0e0;
  --ink:#111;--sub:#777;--r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:30px}
.hdr{background:var(--red);padding:14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.title{color:#fff;font-size:18px;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px;font-family:monospace}
.back-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:7px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-block;white-space:nowrap}

.section-hdr{background:var(--s1);padding:10px 12px;border-bottom:1px solid var(--border)}
.section-lbl{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.branch-pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.branch-pills::-webkit-scrollbar{display:none}
.bpill{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--s1);color:var(--sub);white-space:nowrap}
.bpill.on{background:var(--red);color:#fff;border-color:var(--red)}

.status-bar{background:var(--s1);padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--sub);line-height:1.5}
.status-bar b{color:var(--ink);font-weight:600}
.refresh-link{background:none;border:none;color:#3b82f6;text-decoration:underline;cursor:pointer;font-size:inherit;padding:0;font-family:inherit}

.progress-card{margin:14px;padding:18px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);text-align:center}
.progress-card .pc-title{font-size:14px;font-weight:700;margin-bottom:6px}
.progress-card .pc-sub{font-size:11px;color:var(--sub);line-height:1.6}
.progress-card .pc-count{font-size:22px;font-weight:700;color:var(--red);font-family:monospace;margin-top:8px}
.progress-card .spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

.dept-hdr{padding:10px 14px 6px;background:var(--bg)}
.dept-name{font-size:14px;font-weight:700}
.dept-sub{font-size:10px;color:var(--sub);margin-top:2px}

.card-list{background:var(--s1);margin:8px 11px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.shop-card{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:10px 12px;gap:9px;align-items:flex-start}
.shop-card:last-child{border-bottom:none}
.shop-img{flex-shrink:0;width:50px;height:50px;background:var(--bg);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.shop-img img{width:50px;height:50px;object-fit:cover}
.shop-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.shop-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.25}
.shop-bc{font-size:10px;color:var(--sub);font-family:monospace;font-weight:600}
.shop-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.itag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;background:var(--bg);color:var(--sub)}
.itag-stock{background:var(--greenbg);color:var(--greentxt)}
.shop-status{font-size:10px;margin-top:4px;line-height:1.4}
.shop-right{flex-shrink:0;display:flex;align-items:center}
.shop-add-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:9px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap}
.shop-add-btn:disabled{opacity:.55;cursor:wait}
.shop-add-btn:active{opacity:.85}
.shop-card.added{opacity:.55}
.shop-card.added .shop-name{text-decoration:line-through}
.shop-brand{display:flex;align-items:center;gap:6px;margin-top:6px}
.shop-brand label{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.brand-input{flex:1;min-width:0;font-size:11px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);color:var(--ink);background:var(--s1)}
.brand-input.needed{border-color:var(--amber);background:var(--amberbg)}
.brand-input:focus{outline:none;border-color:var(--red)}

.empty{padding:40px 14px;text-align:center;color:var(--sub);font-size:13px;line-height:2}
.err{padding:18px;margin:12px;color:var(--red);font-size:13px;line-height:1.7;background:var(--redbg);border-radius:var(--r);border:1px solid #fca5a5}
.err b{display:block;margin-bottom:6px;font-size:13px}
.err small{font-size:10px;color:var(--sub);display:block;margin-top:8px;font-family:monospace;word-break:break-all}
.retry-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="title">📤 Not on Shopify</div>
      <div class="hdr-sub" id="hdr-sub">loading…</div>
    </div>
    <a href="/" class="back-btn">← Branches</a>
  </div>
</div>

<div class="section-hdr">
  <div class="section-lbl">Pick branch to show</div>
  <div class="branch-pills" id="branch-pills"></div>
</div>

<div class="status-bar" id="status-bar"></div>
<div id="out"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var BRANCHES = [
  {id:'chapy',     name:'Chapeltown',  short:'Chap', url:'/api/stock-data?branch=chapy'},
  {id:'city',      name:'City Center', short:'City', url:'/api/stock-data?branch=city'},
  {id:'roundhay',  name:'Roundhay',    short:'Roun', url:'/api/stock-data?branch=roundhay'},
  {id:'warehouse', name:'Warehouse',   short:'WH',   url:'/api/stock-data?branch=warehouse'}
];
var DEPT_FILTER = ['AFRO BEAUTY PRODUCTS','AFRO PRODUCTS 2'];

var SHOP_CACHE_KEY = 'cc_shop_barcodes_v2';
var SHOP_CACHE_TTL = 60 * 60 * 1000; // 1 hour
var SHOP_OP_KEY = 'cc_shop_opid';
var POLL_INTERVAL_MS = 3500; // 3.5s

// ── STATE ───────────────────────────────────────────────────
var activeBranch = null;
var branchData = {};
var branchLoading = {};
var branchError = {};

var shopBarcodes = null;         // {barcode: {productId, title}}
var shopBarcodesCount = 0;
var shopState = 'IDLE';          // IDLE | STARTING | RUNNING | DOWNLOADING | DONE | ERROR
var shopObjectCount = 0;
var shopError = null;
var shopOpId = null;
var shopPollTimer = null;

var imgs = {};
var SHOP_ADDED_KEY = 'cc_shop_added';
var shopRecentlyAdded = {};
try { shopRecentlyAdded = JSON.parse(localStorage.getItem(SHOP_ADDED_KEY) || '{}'); } catch(e) {}

try {
  var last = localStorage.getItem('cc_shop_branch');
  if (last && BRANCHES.some(function(b){return b.id===last;})) activeBranch = last;
} catch(e) {}
if (!activeBranch) activeBranch = 'chapy';

// ── HELPERS ─────────────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c];
  });
}
function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }

// Best-effort brand guess from the product name: take the leading words up
// to the first product-type word (max 2). The user proofs/edits it before
// adding — this is just a starting point until brand auto-matching lands.
var TYPE_WORDS = ['shampoo','conditioner','conditioners','oil','oils','gel','gels','wax','spray','sprays','cream','creams','lotion','lotions','butter','moisturiser','moisturizer','serum','serums','treatment','treatments','relaxer','relaxers','mask','masque','dye','dyes','color','colour','edge','leave','leavein','mousse','pomade','toner','toners','cleanser','scrub','scrubs','soap','soaps','wash','milk','foam','jelly','balm','setting','curl','curling','styling'];
function titleCaseWord(w){ return w ? w.charAt(0).toUpperCase()+w.slice(1).toLowerCase() : w; }
function guessBrand(name){
  var words = String(name||'').trim().split(/\s+/);
  var out = [];
  for (var i=0;i<words.length && out.length<2;i++){
    var bare = words[i].toLowerCase().replace(/[^a-z]/g,'');
    if (!bare) continue;
    if (TYPE_WORDS.indexOf(bare) >= 0) break;
    out.push(titleCaseWord(words[i]));
  }
  return out.join(' ');
}

function parseCSV(text){
  return Papa.parse(text, {header:true, skipEmptyLines:true}).data.map(function(row){
    return {
      bc: cl(row['Barcode']),
      nm: cl(row['ProductName']),
      sz: cl(row['Size']),
      qty: parseInt(row['StockQty']) || 0,
      pr: parseFloat(row['Price']) || 0,
      cost: parseFloat(row['AvgCost']) || 0,
      dp: cl(row['Department'])
    };
  }).filter(function(p){ return p.bc && p.nm; });
}

function imgEl(bc){
  if (imgs[bc]) return '<img src="'+imgs[bc]+'" loading="lazy" onerror="this.style.display=\'none\'">';
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
}

// ── SHOPIFY BARCODES VIA BULK OPERATIONS ────────────────────
function loadShopifyFromCache(){
  try {
    var cached = localStorage.getItem(SHOP_CACHE_KEY);
    if (!cached) return false;
    var o = JSON.parse(cached);
    if (!o || !o.ts || !o.barcodes) return false;
    if (Date.now() - o.ts > SHOP_CACHE_TTL) return false;
    shopBarcodes = o.barcodes;
    shopBarcodesCount = Object.keys(o.barcodes).length;
    shopState = 'DONE';
    return true;
  } catch(e) { return false; }
}

function saveShopifyCache(){
  try {
    localStorage.setItem(SHOP_CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      barcodes: shopBarcodes
    }));
  } catch(e) {
    // localStorage might overflow with 10k+ barcodes — drop the cache
    try { localStorage.removeItem(SHOP_CACHE_KEY); } catch(e2) {}
  }
}

function startShopify(force){
  // Force = bypass cache + start fresh
  if (!force && loadShopifyFromCache()) {
    render();
    return;
  }
  if (shopState === 'STARTING' || shopState === 'RUNNING' || shopState === 'DOWNLOADING') return;
  shopState = 'STARTING';
  shopError = null;
  shopBarcodes = null;
  shopObjectCount = 0;
  if (shopPollTimer) { clearTimeout(shopPollTimer); shopPollTimer = null; }
  render();

  var url = force ? '/api/shopify-products?action=start' : '/api/shopify-products';
  fetch(url)
    .then(parseResponse)
    .then(function(o){
      if (o.data.error) throw new Error(o.data.error);
      if (o.data.status === 'COMPLETED' && o.data.barcodes) {
        // Already done — use immediately
        shopBarcodes = o.data.barcodes;
        shopBarcodesCount = o.data.count || Object.keys(o.data.barcodes).length;
        shopState = 'DONE';
        saveShopifyCache();
        render();
        return;
      }
      // Otherwise: queued or running → start polling
      shopOpId = o.data.operationId || null;
      shopObjectCount = o.data.objectCount || 0;
      shopState = 'RUNNING';
      try { localStorage.setItem(SHOP_OP_KEY, shopOpId || ''); } catch(e) {}
      render();
      schedulePoll();
    })
    .catch(function(e){
      shopState = 'ERROR';
      shopError = e.message || 'Network error';
      render();
    });
}

function pollShopify(){
  if (!shopOpId) {
    // Without an id we can still call auto-mode which returns the current op
    fetch('/api/shopify-products?action=poll&id=')
      .then(parseResponse).then(handlePoll).catch(handlePollErr);
    return;
  }
  fetch('/api/shopify-products?action=poll&id='+encodeURIComponent(shopOpId))
    .then(parseResponse).then(handlePoll).catch(handlePollErr);
}

function handlePoll(o){
  if (o.data.error) {
    shopState = 'ERROR';
    shopError = o.data.error;
    render();
    return;
  }
  var st = o.data.status;
  if (st === 'COMPLETED' && o.data.barcodes) {
    shopBarcodes = o.data.barcodes;
    shopBarcodesCount = o.data.count || Object.keys(o.data.barcodes).length;
    shopState = 'DONE';
    saveShopifyCache();
    render();
    return;
  }
  if (st === 'FAILED' || st === 'CANCELED' || st === 'EXPIRED') {
    shopState = 'ERROR';
    shopError = 'Bulk op '+st+(o.data.errorCode?' ('+o.data.errorCode+')':'');
    render();
    return;
  }
  // Still running / created
  shopState = 'RUNNING';
  shopObjectCount = o.data.objectCount || 0;
  render();
  schedulePoll();
}

function handlePollErr(e){
  shopState = 'ERROR';
  shopError = e.message || 'Network error during poll';
  render();
}

function schedulePoll(){
  if (shopPollTimer) clearTimeout(shopPollTimer);
  shopPollTimer = setTimeout(pollShopify, POLL_INTERVAL_MS);
}

function parseResponse(r){
  return r.text().then(function(txt){
    var data;
    try { data = JSON.parse(txt); }
    catch(e){ throw new Error('Server returned non-JSON: '+txt.slice(0,300)); }
    return { ok: r.ok, status: r.status, data: data };
  });
}

// ── BRANCH DATA LOADER ──────────────────────────────────────
function loadBranch(id){
  if (branchData[id] || branchLoading[id]) return;
  branchLoading[id] = true;
  branchError[id] = null;
  render();
  var b = BRANCHES.filter(function(x){return x.id===id;})[0];
  if (!b) return;
  fetch(b.url)
    .then(function(r){ if (!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(t){
      branchData[id] = parseCSV(t);
      branchLoading[id] = false;
      render();
    })
    .catch(function(e){
      branchLoading[id] = false;
      branchError[id] = e.message || 'Failed to load';
      render();
    });
}

function loadImagesFromSheet(){
  try {
    var cached = localStorage.getItem('cc_shopify_imgs');
    if (cached) {
      var o = JSON.parse(cached);
      if (Date.now() - o.ts < 60*60*1000 && o.d) {
        imgs = o.d;
        return;
      }
    }
  } catch(e) {}
  fetch('/api/stock-data?branch=shopify-images')
    .then(function(r){ return r.text(); })
    .then(function(t){
      Papa.parse(t, {header:true, skipEmptyLines:true}).data.forEach(function(row){
        var bc = (row['Barcode']||'').trim();
        var url = (row['ImageURL']||'').trim();
        if (bc && url && url.startsWith('http')) imgs[bc] = url;
      });
      try { localStorage.setItem('cc_shopify_imgs', JSON.stringify({ts:Date.now(), d:imgs, s:{}})); } catch(e) {}
      render();
    })
    .catch(function(){});
}

// ── COMPUTE ─────────────────────────────────────────────────
function computeRows(){
  var data = branchData[activeBranch];
  if (!data) return [];
  var rows = [];
  for (var i = 0; i < data.length; i++) {
    var p = data[i];
    if (p.qty <= 0) continue;
    var dept = (p.dp || '').toUpperCase();
    if (DEPT_FILTER.indexOf(dept) < 0) continue;
    if (shopBarcodes && shopBarcodes[p.bc]) continue;
    // The shopify-images sheet is built from live Shopify listings, so an
    // image for this barcode means the product is already on Shopify — even
    // if the bulk-op barcode list missed it. Treat it as listed.
    if (imgs[p.bc]) continue;
    if (shopRecentlyAdded[p.bc]) continue;
    rows.push(p);
  }
  rows.sort(function(a,b){
    if (a.dp !== b.dp) return a.dp < b.dp ? -1 : 1;
    return a.nm < b.nm ? -1 : 1;
  });
  return rows;
}

// ── RENDER ──────────────────────────────────────────────────
function renderBranchPills(){
  var html = '';
  BRANCHES.forEach(function(b){
    var on = activeBranch === b.id;
    html += '<div class="bpill'+(on?' on':'')+'" data-id="'+b.id+'">'+b.name+'</div>';
  });
  var el = document.getElementById('branch-pills');
  if (el) el.innerHTML = html;
  document.querySelectorAll('.bpill').forEach(function(p){
    p.addEventListener('click', function(){
      activeBranch = this.dataset.id;
      try { localStorage.setItem('cc_shop_branch', activeBranch); } catch(e) {}
      if (!branchData[activeBranch]) loadBranch(activeBranch);
      render();
    });
  });
}

function renderStatus(){
  var el = document.getElementById('status-bar');
  if (!el) return;
  var parts = [];
  if (shopState === 'DONE') {
    parts.push('<b>'+shopBarcodesCount.toLocaleString()+'</b> products on Shopify');
  } else if (shopState === 'RUNNING') {
    parts.push('<b>Bulk-fetching Shopify catalog…</b> ('+shopObjectCount.toLocaleString()+' so far)');
  } else if (shopState === 'STARTING') {
    parts.push('<b>Starting Shopify bulk operation…</b>');
  } else if (shopState === 'ERROR') {
    parts.push('<b>⚠️ Shopify error</b>');
  }
  var bData = branchData[activeBranch];
  if (bData && shopState === 'DONE') {
    var rows = computeRows();
    parts.push('<b>'+rows.length+'</b> items missing for '+BRANCHES.filter(function(b){return b.id===activeBranch;})[0].name);
  }
  if (shopState === 'DONE' || shopState === 'ERROR') {
    parts.push('<button class="refresh-link" onclick="startShopify(true)">refresh catalog</button>');
  }
  el.innerHTML = parts.join(' · ');
}

function render(){
  renderBranchPills();
  renderStatus();
  var out = document.getElementById('out');
  var hdrSub = document.getElementById('hdr-sub');

  if (shopState === 'ERROR') {
    out.innerHTML = '<div class="err"><b>⚠️ Shopify catalog error</b>'+
      escapeHtml(shopError||'Unknown error')+
      '<small>If timeout: bulk ops should avoid this. If "Access denied": SHOPIFY_TOKEN needs read_products scope. If "Already in progress": wait 30s and retry.</small>'+
      '<button class="retry-btn" onclick="startShopify(true)">Retry</button></div>';
    if (hdrSub) hdrSub.textContent = 'error';
    return;
  }
  if (branchError[activeBranch]) {
    out.innerHTML = '<div class="err"><b>⚠️ Branch data error</b>'+
      escapeHtml(branchError[activeBranch])+
      '<button class="retry-btn" onclick="loadBranch(\''+activeBranch+'\')">Retry</button></div>';
    return;
  }

  if (shopState === 'STARTING' || shopState === 'RUNNING' || shopState === 'IDLE') {
    var msg = shopState === 'STARTING' ? 'Starting bulk operation on Shopify…' :
              shopState === 'RUNNING'  ? 'Bulk export running on Shopify…' :
              'Initializing…';
    out.innerHTML = '<div class="progress-card">'+
      '<div class="spin"></div>'+
      '<div class="pc-title">'+msg+'</div>'+
      '<div class="pc-sub">Shopify is exporting your full catalog in the background.<br>'+
      'This usually takes 30 seconds to 2 minutes. Page will update automatically.</div>'+
      (shopObjectCount > 0 ? '<div class="pc-count">'+shopObjectCount.toLocaleString()+' products processed</div>' : '')+
    '</div>';
    if (hdrSub) hdrSub.textContent = shopState === 'RUNNING' ? 'polling Shopify…' : 'starting…';
    return;
  }

  // shopState === 'DONE' from here
  if (branchLoading[activeBranch] || !branchData[activeBranch]) {
    out.innerHTML = '<div class="progress-card"><div class="spin"></div><div class="pc-title">Loading branch stock data…</div></div>';
    if (hdrSub) hdrSub.textContent = 'fetching branch stock…';
    return;
  }

  var branch = BRANCHES.filter(function(b){return b.id===activeBranch;})[0];
  if (hdrSub) hdrSub.textContent = 'showing items in stock at ' + branch.name;

  var rows = computeRows();
  if (rows.length === 0) {
    out.innerHTML = '<div class="empty">✓ All in-stock items at '+escapeHtml(branch.name)+'<br>are already on Shopify</div>';
    return;
  }

  var byDept = {};
  rows.forEach(function(r){
    if (!byDept[r.dp]) byDept[r.dp] = [];
    byDept[r.dp].push(r);
  });

  var html = '';
  Object.keys(byDept).forEach(function(dept){
    var items = byDept[dept];
    html += '<div class="dept-hdr"><div class="dept-name">'+escapeHtml(dept)+'</div>'+
      '<div class="dept-sub">'+items.length+' items missing from Shopify</div></div>';
    html += '<div class="card-list">';
    items.forEach(function(r){
      var priceStr = r.pr > 0 ? '£'+r.pr.toFixed(2) : '(no price)';
      var costStr = r.cost > 0 ? ' · cost £'+r.cost.toFixed(2) : '';
      html += '<div class="shop-card" data-bc="'+escapeAttr(r.bc)+'">'+
        '<div class="shop-img">'+imgEl(r.bc)+'</div>'+
        '<div class="shop-body">'+
          '<div class="shop-name">'+escapeHtml(r.nm)+(r.sz?' · '+escapeHtml(r.sz):'')+'</div>'+
          '<div class="shop-bc">'+escapeHtml(r.bc)+'</div>'+
          '<div class="shop-tags">'+
            '<span class="itag itag-stock">qty '+r.qty+'</span>'+
            '<span class="itag">'+priceStr+costStr+'</span>'+
          '</div>'+
          '<div class="shop-brand"><label>Brand</label>'+
            '<input class="brand-input" type="text" data-bc="'+escapeAttr(r.bc)+'" value="'+escapeAttr(guessBrand(r.nm))+'" placeholder="Set brand…" autocapitalize="words" autocomplete="off" spellcheck="false"></div>'+
          '<div class="shop-status" id="status-'+escapeAttr(r.bc)+'"></div>'+
        '</div>'+
        '<div class="shop-right">'+
          '<button class="shop-add-btn" data-bc="'+escapeAttr(r.bc)+'">+ Add to Shopify</button>'+
        '</div>'+
      '</div>';
    });
    html += '</div>';
  });
  out.innerHTML = html;

  document.querySelectorAll('.shop-add-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      addToShopify(this.dataset.bc, this);
    });
  });
}

function addToShopify(bc, btn){
  var rows = computeRows();
  var row = rows.filter(function(r){return r.bc===bc;})[0];
  if (!row) return;
  var card = btn.closest('.shop-card');
  var statusEl = card ? card.querySelector('.shop-status') : null;
  var brandInput = card ? card.querySelector('.brand-input') : null;
  var brand = brandInput ? brandInput.value.trim() : '';
  if (!brand) {
    if (brandInput) { brandInput.classList.add('needed'); brandInput.focus(); }
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--amber)">Set the brand first so the product is proof-ready.</span>';
    return;
  }
  if (brandInput) brandInput.classList.remove('needed');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--sub)">Building proof-ready draft + AI copy…</span>';

  fetch('/api/shopify-create', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      barcode: row.bc,
      name: row.nm,
      dept: row.dp,
      size: row.sz,
      price: row.pr,
      cost: row.cost,
      brand: brand,
      image: (imgs[row.bc] || '')
    })
  })
    .then(parseResponse)
    .then(function(o){
      if (o.ok && o.data.ok) {
        shopRecentlyAdded[bc] = {at: Date.now(), productId: o.data.productId, adminUrl: o.data.adminUrl};
        try { localStorage.setItem(SHOP_ADDED_KEY, JSON.stringify(shopRecentlyAdded)); } catch(e) {}
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)">✓ '+(o.data.title?escapeHtml(o.data.title):'Draft created')+' · <a href="'+o.data.adminUrl+'" target="_blank" style="color:var(--green);text-decoration:underline">proof on Shopify</a></span>';
        btn.textContent = '✓ Added';
        btn.style.background = 'var(--green)';
        var card = btn.closest('.shop-card');
        if (card) card.classList.add('added');
        setTimeout(function(){ render(); }, 1500);
      } else if (o.status === 409) {
        // Server says barcode already exists. Show full details so the user
        // can verify on Shopify directly — including product status (active/
        // draft/archived/unknown). The "Mark as listed" button only hides the
        // row when the user confirms it really is on Shopify.
        btn.disabled = false;
        btn.style.background = '';
        btn.textContent = '+ Add to Shopify';
        var status = o.data.existingStatus || 'unknown';
        var title = o.data.existingTitle || '(no title)';
        var adminUrl = o.data.adminUrl || '';
        var statusColor = status === 'ACTIVE' ? 'var(--green)' :
                          status === 'ARCHIVED' ? 'var(--amber)' :
                          status === 'DRAFT' ? '#3b82f6' : 'var(--sub)';
        if (statusEl) {
          statusEl.innerHTML =
            '<div style="color:var(--red);margin-bottom:3px">⚠️ Shopify says barcode already exists</div>'+
            '<div style="color:var(--ink);font-size:10px">Found: <b>'+escapeHtml(title)+'</b></div>'+
            '<div style="font-size:10px;margin-top:2px">Status: <b style="color:'+statusColor+'">'+escapeHtml(status)+'</b>'+
              (adminUrl ? ' · <a href="'+adminUrl+'" target="_blank" style="color:#3b82f6;text-decoration:underline">verify on Shopify</a>' : '')+
            '</div>'+
            '<button class="dismiss-btn" data-bc="'+escapeAttr(bc)+'" style="margin-top:5px;background:var(--bg);border:1px solid var(--border);color:var(--sub);font-size:10px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:var(--font)">Hide this row anyway</button>';
          // Wire the dismiss button
          var dbtn = statusEl.querySelector('.dismiss-btn');
          if (dbtn) {
            dbtn.addEventListener('click', function(){
              shopRecentlyAdded[bc] = {at: Date.now(), productId: o.data.existingProductId, adminUrl: adminUrl, manual: true};
              try { localStorage.setItem(SHOP_ADDED_KEY, JSON.stringify(shopRecentlyAdded)); } catch(e) {}
              render();
            });
          }
        }
      } else {

        btn.disabled = false;
        btn.textContent = '+ Add to Shopify';
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">⚠️ '+escapeHtml(o.data.error || ('HTTP '+o.status))+'</span>';
      }
    })
    .catch(function(e){
      btn.disabled = false;
      btn.textContent = '+ Add to Shopify';
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">⚠️ '+escapeHtml(e.message)+'</span>';
    });
}

// ── BOOT ────────────────────────────────────────────────────
renderBranchPills();
loadBranch(activeBranch);
loadImagesFromSheet();
startShopify(false);
</script>
