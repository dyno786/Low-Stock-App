<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC · Not on Shopify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --red:#cc0000;--redbg:#fff0f0;--redtxt:#991b1b;
  --green:#15803d;--greenbg:#f0fdf4;--greentxt:#14532d;
  --amber:#b45309;--amberbg:#fffbeb;--ambertxt:#92400e;
  --purple:#6d28d9;--purplebg:#ede9fe;--purpletxt:#4c1d95;
  --bg:#f0f0f0;--s1:#fff;--border:#e0e0e0;
  --ink:#111;--sub:#777;--r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:30px}
.hdr{background:var(--red);padding:14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.title{color:#fff;font-size:18px;font-weight:700}
.hdr-sub{color:rgba(255,255,255,.7);font-size:11px;margin-top:2px}
.back-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:7px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-block}

.section-hdr{background:var(--s1);padding:10px 12px;border-bottom:1px solid var(--border)}
.section-lbl{font-size:9px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.branch-pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.branch-pills::-webkit-scrollbar{display:none}
.bpill{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--s1);color:var(--sub);white-space:nowrap}
.bpill.on{background:var(--red);color:#fff;border-color:var(--red)}

.status-bar{background:var(--s1);padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--sub);line-height:1.5}
.status-bar b{color:var(--ink);font-weight:600}
.refresh-link{background:none;border:none;color:#3b82f6;text-decoration:underline;cursor:pointer;font-size:inherit;padding:0;font-family:inherit}

.dept-hdr{padding:10px 14px 6px;background:var(--bg)}
.dept-name{font-size:14px;font-weight:700}
.dept-sub{font-size:10px;color:var(--sub);margin-top:2px}

.card-list{background:var(--s1);margin:8px 11px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.shop-card{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:10px 12px;gap:9px;align-items:flex-start}
.shop-card:last-child{border-bottom:none}
.shop-img{flex-shrink:0;width:50px;height:50px;background:var(--bg);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.shop-img img{width:50px;height:50px;object-fit:cover}
.shop-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.shop-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.25}
.shop-bc{font-size:10px;color:var(--sub);font-family:monospace;font-weight:600}
.shop-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.itag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600;background:var(--bg);color:var(--sub)}
.itag-stock{background:var(--greenbg);color:var(--greentxt)}
.shop-status{font-size:10px;margin-top:4px;line-height:1.4}
.shop-right{flex-shrink:0;display:flex;align-items:center}
.shop-add-btn{background:var(--green);color:#fff;border:none;border-radius:7px;padding:9px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap}
.shop-add-btn:disabled{opacity:.55;cursor:wait}
.shop-add-btn:active{opacity:.85}
.shop-card.added{opacity:.55}
.shop-card.added .shop-name{text-decoration:line-through}

.loading{padding:50px 14px;text-align:center;color:var(--sub);font-size:13px;line-height:2}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:40px 14px;text-align:center;color:var(--sub);font-size:13px;line-height:2}
.err{padding:30px 14px;text-align:center;color:var(--red);font-size:13px;line-height:1.7;background:var(--redbg);margin:10px;border-radius:var(--r);border:1px solid #fca5a5}
.err b{display:block;margin-bottom:6px;font-size:13px}
.err small{font-size:10px;color:var(--sub);display:block;margin-top:8px;font-family:monospace;word-break:break-all}
.retry-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="title">📤 Not on Shopify</div>
      <div class="hdr-sub" id="hdr-sub">loading…</div>
    </div>
    <a href="/" class="back-btn">← Branches</a>
  </div>
</div>

<div class="section-hdr">
  <div class="section-lbl">Pick branch to show</div>
  <div class="branch-pills" id="branch-pills"></div>
</div>

<div class="status-bar" id="status-bar"></div>
<div id="out"><div class="loading"><div class="spin"></div>Loading…</div></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var BRANCHES = [
  {id:'chapy',     name:'Chapeltown',  short:'Chap', url:'/api/stock-data?branch=chapy'},
  {id:'city',      name:'City Center', short:'City', url:'/api/stock-data?branch=city'},
  {id:'roundhay',  name:'Roundhay',    short:'Roun', url:'/api/stock-data?branch=roundhay'},
  {id:'warehouse', name:'Warehouse',   short:'WH',   url:'/api/stock-data?branch=warehouse'}
];
var DEPT_FILTER = ['AFRO BEAUTY PRODUCTS','AFRO PRODUCTS 2'];

// ── STATE ───────────────────────────────────────────────────
var activeBranch = null;     // currently-selected branch ID
var branchData = {};          // {chapy: [products], ...}
var branchLoading = {};
var branchError = {};
var shopBarcodes = null;      // {barcode: {productId, title}}
var shopLoading = false;
var shopError = null;
var imgs = {};                // barcode → Shopify image URL (from sheet, optional cosmetic)
var SHOP_ADDED_KEY = 'cc_shop_added';
var shopRecentlyAdded = {};
try { shopRecentlyAdded = JSON.parse(localStorage.getItem(SHOP_ADDED_KEY) || '{}'); } catch(e) {}

// Restore last-used branch
try {
  var last = localStorage.getItem('cc_shop_branch');
  if (last && BRANCHES.some(function(b){return b.id===last;})) activeBranch = last;
} catch(e) {}
if (!activeBranch) activeBranch = 'chapy';

// ── HELPERS ─────────────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}

function parseCSV(text){
  return Papa.parse(text, {header:true, skipEmptyLines:true}).data.map(function(row){
    return {
      bc: cl(row['Barcode']),
      nm: cl(row['ProductName']),
      sz: cl(row['Size']),
      qty: parseInt(row['StockQty']) || 0,
      pr: parseFloat(row['Price']) || 0,
      cost: parseFloat(row['AvgCost']) || 0,
      dp: cl(row['Department'])
    };
  }).filter(function(p){ return p.bc && p.nm; });
}

function imgEl(bc){
  if (imgs[bc]) return '<img src="'+imgs[bc]+'" loading="lazy" onerror="this.style.display=\'none\'">';
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
}

// ── LOADERS ─────────────────────────────────────────────────
function loadBranch(id){
  if (branchData[id] || branchLoading[id]) return;
  branchLoading[id] = true;
  branchError[id] = null;
  render();
  var b = BRANCHES.filter(function(x){return x.id===id;})[0];
  if (!b) return;
  fetch(b.url)
    .then(function(r){ if (!r.ok) throw new Error('HTTP '+r.status); return r.text(); })
    .then(function(t){
      branchData[id] = parseCSV(t);
      branchLoading[id] = false;
      render();
    })
    .catch(function(e){
      branchLoading[id] = false;
      branchError[id] = e.message || 'Failed to load';
      render();
    });
}

function loadShopify(force){
  if (shopLoading) return;
  if (shopBarcodes && !force) return;
  shopLoading = true;
  shopError = null;
  render();
  fetch('/api/shopify-products')
    .then(function(r){
      return r.text().then(function(txt){
        // Defensive: try to parse JSON, surface a clear error if it's HTML/text
        var data;
        try { data = JSON.parse(txt); }
        catch(e){ throw new Error('Server returned non-JSON: '+txt.slice(0,200)); }
        return { ok: r.ok, status: r.status, data: data };
      });
    })
    .then(function(o){
      shopLoading = false;
      if (!o.ok || o.data.error) {
        shopError = o.data.error || ('HTTP '+o.status);
        shopBarcodes = null;
      } else {
        shopBarcodes = o.data.barcodes || {};
      }
      render();
    })
    .catch(function(e){
      shopLoading = false;
      shopError = e.message || 'Network error';
      shopBarcodes = null;
      render();
    });
}

function loadImagesFromSheet(){
  // Optional cosmetic — re-uses your existing shopify-images cache so cards have thumbnails
  try {
    var cached = localStorage.getItem('cc_shopify_imgs');
    if (cached) {
      var o = JSON.parse(cached);
      if (Date.now() - o.ts < 60*60*1000 && o.d) {
        imgs = o.d;
        return;
      }
    }
  } catch(e) {}
  fetch('/api/stock-data?branch=shopify-images')
    .then(function(r){ return r.text(); })
    .then(function(t){
      Papa.parse(t, {header:true, skipEmptyLines:true}).data.forEach(function(row){
        var bc = (row['Barcode']||'').trim();
        var url = (row['ImageURL']||'').trim();
        if (bc && url && url.startsWith('http')) imgs[bc] = url;
      });
      try { localStorage.setItem('cc_shopify_imgs', JSON.stringify({ts:Date.now(), d:imgs, s:{}})); } catch(e) {}
      render();
    })
    .catch(function(){});
}

// ── COMPUTE ─────────────────────────────────────────────────
function computeRows(){
  var data = branchData[activeBranch];
  if (!data) return [];
  var rows = [];
  for (var i = 0; i < data.length; i++) {
    var p = data[i];
    if (p.qty <= 0) continue;
    var dept = (p.dp || '').toUpperCase();
    if (DEPT_FILTER.indexOf(dept) < 0) continue;
    if (shopBarcodes && shopBarcodes[p.bc]) continue;
    if (shopRecentlyAdded[p.bc]) continue;
    rows.push(p);
  }
  rows.sort(function(a,b){
    if (a.dp !== b.dp) return a.dp < b.dp ? -1 : 1;
    return a.nm < b.nm ? -1 : 1;
  });
  return rows;
}

// ── RENDER ──────────────────────────────────────────────────
function renderBranchPills(){
  var html = '';
  BRANCHES.forEach(function(b){
    var on = activeBranch === b.id;
    html += '<div class="bpill'+(on?' on':'')+'" data-id="'+b.id+'">'+b.name+'</div>';
  });
  var el = document.getElementById('branch-pills');
  if (el) el.innerHTML = html;
  document.querySelectorAll('.bpill').forEach(function(p){
    p.addEventListener('click', function(){
      activeBranch = this.dataset.id;
      try { localStorage.setItem('cc_shop_branch', activeBranch); } catch(e) {}
      if (!branchData[activeBranch]) loadBranch(activeBranch);
      render();
    });
  });
}

function renderStatus(){
  var el = document.getElementById('status-bar');
  if (!el) return;
  var parts = [];
  if (shopBarcodes) {
    parts.push('<b>'+Object.keys(shopBarcodes).length.toLocaleString()+'</b> products on Shopify');
  } else if (shopLoading) {
    parts.push('<b>Loading Shopify catalog…</b>');
  }
  var bData = branchData[activeBranch];
  if (bData) {
    var rows = computeRows();
    parts.push('<b>'+rows.length+'</b> items missing for '+BRANCHES.filter(function(b){return b.id===activeBranch;})[0].name);
  }
  parts.push('<button class="refresh-link" onclick="loadShopify(true)">refresh catalog</button>');
  el.innerHTML = parts.join(' · ');
}

function render(){
  renderBranchPills();
  renderStatus();
  var out = document.getElementById('out');

  // Error states first
  if (shopError) {
    out.innerHTML = '<div class="err"><b>⚠️ Shopify catalog error</b>'+
      escapeHtml(shopError)+
      '<small>Common causes: SHOPIFY_TOKEN env var missing scopes (needs read_products), wrong SHOPIFY_STORE, or API rate limit. Check Vercel env vars.</small>'+
      '<button class="retry-btn" onclick="loadShopify(true)">Retry</button></div>';
    document.getElementById('hdr-sub').textContent = 'error · check console';
    return;
  }
  if (branchError[activeBranch]) {
    out.innerHTML = '<div class="err"><b>⚠️ Branch data error</b>'+
      escapeHtml(branchError[activeBranch])+
      '<button class="retry-btn" onclick="loadBranch(\''+activeBranch+'\')">Retry</button></div>';
    return;
  }

  // Loading states
  if (shopLoading || !shopBarcodes) {
    out.innerHTML = '<div class="loading"><div class="spin"></div>Loading Shopify catalog…<br><small>(first load takes ~30 seconds for 18,000+ products)</small></div>';
    document.getElementById('hdr-sub').textContent = 'fetching Shopify catalog…';
    return;
  }
  if (branchLoading[activeBranch] || !branchData[activeBranch]) {
    out.innerHTML = '<div class="loading"><div class="spin"></div>Loading branch stock data…</div>';
    document.getElementById('hdr-sub').textContent = 'fetching branch stock…';
    return;
  }

  var branch = BRANCHES.filter(function(b){return b.id===activeBranch;})[0];
  document.getElementById('hdr-sub').textContent = 'showing items in stock at ' + branch.name;

  var rows = computeRows();
  if (rows.length === 0) {
    out.innerHTML = '<div class="empty">✓ All in-stock items at '+branch.name+'<br>are already on Shopify</div>';
    return;
  }

  // Group by dept
  var byDept = {};
  rows.forEach(function(r){
    if (!byDept[r.dp]) byDept[r.dp] = [];
    byDept[r.dp].push(r);
  });

  var html = '';
  Object.keys(byDept).forEach(function(dept){
    var items = byDept[dept];
    html += '<div class="dept-hdr"><div class="dept-name">'+escapeHtml(dept)+'</div>'+
      '<div class="dept-sub">'+items.length+' items missing from Shopify</div></div>';
    html += '<div class="card-list">';
    items.forEach(function(r){
      var priceStr = r.pr > 0 ? '£'+r.pr.toFixed(2) : '(no price)';
      var costStr = r.cost > 0 ? ' · cost £'+r.cost.toFixed(2) : '';
      html += '<div class="shop-card" data-bc="'+escapeAttr(r.bc)+'">'+
        '<div class="shop-img">'+imgEl(r.bc)+'</div>'+
        '<div class="shop-body">'+
          '<div class="shop-name">'+escapeHtml(r.nm)+(r.sz?' · '+escapeHtml(r.sz):'')+'</div>'+
          '<div class="shop-bc">'+escapeHtml(r.bc)+'</div>'+
          '<div class="shop-tags">'+
            '<span class="itag itag-stock">qty '+r.qty+'</span>'+
            '<span class="itag">'+priceStr+costStr+'</span>'+
          '</div>'+
          '<div class="shop-status" id="status-'+escapeAttr(r.bc)+'"></div>'+
        '</div>'+
        '<div class="shop-right">'+
          '<button class="shop-add-btn" data-bc="'+escapeAttr(r.bc)+'">+ Add to Shopify</button>'+
        '</div>'+
      '</div>';
    });
    html += '</div>';
  });
  out.innerHTML = html;

  // Wire add buttons
  document.querySelectorAll('.shop-add-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      addToShopify(this.dataset.bc, this);
    });
  });
}

function addToShopify(bc, btn){
  var rows = computeRows();
  var row = rows.filter(function(r){return r.bc===bc;})[0];
  if (!row) return;
  var statusEl = document.getElementById('status-'+CSS.escape(bc));
  // CSS.escape may not be everywhere — fall back to query
  if (!statusEl) statusEl = document.querySelector('.shop-card[data-bc="'+bc.replace(/"/g,'\\"')+'"] .shop-status');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--sub)">Creating draft + AI description…</span>';

  fetch('/api/shopify-create', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      barcode: row.bc,
      name: row.nm,
      dept: row.dp,
      size: row.sz,
      price: row.pr,
      cost: row.cost,
      vendor: ''
    })
  })
    .then(function(r){
      return r.text().then(function(txt){
        var data;
        try { data = JSON.parse(txt); }
        catch(e){ throw new Error('Server returned non-JSON: '+txt.slice(0,200)); }
        return { ok: r.ok, status: r.status, data: data };
      });
    })
    .then(function(o){
      if (o.ok && o.data.ok) {
        shopRecentlyAdded[bc] = {at: Date.now(), productId: o.data.productId, adminUrl: o.data.adminUrl};
        try { localStorage.setItem(SHOP_ADDED_KEY, JSON.stringify(shopRecentlyAdded)); } catch(e) {}
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--green)">✓ Added · <a href="'+o.data.adminUrl+'" target="_blank" style="color:var(--green);text-decoration:underline">edit on Shopify</a></span>';
        btn.textContent = '✓ Added';
        btn.style.background = 'var(--green)';
        var card = btn.closest('.shop-card');
        if (card) card.classList.add('added');
        // After 1.5s remove from view
        setTimeout(function(){ render(); }, 1500);
      } else if (o.status === 409) {
        shopRecentlyAdded[bc] = {at: Date.now(), productId: o.data.existingProductId, adminUrl: o.data.adminUrl||''};
        try { localStorage.setItem(SHOP_ADDED_KEY, JSON.stringify(shopRecentlyAdded)); } catch(e) {}
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--sub)">Already on Shopify — refreshing list</span>';
        btn.textContent = 'Already there';
        setTimeout(function(){ render(); }, 1200);
      } else {
        btn.disabled = false;
        btn.textContent = '+ Add to Shopify';
        if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">⚠️ '+escapeHtml(o.data.error || ('HTTP '+o.status))+'</span>';
      }
    })
    .catch(function(e){
      btn.disabled = false;
      btn.textContent = '+ Add to Shopify';
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">⚠️ '+escapeHtml(e.message)+'</span>';
    });
}

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c];
  });
}
function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }

// ── BOOT ────────────────────────────────────────────────────
renderBranchPills();
loadBranch(activeBranch);
loadShopify();
loadImagesFromSheet();
</script>
</body>
</html>
