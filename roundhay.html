<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Roundhay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --red:#cc0000;--redbg:#fff0f0;--redtxt:#991b1b;
  --green:#15803d;--greenbg:#f0fdf4;--greentxt:#14532d;
  --amber:#b45309;--amberbg:#fffbeb;--ambertxt:#92400e;
  --purple:#6d28d9;--purplebg:#ede9fe;--purpletxt:#4c1d95;
  --bg:#f0f0f0;--s1:#fff;--border:#e0e0e0;
  --ink:#111;--sub:#777;--r:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}
.hdr{background:var(--red);padding:12px 14px 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.logo{width:32px;height:32px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--red)}
.title{color:#fff;font-size:18px;font-weight:700;margin-left:9px}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;font-family:monospace;margin-left:9px}
.refresh-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.stats-hdr{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:9px 10px;background:rgba(0,0,0,.15)}
.sp{background:rgba(255,255,255,.15);border-radius:9px;padding:8px 5px;text-align:center}
.sp-val{font-size:18px;font-weight:700;font-family:monospace;color:#fff;line-height:1}
.sp-lbl{font-size:8px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.vtabs{display:flex;background:var(--s1);border-bottom:2px solid var(--bg);overflow-x:auto;scrollbar-width:none}
.vtabs::-webkit-scrollbar{display:none}
.vtab{flex-shrink:0;padding:11px 10px;font-size:11px;font-weight:700;color:var(--sub);border-bottom:3px solid transparent;cursor:pointer;user-select:none;white-space:nowrap}
.vtab.on{color:var(--red);border-bottom-color:var(--red)}
.sync-bar{display:flex;align-items:center;background:var(--greenbg);border-bottom:1px solid var(--border);padding:3px 10px;min-height:22px}
.sync-txt{font-size:10px;color:var(--green);font-weight:600;flex:1}
.sync-btn{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid var(--green);background:var(--greenbg);color:var(--green);cursor:pointer;font-family:var(--font)}
.timer-bar{background:var(--purplebg);border-bottom:1px solid var(--border);padding:7px 12px;display:none}
.timer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.timer-txt{font-size:12px;font-weight:700;color:var(--purpletxt)}
.timer-meta{font-size:10px;color:var(--sub)}
.timer-last{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--purplebg);color:var(--purpletxt);font-weight:600}
.day-filter{display:none;background:var(--s1);border-bottom:1px solid var(--border);padding:7px 10px;overflow-x:auto;scrollbar-width:none}
.day-filter::-webkit-scrollbar{display:none}
.day-inner{display:flex;gap:5px;min-width:max-content}
.prog-wrap{background:var(--s1);padding:9px 14px;border-bottom:1px solid var(--border)}
.prog-row{display:flex;align-items:center;gap:7px}
.prog-bar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.prog-txt{font-size:11px;font-weight:700;color:var(--green);min-width:30px;text-align:right}
.prog-sub{font-size:10px;color:var(--sub);margin-top:3px}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--s1);color:var(--sub);user-select:none;white-space:nowrap}
.pill.on{background:var(--red);color:#fff;border-color:var(--red)}
.src-hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 14px}
.src-name{font-size:17px;font-weight:700}
.src-rule{font-size:11px;font-weight:600;margin-top:2px}
.src-prog{font-size:10px;color:var(--sub);margin-top:2px}
.dept-hdr{padding:8px 14px 5px;background:var(--bg)}
.dept-name{font-size:14px;font-weight:700}
.dept-sub{font-size:10px;color:var(--sub);margin-top:2px}
.card-list{background:var(--s1);margin:7px 11px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.item-card{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:11px 12px;gap:9px}
.item-card:last-child{border-bottom:none}
.item-card.done{background:var(--greenbg)}
.item-card.done .item-name{text-decoration:line-through;color:var(--sub)}
.item-img{width:52px;height:52px;border-radius:9px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.item-img img{width:52px;height:52px;object-fit:cover}
.item-body{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.item-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:4px}
.item-tags{display:flex;gap:3px;flex-wrap:wrap}
.itag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:600}
.itag-wh{background:var(--purplebg);color:var(--purpletxt)}
.itag-src{background:var(--greenbg);color:var(--greentxt)}
.itag-out{background:var(--redbg);color:var(--redtxt)}
.itag-day{background:var(--amberbg);color:var(--ambertxt)}
.itag-day-red{background:var(--redbg);color:var(--redtxt)}
.itag-info{background:var(--bg);color:var(--sub)}
.item-right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.cbox{background:var(--redbg);border-radius:7px;padding:5px 7px;text-align:center;min-width:42px}
.cbox.done-box{background:var(--greenbg)}
.cnum{font-size:17px;font-weight:700;color:var(--red);line-height:1}
.cnum.done-num{color:var(--green)}
.clbl{font-size:8px;color:var(--sub);text-transform:uppercase;margin-top:1px}
.tick{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--s1);flex-shrink:0;touch-action:manipulation}
.tick.on{background:var(--green);border-color:var(--green)}
.neg-card{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:11px 12px;gap:9px;align-items:center}
.neg-card:last-child{border-bottom:none}
.neg-card.fixed{background:var(--greenbg)}
.neg-img{width:46px;height:46px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.neg-img img{width:46px;height:46px;object-fit:cover}
.neg-body{flex:1;min-width:0}
.neg-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.neg-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:3px}
.neg-tags{display:flex;gap:3px;flex-wrap:wrap}
.neg-right{flex-shrink:0;text-align:center;min-width:46px}
.neg-qty{font-size:21px;font-weight:700;font-family:monospace;color:var(--red);line-height:1}
.neg-lbl{font-size:8px;color:var(--sub);text-transform:uppercase;margin-top:2px}
.neg-tick{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--s1);margin-top:5px;touch-action:manipulation}
.neg-tick.on{background:var(--green);border-color:var(--green)}
.oos-row{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:10px 12px;gap:9px;align-items:center}
.oos-row:last-child{border-bottom:none}
.oos-row.has{background:var(--greenbg)}
.oos-img{width:42px;height:42px;border-radius:7px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.oos-img img{width:42px;height:42px;object-fit:cover}
.oos-body{flex:1;min-width:0}
.oos-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.oos-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:3px}
.oos-tags{display:flex;gap:3px;flex-wrap:wrap}
.oos-right{flex-shrink:0;text-align:center;min-width:42px}
.oos-days{font-size:20px;font-weight:700;font-family:monospace;line-height:1}
.oos-lbl{font-size:8px;color:var(--sub);text-transform:uppercase;margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:9px 11px;background:var(--bg)}
.stat{background:var(--s1);border-radius:9px;padding:9px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:20px;font-weight:700;font-family:monospace;line-height:1}
.stat-lbl{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.img-row{display:flex;background:var(--s1);border-bottom:0.5px solid var(--border);padding:11px 12px;gap:9px;align-items:center}
.img-row:last-child{border-bottom:none}
.img-thumb{width:52px;height:52px;border-radius:9px;border:2px solid var(--red);background:var(--redbg);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.img-thumb.ok{border-color:var(--green);background:var(--greenbg)}
.img-thumb img{width:52px;height:52px;object-fit:cover}
.img-body{flex:1;min-width:0}
.img-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.img-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:4px}
.img-tags{display:flex;gap:3px;flex-wrap:wrap}
.img-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.img-badge-miss{background:var(--redbg);color:var(--redtxt)}
.img-badge-ok{background:var(--greenbg);color:var(--greentxt)}
.img-badge-warn{background:var(--amberbg);color:var(--ambertxt)}
.img-thumb.warn{border-color:var(--amber);background:var(--amberbg)}
.img-dept-row{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:border-color .1s,background .1s}
.img-dept-row:hover{border-color:var(--red);background:#fffafa}
.img-dept-row.selected{border-color:var(--red);background:var(--redbg)}
.item-card.zero-dest{border-left:3px solid var(--red)}
.item-card.zero-dest .cnum{color:var(--red)}
.item-card.zero-dest .cbox{border:1px solid #fca5a5}
.img-toggle{display:flex;gap:5px;padding:8px 10px;background:var(--s1);border-bottom:1px solid var(--border)}
.wa-footer{background:var(--s1);border-top:1px solid var(--border);padding:9px 13px 18px;margin-top:14px}
.wa-row{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:6px}
.wa-btn{width:100%;background:#25d366;color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px}
.loading{padding:46px 14px;text-align:center;color:var(--sub);font-size:12px;line-height:2}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:36px 14px;text-align:center;color:var(--sub);font-size:12px;line-height:2}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div style="display:flex;align-items:center">
      <div class="logo">CC</div>
      <div>
        <div class="title" style="margin-left:9px">Roundhay</div>
        <div class="hdr-sub" id="stime" style="margin-left:9px">loading…</div>
      </div>
    </div>
    <button class="refresh-btn" id="refresh-btn">↺ Refresh</button>
  </div>
  <div class="stats-hdr">
    <div class="sp"><div class="sp-val" id="stat-neg">…</div><div class="sp-lbl">Negatives</div></div>
    <div class="sp"><div class="sp-val" id="stat-oos">…</div><div class="sp-lbl">Out of stock</div></div>
    <div class="sp"><div class="sp-val" id="stat-img">…</div><div class="sp-lbl">Missing images</div></div>
  </div>
</div>

<div class="vtabs" id="vtabs">
  <div class="vtab on" data-v="s0">📦 From Warehouse</div>
  <div class="vtab" data-v="s1">📦 From Chapeltown</div>
  <div class="vtab" data-v="s2">📦 From City Center</div>
  <div class="vtab" data-v="neg">🔴 Negatives</div>
  <div class="vtab" data-v="oos">⏱ Out of stock</div>
  <div class="vtab" data-v="imgs">📸 Images</div>
</div>

<div class="sync-bar">
  <div class="sync-txt" id="sync-txt"></div>
  <button class="sync-btn" id="sync-btn">↺ Sync now</button>
</div>

<div class="timer-bar" id="timer-bar">
  <div class="timer-row" id="timer-row"><span class="timer-txt">⏱ 0s</span></div>
  <div style="margin-top:4px"><button onclick="tmrReset()" style="font-size:9px;font-weight:600;padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--s1);color:var(--sub);cursor:pointer;font-family:var(--font)">↺ Reset</button></div>
</div>

<div class="day-filter" id="day-filter">
  <div class="day-inner" id="day-pills">
    <div class="pill on" data-d="all">All OOS</div>
    <div class="pill" data-d="0">0–6 days</div>
    <div class="pill" data-d="7">7–13 days</div>
    <div class="pill" data-d="14">14–29 days</div>
    <div class="pill" data-d="30">30–59 days</div>
    <div class="pill" data-d="60">60–89 days</div>
    <div class="pill" data-d="90">90+ days</div>
  </div>
</div>

<div class="prog-wrap" id="prog-wrap">
  <div class="prog-row"><div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div><span class="prog-txt" id="prog-txt">0%</span></div>
  <div class="prog-sub" id="prog-sub">Loading…</div>
</div>

<div id="out"><div class="loading"><div class="spin"></div>Loading…</div></div>

<script>
var TITLE='Roundhay';
var DEST_ID=2;
var TARGET=6;
var DEST_URL='/api/stock-data?branch=roundhay';
var IURL='/api/stock-data?branch=shopify-images'; // ShopifyImages tab — updated daily by Apps Script
var IMG_PRIORITY_DEPTS=['SYNTHETIC HAIR', 'HUMAN HAIR']; // Auto-loaded on open
var IMG_SECONDARY_DEPTS=['HUMAN HAIR724', 'INSTANT WEAVE SYNTHETIC', 'PONYTAILS SYNTHETIC', 'WIGS HUMAN HAIR40', 'WIGS SYNTHETIC']; // Shown in picker
var IMG_DEPTS=[]; // kept for compat // Update when dept codes confirmed
var SOURCES=[{si:3,name:"Warehouse",short:"WH",color:"#a78bfa",url:"/api/stock-data?branch=warehouse",rule:"wh"},{si:0,name:"Chapeltown",short:"Chap",color:"#fb923c",url:"/api/stock-data?branch=chapy",rule:"branch"},{si:1,name:"City Center",short:"City",color:"#4ade80",url:"/api/stock-data?branch=city",rule:"branch"}];
var WA='447305505976';

var destData=null,srcData={},imgs={},shopifyData={},destLoaded=false,srcLoaded={};
// shopifyData[barcode] = {has_image, image_url, on_shopify}
// imgs[barcode] = image URL (only for products WITH images)
// If barcode in shopifyData but NOT in imgs = on Shopify but no image
// If barcode NOT in shopifyData = not on Shopify at all

// OOS TRACKER — records first date we saw each product at qty=0
// Stored in localStorage as {barcode: timestamp}
// This gives us accurate "days out of stock" rather than using LastSold
var OOS_KEY='cc_oos_dates_'+DEST_ID;
var oosDates={};
try{oosDates=JSON.parse(localStorage.getItem(OOS_KEY)||'{}');}catch(e){}

function updateOOSDates(data){
  // Called after branch data loads
  // For each product at qty=0, record the first time we saw it at 0
  var changed=false;
  var today=Date.now();
  (data||[]).forEach(function(p){
    if(!p.bc)return;
    if(p.qty<=0){
      // Product is OOS — record first seen date if not already recorded
      if(!oosDates[p.bc]){
        oosDates[p.bc]=today;
        changed=true;
      }
    }else{
      // Product back in stock — clear the OOS date
      if(oosDates[p.bc]){
        delete oosDates[p.bc];
        changed=true;
      }
    }
  });
  if(changed){
    try{localStorage.setItem(OOS_KEY,JSON.stringify(oosDates));}catch(e){}
  }
}

function daysOOS(bc){
  // How many days has this product been at qty=0 according to our tracker
  if(!oosDates[bc])return null;
  return Math.floor((Date.now()-oosDates[bc])/86400000);
}
var view='s0',oosFilt='all',imgFilter='missing',imgDeptTab='priority';
var collectDept='ALL'; // department filter for collect tabs
var ticks={},negTx={};
try{ticks=JSON.parse(localStorage.getItem('cc_t'+DEST_ID)||'{}');}catch(e){}
try{negTx=JSON.parse(localStorage.getItem('cc_n'+DEST_ID)||'{}');}catch(e){}

// ── TIMER ──────────────────────────────────────────────────
var tmr={on:false,start:0,last:0,count:0,gaps:[],iv:null};
function tmrPick(){
  var now=Date.now();
  if(!tmr.on){tmr.on=true;tmr.start=now;tmr.last=now;tmr.count=0;tmr.gaps=[];
    document.getElementById('timer-bar').style.display='block';
    tmr.iv=setInterval(tmrUpdate,1000);}
  if(tmr.last)tmr.gaps.push(now-tmr.last);
  tmr.last=now;tmr.count++;tmrUpdate();
}
function tmrReset(){
  tmr.on=false;tmr.start=0;tmr.count=0;tmr.gaps=[];clearInterval(tmr.iv);
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('timer-row').innerHTML='<span class="timer-txt">⏱ 0s</span>';
}
function tmrUpdate(){
  var el=document.getElementById('timer-row');if(!el||!tmr.start)return;
  var total=Date.now()-tmr.start;
  var avg=tmr.gaps.length?tmr.gaps.reduce(function(a,b){return a+b;})/tmr.gaps.length:0;
  var last=tmr.gaps.length?tmr.gaps[tmr.gaps.length-1]:0;
  el.innerHTML='<span class="timer-txt">⏱ '+fmt(total)+'</span>'+
    '<span class="timer-meta">'+tmr.count+' done</span>'+
    (avg>0?'<span class="timer-meta">avg '+fmt(avg)+'/item</span>':'')+
    (last>0?'<span class="timer-last">last: '+fmt(last)+'</span>':'');
}
function fmt(ms){var s=Math.floor((ms||0)/1000),m=Math.floor(s/60),h=Math.floor(m/60);m=m%60;s=s%60;return(h>0?h+'h ':'')+(m>0?m+'m ':'')+s+'s';}

// ── SYNC ───────────────────────────────────────────────────
var syncOk=true,syncPend=null;
async function syncLoad(k){
  try{var r=await fetch('/api/ticks?key='+k,{signal:AbortSignal.timeout(3000)});
    var d=await r.json();if(d.fallback){syncOk=false;return null;}return d.data||null;}
  catch(e){syncOk=false;return null;}
}
function syncSave(k,v){
  if(!syncOk)return;if(syncPend)clearTimeout(syncPend);
  syncPend=setTimeout(function(){
    fetch('/api/ticks',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({key:k,value:v})}).catch(function(){});
    syncPend=null;setSyncTxt('✓ Synced');
  },500);
}
function setSyncTxt(t){var el=document.getElementById('sync-txt');if(!el)return;el.textContent=t;clearTimeout(el._t);el._t=setTimeout(function(){el.textContent='';},3000);}
async function doSync(){
  setSyncTxt('Syncing…');
  var tk='cc_t'+DEST_ID,nk='cc_n'+DEST_ID;
  var res=await Promise.all([syncLoad(tk),syncLoad(nk)]);
  if(res[0])Object.keys(res[0]).forEach(function(k){ticks[k]=ticks[k]||res[0][k];});
  if(res[1])Object.keys(res[1]).forEach(function(k){negTx[k]=negTx[k]||res[1][k];});
  try{localStorage.setItem(tk,JSON.stringify(ticks));}catch(e){}
  try{localStorage.setItem(nk,JSON.stringify(negTx));}catch(e){}
  setSyncTxt(syncOk?'✓ Synced':'Offline — local only');
}

// ── HELPERS ────────────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}
function pD(s){if(!s||s==='Never'||s==='NULL')return null;var p=s.split('/');if(p.length===3){var d=new Date(+p[2],+p[1]-1,+p[0]);return isNaN(d)?null:d;}return null;}
function dAgo(s){var d=pD(s);return d?Math.floor((Date.now()-d)/86400000):null;}
function imgEl(bc,sz){sz=sz||52;if(imgs[bc])return '<img src="'+imgs[bc]+'" loading="lazy" onerror="this.style.display=\"none\"" style="width:'+sz+'px;height:'+sz+'px;object-fit:cover">';return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';}
function dayTag(days,r,a){if(days===null)return '';var c=days>=(r||30)?'itag-day-red':days>=(a||7)?'itag-day':'itag-info';return '<span class="itag '+c+'">'+days+'d OOS</span>';}
function getQty(bc){var p=destData?destData.find(function(x){return x.bc===bc;}):null;return p?p.qty:0;}
function calcWH(bc,whQty){var dq=getQty(bc);var need=Math.max(0,TARGET-dq);if(need<=0||dq>=TARGET)return 0;return Math.min(need,whQty);}
function setProg(total,done,sub){var pct=total>0?Math.round(done/total*100):0;document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-txt').textContent=pct+'%';document.getElementById('prog-sub').textContent=sub||'';}
function updateStats(){
  if(!destData)return;
  var neg=destData.filter(function(p){return p.qty<0;}).length;
  var oos=destData.filter(function(p){return p.qty<=0&&p.ls&&p.ls!=='Never';}).length;
  // Missing images in priority departments — 3 states now
  var priorityDepts=['SYNTHETIC HAIR', 'HUMAN HAIR'];
  var miss=destData.filter(function(p){
    return p.qty>0&&priorityDepts.indexOf(p.dp)>=0&&!imgs[p.bc];
  }).length;
  document.getElementById('stat-neg').textContent=neg;
  document.getElementById('stat-oos').textContent=oos;
  document.getElementById('stat-img').textContent=miss;
}

// ── LOAD ───────────────────────────────────────────────────
function parseCSV(text){
  return Papa.parse(text,{header:true,skipEmptyLines:true}).data.map(function(row){
    var ls=cl(row['LastSold']);
    return{bc:cl(row['Barcode']),nm:cl(row['ProductName']),sz:cl(row['Size']),
           qty:parseInt(row['StockQty'])||0,pr:parseFloat(row['Price'])||0,
           dp:cl(row['Department']),ls:(ls&&ls!=='NULL')?ls:'Never'};
  }).filter(function(p){return p.bc&&p.nm;});
}
async function loadDest(){
  try{var r=await fetch(DEST_URL);destData=parseCSV(await r.text());}
  catch(e){destData=[];}
  destLoaded=true;
  updateOOSDates(destData); // track when items first went to 0
  document.getElementById('stime').textContent='live · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  updateStats();renderView();
}
async function loadSrc(idx){
  if(srcLoaded[idx])return;
  try{var r=await fetch(SOURCES[idx].url);srcData[idx]=parseCSV(await r.text());}
  catch(e){srcData[idx]=[];}
  srcLoaded[idx]=true;renderView();
}
async function loadImgs(){
  try{
    // Cache for 1 hour
    var cached=localStorage.getItem('cc_shopify_imgs');
    if(cached){
      var o=JSON.parse(cached);
      if(Date.now()-o.ts<60*60*1000){
        imgs=o.d;shopifyData=o.s||{};updateStats();return;
      }
    }
    // Fetch from Google Sheet (updated daily by Apps Script from Shopify)
    var r=await fetch(IURL);
    var t=await r.text();
    Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
      var bc=(row['Barcode']||'').trim();
      if(!bc)return;
      var url=(row['ImageURL']||'').trim();
      var status=(row['Status']||'').trim(); // HAS_IMAGE or NO_IMAGE
      // shopifyData tracks whether it's on Shopify at all
      shopifyData[bc]={
        on_shopify:true, // it's in the sheet = it's on Shopify
        has_image:status==='HAS_IMAGE',
        image_url:url||null
      };
      if(url&&url.startsWith('http'))imgs[bc]=url;
    });
    try{localStorage.setItem('cc_shopify_imgs',JSON.stringify({
      ts:Date.now(),d:imgs,s:shopifyData
    }));}catch(e){}
    updateStats();
  }catch(e){console.log('Image load error:',e);}
}

// ── RENDER ─────────────────────────────────────────────────
function renderView(){
  var isCollect=view.charAt(0)==='s';
  document.getElementById('day-filter').style.display=view==='oos'?'block':'none';
  document.getElementById('prog-wrap').style.display=(view!=='oos'&&view!=='imgs')?'block':'none';
  document.getElementById('timer-bar').style.display=(isCollect&&tmr.on)?'block':'none';
  if(isCollect){var idx=parseInt(view.substring(1));renderCollect(idx);}
  else if(view==='neg')renderNeg();
  else if(view==='oos')renderOOS();
  else renderImgs();
}

// ── COLLECT ────────────────────────────────────────────────
function renderCollect(srcIdx){
  var el=document.getElementById('out');
  var sc=SOURCES[srcIdx];
  if(!destLoaded||!srcLoaded[srcIdx]){
    el.innerHTML='<div class="loading"><div class="spin"></div>Loading '+sc.name+'…</div>';return;
  }
  var sd=srcData[srcIdx]||[];
  var elig=[];
  sd.forEach(function(p){
    if(!p.bc||!p.nm||p.qty<=0)return;
    var dq=getQty(p.bc);
    var aq;
    if(sc.rule==='wh'){
      aq=calcWH(p.bc,p.qty);
      if(aq<=0||dq>=TARGET)return;
    }else{
      if(dq>0)return; // branch-to-branch: only collect when YOU have 0
      aq=Math.floor(p.qty/2);
      if(aq<=0)return;
    }
    var dp=destData?destData.find(function(x){return x.bc===p.bc;}):null;
    elig.push({bc:p.bc,nm:p.nm,sz:p.sz,dp:p.dp||'General',pr:p.pr,
               srcQty:p.qty,destQty:dq,qty:aq,
               isWH:sc.rule==='wh',destLs:dp?dp.ls:'Never'});
  });

  var done=elig.filter(function(x){return ticks[srcIdx+'_'+x.bc];}).length;
  setProg(elig.length,done,done+' of '+elig.length+' collected from '+sc.name);

  // Build dept list for filter
  var deptCounts={};
  elig.forEach(function(item){deptCounts[item.dp]=(deptCounts[item.dp]||0)+1;});
  var deptList=Object.keys(deptCounts).sort();
  var filteredElig=collectDept==='ALL'?elig:elig.filter(function(x){return x.dp===collectDept;});
  var filtDone=filteredElig.filter(function(x){return ticks[srcIdx+'_'+x.bc];}).length;

  var html='<div class="src-hdr">'+
    '<div class="src-name" style="color:'+sc.color+'">Collect from '+sc.name+'</div>'+
    '<div class="src-rule" style="color:'+sc.color+'">'+(sc.rule==='wh'?'Top up to '+TARGET+' on shelf (smart split — lowest stock branch gets priority)':'Only items where YOU have 0 in stock — collect half from them')+'</div>'+
    '<div class="src-prog">'+filtDone+' of '+filteredElig.length+' done'+(collectDept!=='ALL'?' · '+collectDept:'')+'</div>'+
  '</div>'+
  // Dept filter pills
  '<div style="background:var(--s1);border-bottom:1px solid var(--border);padding:7px 10px;overflow-x:auto;scrollbar-width:none;display:'+(deptList.length>1?'block':'none')+'">'+
  '<div style="display:flex;gap:5px;min-width:max-content">'+
  '<div class="pill collect-dept-pill'+(collectDept==='ALL'?' on':'')+'" data-dp="ALL">All ('+elig.length+')</div>'+
  deptList.map(function(d){
    var cnt=deptCounts[d];
    var dn=elig.filter(function(x){return x.dp===d&&ticks[srcIdx+'_'+x.bc];}).length;
    return '<div class="pill collect-dept-pill'+(collectDept===d?' on':'')+'" data-dp="'+d.replace(/"/g,'&quot;')+'">'+d+' ('+cnt+')</div>';
  }).join('')+
  '</div></div>';

  if(!filteredElig.length&&elig.length){
    html+='<div class="empty">Nothing in <strong>'+collectDept+'</strong> to collect from '+sc.name+'<br><small>Try "All" to see other departments</small></div>';
    el.innerHTML=html;
    el.querySelectorAll('.collect-dept-pill').forEach(function(p){p.addEventListener('click',function(){collectDept=this.dataset.dp;renderCollect(srcIdx);});});
    return;
  }
  if(!elig.length){
    html+='<div class="empty">Nothing to collect from '+sc.name+' right now</div>';
    el.innerHTML=html;return;
  }

  var byDept={};
  filteredElig.forEach(function(item){if(!byDept[item.dp])byDept[item.dp]=[];byDept[item.dp].push(item);});

  Object.keys(byDept).sort().forEach(function(dept){
    var items=byDept[dept];
    html+='<div class="dept-hdr"><div class="dept-name">'+dept+'</div><div class="dept-sub">'+items.length+' items</div></div>';
    html+='<div class="card-list">';
    items.forEach(function(item){
      var isDone=!!ticks[srcIdx+'_'+item.bc];
      var ddays=dAgo(item.destLs),dtag=dayTag(ddays,30,7);
      var zeroClass=(!isDone&&item.destQty<=0)?'zero-dest':'';
      html+='<div class="item-card'+(isDone?' done':'')+' '+zeroClass+'" data-bc="'+item.bc+'" data-si="'+srcIdx+'">'+
        '<div class="item-img">'+imgEl(item.bc,52)+'</div>'+
        '<div class="item-body">'+
          '<div class="item-name">'+item.nm+(item.sz?' · '+item.sz:'')+'</div>'+
          '<div class="item-bc">'+item.bc+'</div>'+
          '<div class="item-tags">'+(dtag?dtag:'')+
            '<span class="itag '+(item.isWH?'itag-wh':'itag-src')+'">'+sc.short+':'+item.srcQty+'</span>'+
            (item.isWH?'<span class="itag itag-info">'+item.destQty+'→tgt'+TARGET+'</span>':'<span class="itag itag-out">Here:0</span>')+
            (item.pr>0?'<span class="itag itag-info">£'+item.pr.toFixed(2)+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div class="item-right">'+
          '<div class="cbox'+(isDone?' done-box':'')+'">'+
            '<div class="cnum'+(isDone?' done-num':'')+'">'+item.qty+'</div>'+
            '<div class="clbl">'+(item.isWH?'top up':'collect')+'</div>'+
          '</div>'+
          '<div class="tick'+(isDone?' on':'')+'" data-bc="'+item.bc+'" data-si="'+srcIdx+'">'+
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="'+(isDone?'#fff':'var(--border)')+'" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'+
          '</div>'+
        '</div>'+
      '</div>';
    });
    html+='</div>';
  });

  html+='<div class="wa-footer"><div class="wa-row"><span>Message manager when done</span><span id="wa-cnt">'+done+' done</span></div>'+
    '<button class="wa-btn" id="wa-btn">'+waSVG()+'Message manager</button></div>';
  el.innerHTML=html;

  // Wire dept filter pills
  el.querySelectorAll('.collect-dept-pill').forEach(function(p){
    p.addEventListener('click',function(){collectDept=this.dataset.dp;renderCollect(srcIdx);});
  });

  // Wire ticks — instant DOM update only, no re-render
  el.querySelectorAll('.tick').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var bc=this.dataset.bc,si=+this.dataset.si,key=si+'_'+bc;
      var wasDone=!!ticks[key];ticks[key]=!wasDone;
      try{localStorage.setItem('cc_t'+DEST_ID,JSON.stringify(ticks));}catch(e){}
      syncSave('cc_t'+DEST_ID,ticks);
      var nowDone=!wasDone;
      var card=this.closest('.item-card');
      if(card){
        card.classList.toggle('done',nowDone);
        var nm=card.querySelector('.item-name');if(nm)nm.style.textDecoration=nowDone?'line-through':'';
        var box=card.querySelector('.cbox');if(box)box.classList.toggle('done-box',nowDone);
        var num=card.querySelector('.cnum');if(num)num.classList.toggle('done-num',nowDone);
      }
      this.classList.toggle('on',nowDone);
      this.querySelector('svg').setAttribute('stroke',nowDone?'#fff':'var(--border)');
      var tot=el.querySelectorAll('.tick').length;
      var dn=el.querySelectorAll('.tick.on').length;
      setProg(tot,dn,dn+' of '+tot+' done');
      var wc=document.getElementById('wa-cnt');if(wc)wc.textContent=dn+' done';
      if(nowDone)tmrPick();
    });
  });

  var waBtn=document.getElementById('wa-btn');
  if(waBtn)waBtn.addEventListener('click',function(){
    var date=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    var time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    var msg='CC '+TITLE+' — collecting from '+sc.name+'\n'+date+' '+time+'\n\n';
    var d=0,p=0;
    el.querySelectorAll('.item-card').forEach(function(card){
      var bc=card.dataset.bc,si=+card.dataset.si,qty=card.querySelector('.cnum').textContent,nm=card.querySelector('.item-name').textContent;
      if(ticks[si+'_'+bc]){msg+='✓ '+nm+' x'+qty+'\n';d++;}else{msg+='⏳ '+nm+' x'+qty+'\n';p++;}
    });
    msg+='\nDone: '+d+' | Pending: '+p+'\nSent from CC Staff App';
    window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
  });
}

  var fixed=negs.filter(function(p){return negTx['n_'+p.bc];}).length;

// ── OOS ────────────────────────────────────────────────────
function renderOOS(){
  var el=document.getElementById('out');
  if(!destLoaded){el.innerHTML='<div class="loading"><div class="spin"></div>Loading…</div>';return;}
  var avail={};
  Object.keys(srcData).forEach(function(si){
    (srcData[si]||[]).forEach(function(p){
      if(p.bc&&p.qty>0){if(!avail[p.bc])avail[p.bc]=[];avail[p.bc].push({name:SOURCES[+si].name,qty:p.qty});}
    });
  });
  // Calculate days since last sold for each OOS item
  // days = today - LastSold date (most accurate OOS estimate we have)
  var today=Date.now();
  var items=(destData||[]).filter(function(p){
    if(!p.bc||!p.nm||p.qty>0)return false; // must be OOS
    if(!p.ls||p.ls==='Never')return false;  // must have sold before
    var d=dAgo(p.ls);
    if(d===null||d<0)return false;
    p._days=d; // days since last sold = proxy for days OOS
    return true;
  });

  // Apply range filter
  if(oosFilt!=='all'){
    var n=parseInt(oosFilt);
    items=items.filter(function(p){
      var d=p._days;
      if(n===0) return d<=6;
      if(n===7) return d>=7&&d<=13;
      if(n===14)return d>=14&&d<=29;
      if(n===30)return d>=30&&d<=59;
      if(n===60)return d>=60&&d<=89;
      if(n===90)return d>=90;
      return true;
    });
  }

  // Sort: most recently OOS first (fewest days = most urgent to restock)
  items.sort(function(a,b){return a._days-b._days;});
  var ws=items.filter(function(p){return avail[p.bc]&&avail[p.bc].length>0;}).length;
  if(!items.length){el.innerHTML='<div class="empty">No OOS items for this filter</div>';return;}
  var html='<div class="stats-grid">'+
    '<div class="stat"><div class="stat-val" style="color:var(--red)">'+items.length+'</div><div class="stat-lbl">OOS</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--green)">'+ws+'</div><div class="stat-lbl">Can collect</div></div>'+
    '<div class="stat"><div class="stat-val" style="color:var(--amber)">'+(items.length-ws)+'</div><div class="stat-lbl">Reorder</div></div></div>';
  var byDept={};items.forEach(function(p){var d=p.dp||'General';if(!byDept[d])byDept[d]=[];byDept[d].push(p);});
  Object.keys(byDept).sort().forEach(function(dept){
    var dits=byDept[dept];
    html+='<div class="dept-hdr"><div class="dept-name">'+dept+'</div><div class="dept-sub">'+dits.length+' OOS</div></div>';
    html+='<div class="card-list">';
    dits.forEach(function(p){
      var av=avail[p.bc]||[],has=av.length>0;
      var dc=p._days>=90?'var(--red)':p._days>=30?'var(--amber)':'var(--sub)';
      // Display logic:
      // If we have tracked data = show "X days OOS" (accurate)
      // If no tracked data yet = show "last sold X days ago" (approximate)
      var displayNum=p._days;
      var displayLbl='days ago';
      var displaySub='last sold';
      html+='<div class="oos-row'+(has?' has':'')+'">'+
        '<div class="oos-img">'+imgEl(p.bc,42)+'</div>'+
        '<div class="oos-body"><div class="oos-name">'+p.nm+(p.sz?' · '+p.sz:'')+'</div>'+
        '<div class="oos-bc">'+p.bc+'</div>'+
        '<div class="oos-tags">'+
          '<span class="itag '+(p._days>=90?'itag-day-red':p._days>=30?'itag-day':'itag-info')+'">Last sold: '+p.ls+'</span>'+
          (has?av.map(function(a){return '<span class="itag itag-src">'+a.name+':'+a.qty+'</span>';}).join(''):'<span class="itag itag-day">Reorder</span>')+
          (p.pr>0?'<span class="itag itag-info">£'+p.pr.toFixed(2)+'</span>':'')+
        '</div></div>'+
        '<div class="oos-right">'+
          '<div class="oos-days" style="color:'+dc+'">'+(displayNum!==null?displayNum:'?')+'</div>'+
          '<div class="oos-lbl">'+displayLbl+'</div>'+
          '<div style="font-size:7px;color:var(--sub)">last sold</div>'+
        '</div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── IMAGES TAB ─────────────────────────────────────────────
var imgDept=''; // selected dept
var imgDeptTab='priority'; // 'priority' or 'other', '' = none chosen yet

function renderImgs(){
  var el=document.getElementById('out');
  if(!destLoaded){el.innerHTML='<div class="loading"><div class="spin"></div>Loading…</div>';return;}

  // Build stats per dept
  var allDepts={};
  (destData||[]).forEach(function(p){
    if(p.qty>0&&p.dp){if(!allDepts[p.dp])allDepts[p.dp]=0;allDepts[p.dp]++;}
  });

  function deptCard(dept,isSelected){
    var total=allDepts[dept]||0;if(!total)return '';
    var missing=(destData||[]).filter(function(p){return p.qty>0&&p.dp===dept&&!imgs[p.bc];}).length;
    var pct=total>0?Math.round((total-missing)/total*100):100;
    var statusColor=missing>0?'var(--red)':'var(--green)';
    return '<div class="img-dept-row'+(isSelected?' selected':'')+'" data-dept="'+dept.replace(/"/g,'&quot;')+'">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'+
        '<span style="font-size:12px;font-weight:700;color:'+(isSelected?'var(--red)':'var(--ink)')+'">'+dept+'</span>'+
        '<span style="font-size:11px;font-weight:700;color:'+statusColor+'">'+(missing>0?missing+' missing':'✓ All done')+'</span>'+
      '</div>'+
      '<div style="height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:3px">'+
        '<div style="height:100%;width:'+pct+'%;background:'+(missing>0?'var(--amber)':'var(--green)')+';border-radius:3px"></div>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--sub)">'+total+' in-stock · '+pct+'% have images</div>'+
    '</div>';
  }

  // Split depts into priority and other
  var priorityDeptList=IMG_PRIORITY_DEPTS.filter(function(d){return allDepts[d];});
  var secondaryDeptList=IMG_SECONDARY_DEPTS.filter(function(d){return allDepts[d]&&IMG_PRIORITY_DEPTS.indexOf(d)<0;});
  var otherDeptList=Object.keys(allDepts).sort().filter(function(d){
    return IMG_PRIORITY_DEPTS.indexOf(d)<0&&IMG_SECONDARY_DEPTS.indexOf(d)<0;
  });

  // Tab switcher: Priority | Other
  var allOtherDepts=secondaryDeptList.concat(otherDeptList);
  var html='<div style="display:flex;background:var(--s1);border-bottom:2px solid var(--bg)">'+
    '<div class="vtab'+(imgDeptTab==='priority'?' on':'')+'" id="img-tab-priority" style="flex:1;text-align:center">📋 Priority</div>'+
    '<div class="vtab'+(imgDeptTab==='other'?' on':'')+'" id="img-tab-other" style="flex:1;text-align:center">📂 Other depts</div>'+
  '</div>'+
  '<div style="padding:10px 12px;background:var(--s1);border-bottom:1px solid var(--border)">'+
  '<div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+
    (imgDeptTab==='priority'?'Priority departments — tap to check':'All other departments')+
  '</div>'+
  '<div style="display:flex;flex-direction:column;gap:5px">';

  var showDepts=imgDeptTab==='priority'?priorityDeptList:allOtherDepts;
  showDepts.forEach(function(dept){html+=deptCard(dept,imgDept===dept);});
  if(!showDepts.length)html+='<div style="font-size:12px;color:var(--sub);padding:10px 0">No departments found</div>';
  html+='</div></div>';

  // If dept selected show its items
  if(imgDept){
    var items=(destData||[]).filter(function(p){return p.qty>0&&p.dp===imgDept;});
    // 3-way split
    var noPhoto=items.filter(function(p){return !imgs[p.bc]&&shopifyData[p.bc];});  // on Shopify, no image
    var notOnShopify=items.filter(function(p){return !shopifyData[p.bc];});          // not on Shopify
    var missing=items.filter(function(p){return !imgs[p.bc];});                      // all missing (no photo + not listed)
    var show=imgFilter==='missing'?missing:imgFilter==='nophoto'?noPhoto:imgFilter==='unlisted'?notOnShopify:items;

    html+='<div style="background:var(--s1);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;justify-content:space-between">'+
      '<div style="font-size:13px;font-weight:700">'+imgDept+'</div>'+
      '<button onclick="imgDept=\'\';renderImgs()" style="font-size:10px;color:var(--sub);background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:var(--font)">↩ Change</button>'+
    '</div>'+
    '<div style="display:flex;gap:5px;padding:8px 10px;background:var(--s1);border-bottom:1px solid var(--border)">'+
      '<div class="pill img-pill'+(imgFilter==='missing'?' on':'')+'" data-f="missing">🔴 Missing ('+missing.length+')</div>'+
      '<div class="pill img-pill'+(imgFilter==='all'?' on':'')+'" data-f="all">All ('+items.length+')</div>'+
    '</div>';

    // WA send button
    var waDeptItems=imgFilter==='missing'?missing:items;
    html+='<div style="background:var(--s1);border-top:1px solid var(--border);padding:9px 13px 4px;margin-top:2px">'+
      '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:6px">'+
        '<span>Send image task to team</span><span>'+missing.length+' missing images</span>'+
      '</div>'+
      '<button id="img-wa-btn" style="width:100%;background:#25d366;color:#fff;border:none;border-radius:var(--r);padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px">'+waSVG()+'Send Section '+((window.imgSection||0)+1)+' to staff</button>'+
    '</div>';

    if(!show.length){
      html+='<div class="empty">'+(imgFilter==='missing'?'✅ All items in this department have images!':'No in-stock items')+'</div>';
    }else{
      // Sort by barcode — same prefix = same brand/range grouped together
      show.sort(function(a,b){return a.bc.localeCompare(b.bc);});

      // Split into sections of 20 items each
      // Staff can be assigned "do Section 1", "do Section 2" etc — no duplicate work
      var SECTION_SIZE=20;
      var totalSections=Math.ceil(show.length/SECTION_SIZE);

      // Section selector bar
      if(typeof imgSection==='undefined')window.imgSection=0;
      html+='<div style="background:var(--s1);border-bottom:1px solid var(--border);padding:8px 10px">'+
        '<div style="font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+
          'Assign sections to staff — each section has '+SECTION_SIZE+' items'+
        '</div>'+
        '<div style="display:flex;gap:5px;flex-wrap:wrap">';
      for(var si=0;si<totalSections;si++){
        var secItems=show.slice(si*SECTION_SIZE,(si+1)*SECTION_SIZE);
        var secMiss=secItems.filter(function(p){return !imgs[p.bc];}).length;
        var secDone=secItems.length-secMiss;
        var isActiveSec=window.imgSection===si;
        html+='<div class="img-section-btn'+(isActiveSec?' on':'')+'" data-sec="'+si+'" '+
          'style="border:2px solid '+(isActiveSec?'var(--red)':secMiss===0?'var(--green)':'var(--border)')+';'+
          'background:'+(isActiveSec?'var(--redbg)':secMiss===0?'var(--greenbg)':'var(--s1)')+';'+
          'border-radius:9px;padding:7px 9px;cursor:pointer;min-width:68px;text-align:center">'+
          '<div style="font-size:12px;font-weight:700;color:'+(isActiveSec?'var(--red)':secMiss===0?'var(--green)':'var(--ink)')+'">Section '+(si+1)+'</div>'+
          '<div style="font-size:9px;color:var(--sub);margin-top:2px">'+secItems.length+' items</div>'+
          '<div style="font-size:9px;font-weight:600;color:'+(secMiss>0?'var(--amber)':'var(--green)')+';margin-top:1px">'+
            (secMiss>0?secMiss+' missing':'✓ done')+
          '</div>'+
        '</div>';
      }
      html+='</div></div>';

      // Show the selected section
      var sectionItems=show.slice(window.imgSection*SECTION_SIZE,(window.imgSection+1)*SECTION_SIZE);
      var secStart=window.imgSection*SECTION_SIZE+1;
      var secEnd=Math.min((window.imgSection+1)*SECTION_SIZE,show.length);
      var secMissCount=sectionItems.filter(function(p){return !imgs[p.bc];}).length;

      html+='<div style="background:var(--redbg);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;justify-content:space-between">'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;color:var(--red)">Section '+(window.imgSection+1)+'</div>'+
          '<div style="font-size:10px;color:var(--sub);margin-top:1px">Items '+secStart+'–'+secEnd+' of '+show.length+' · '+secMissCount+' missing images</div>'+
        '</div>'+
        (window.imgSection+1<totalSections?
          '<button id="next-section-btn" style="font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;border:none;background:var(--red);color:#fff;cursor:pointer;font-family:var(--font)">Next section →</button>':
          '<span style="font-size:10px;font-weight:700;color:var(--green)">Last section ✓</span>')+
      '</div>';

      // Group section items by barcode prefix
      var byPrefix={};var prefixOrder=[];
      sectionItems.forEach(function(p){
        var prefix=p.bc.length>=7?p.bc.substring(0,7):'OTHER';
        if(!byPrefix[prefix]){byPrefix[prefix]=[];prefixOrder.push(prefix);}
        byPrefix[prefix].push(p);
      });

      prefixOrder.forEach(function(prefix){
        var group=byPrefix[prefix];
        var groupMissing=group.filter(function(p){return !imgs[p.bc];}).length;

        if(group.length>1){
          html+='<div style="padding:5px 13px 4px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center">'+
            '<span style="font-size:11px;font-weight:700;color:var(--sub);font-family:monospace">'+prefix+'… <span style="font-weight:400;color:var(--sub)">('+group.length+' products in range)</span></span>'+
            '<span style="font-size:10px;font-weight:700;color:'+(groupMissing>0?'var(--red)':'var(--green)')+'">'+
              (groupMissing>0?groupMissing+' missing':'✓ all have images')+
            '</span>'+
          '</div>';
        }

        html+='<div class="card-list" style="margin:0 11px 7px;border-radius:var(--r)">';
        group.forEach(function(p){
          var hasImg=!!imgs[p.bc];
          html+='<div class="img-row">'+
            '<div class="img-thumb'+(hasImg?' ok':'')+'">'+
              (hasImg?imgEl(p.bc,52):'📷')+
            '</div>'+
            '<div class="img-body">'+
              '<div class="img-name">'+p.nm+(p.sz?' · '+p.sz:'')+'</div>'+
              '<div class="img-bc" style="font-size:10px;color:var(--sub);font-family:monospace;margin-bottom:4px">'+
                '<span style="color:var(--ink);font-weight:600">'+p.bc.substring(0,7)+'</span>'+p.bc.substring(7)+
              '</div>'+
              '<div class="img-tags">'+
                '<span class="img-badge '+(hasImg?'img-badge-ok':'img-badge-miss')+'">'+(hasImg?'✓ Has image':'✗ MISSING — take photo')+'</span>'+
                '<span class="itag itag-info">qty: '+p.qty+'</span>'+
                (p.pr>0?'<span class="itag itag-info">£'+p.pr.toFixed(2)+'</span>':'')+
              '</div>'+
            '</div>'+
          '</div>';
        });
        html+='</div>';
      });
    }
  }

  el.innerHTML=html;

  // Wire section buttons
  el.querySelectorAll('.img-section-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      window.imgSection=+this.dataset.sec;
      renderImgs();
    });
  });
  var nextSecBtn=document.getElementById('next-section-btn');
  if(nextSecBtn)nextSecBtn.addEventListener('click',function(){
    window.imgSection=(window.imgSection||0)+1;
    renderImgs();
    el.scrollIntoView({behavior:'smooth'});
  });

  // Wire tab switcher
  var tabP=document.getElementById('img-tab-priority');
  var tabO=document.getElementById('img-tab-other');
  if(tabP)tabP.addEventListener('click',function(){imgDeptTab='priority';imgDept='';renderImgs();});
  if(tabO)tabO.addEventListener('click',function(){imgDeptTab='other';imgDept='';renderImgs();});

  // Wire dept row clicks — reset section on dept change
  el.querySelectorAll('.img-dept-row').forEach(function(row){
    row.addEventListener('click',function(){
      imgDept=this.dataset.dept;
      imgFilter='missing';
      window.imgSection=0;
      renderImgs();
    });
  });

  // Wire filter pills
  el.querySelectorAll('.img-pill').forEach(function(p){
    p.addEventListener('click',function(e){e.stopPropagation();imgFilter=this.dataset.f;renderImgs();});
  });

  // Wire WA button
  var imgWaBtn=document.getElementById('img-wa-btn');
  if(imgWaBtn)imgWaBtn.addEventListener('click',function(){
    var date=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    var time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    // Send ONLY the current section's missing items
    var allMissing=(destData||[]).filter(function(p){return p.qty>0&&p.dp===imgDept&&!imgs[p.bc];});
    allMissing.sort(function(a,b){return a.bc.localeCompare(b.bc);});
    var secSize=20;
    var curSec=window.imgSection||0;
    var items2=allMissing.slice(curSec*secSize,(curSec+1)*secSize);
    if(!items2.length){alert('No missing images in this section!');return;}
    var secNum=curSec+1;
    var totalSecs=Math.ceil(allMissing.length/secSize);
    var msg='CC '+TITLE+' — Missing Images\n'+date+' '+time+'\nDepartment: '+imgDept+'\nYour section: Section '+secNum+' of '+totalSecs+'\n\n';
    var lastPrefix='';
    items2.forEach(function(p){
      var prefix=p.bc.length>=7?p.bc.substring(0,7):'???';
      if(prefix!==lastPrefix){msg+='\n['+prefix+'… range]\n';lastPrefix=prefix;}
      msg+='  '+p.bc+' — '+p.nm+(p.sz?' '+p.sz:'')+' (qty:'+p.qty+')\n';
    });
    msg+='\nSection '+secNum+' total: '+items2.length+' items to photograph\nAll missing in dept: '+allMissing.length+'\nPlease photograph and upload to Shopify.\nSent from CC Staff App';
    window.open('https://wa.me/447305505976?text='+encodeURIComponent(msg),'_blank');
  });
}

// ── CONTROLS ───────────────────────────────────────────────
document.getElementById('vtabs').addEventListener('click',function(e){
  var vt=e.target.closest('.vtab');if(!vt)return;
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('on');});
  vt.classList.add('on');
  view=vt.dataset.v;
  // Lazy load — only fetch when tab is first opened
  if(view.charAt(0)==='s'){var idx=parseInt(view.substring(1));if(!srcLoaded[idx])loadSrc(idx);collectDept='ALL';}
  else if(view==='oos'){SOURCES.forEach(function(sc,i){if(!srcLoaded[i])loadSrc(i);});}
  renderView();
});
document.getElementById('day-pills').addEventListener('click',function(e){
  var p=e.target.closest('.pill');if(!p)return;
  oosFilt=p.dataset.d;
  document.querySelectorAll('#day-pills .pill').forEach(function(x){x.classList.toggle('on',x.dataset.d===oosFilt);});
  renderOOS();
});
document.getElementById('refresh-btn').addEventListener('click',function(){
  destData=null;srcData={};srcLoaded={};destLoaded=false;
  document.getElementById('out').innerHTML='<div class="loading"><div class="spin"></div>Refreshing…</div>';
  loadDest();loadSrc(0);loadImgs();
});
document.getElementById('sync-btn').addEventListener('click',function(){doSync().then(function(){renderView();});});

// ── START — lazy loading ────────────────────────────────────
// Only load THIS branch + warehouse on startup. Other branches load on demand.
loadDest();     // this branch only
loadSrc(0);     // warehouse always needed for first tab
loadImgs();     // for stats + images tab
doSync();
</script>
