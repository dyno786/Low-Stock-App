<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CC Ops — Staff Allocation (DEMO)</title>
<style>
:root{--purple:#7c3aed;--purpletxt:#5b21b6;--purplebg:#f3e8ff;--sub:#6b7280;--border:#e5e7eb;--ink:#111827;--green:#16a34a;--red:#cc0000;--amber:#d97706;--bg:#f7f7fb}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:40px}
.hdr{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;padding:14px 16px 12px}
.hdr h1{margin:0;font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.hdr .demo{background:rgba(255,255,255,.22);font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.hdr .sub{font-size:12px;opacity:.9;margin-top:3px}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:1;min-width:74px;text-align:center;padding:10px 6px;font-size:12px;font-weight:600;color:var(--sub);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--purpletxt);border-bottom-color:var(--purple)}
.pane{padding:14px}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:7px}
label{font-size:13px;font-weight:600;color:var(--sub);display:block;margin:10px 0 4px}
select,input[type=text],input[type=number]{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px;font-size:15px;background:#fff}
.row{display:flex;gap:10px}.row>*{flex:1}
.btn{display:block;width:100%;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.btn.alt{background:#fff;color:var(--purpletxt);border:1.5px solid var(--purple)}
.btn.sm{padding:7px 11px;width:auto;font-size:13px;margin:0;display:inline-block}
.btn.gho{background:#fff;color:var(--sub);border:1px solid var(--border)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.crit{background:#fee2e2;color:#b91c1c}.pill.ok{background:#dcfce7;color:#15803d}.pill.flex{background:#e0e7ff;color:#4338ca}.pill.mgr{background:#fef3c7;color:#92400e}
.toggle{display:flex;gap:6px;background:#f1f1f6;border-radius:10px;padding:4px;margin-top:6px}
.toggle button{flex:1;border:none;background:none;padding:8px;border-radius:8px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer}
.toggle button.on{background:#fff;color:var(--purpletxt);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.person{border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:9px}
.person .ph{display:flex;align-items:center;justify-content:space-between;gap:8px}
.person .nm{font-weight:800;font-size:14px}
.person .stn{font-size:13px;color:var(--purpletxt);font-weight:700;margin-top:2px}
.tk{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:5px 0;color:#374151}
.tk .t{font-size:11px;color:var(--sub);background:#f3f4f6;padding:1px 6px;border-radius:6px;margin-left:auto;white-space:nowrap}
.bch{font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;color:#fff}
.bar{height:9px;background:#eee;border-radius:999px;overflow:hidden;margin-top:4px}
.bar>span{display:block;height:100%;background:var(--purple)}
.prog{font-size:12px;display:flex;justify-content:space-between;margin-top:9px;font-weight:600}
.prog .l{color:#374151}.prog .v{color:var(--sub)}
.muted{color:var(--sub);font-size:12px}
.note{background:var(--purplebg);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--purpletxt);margin-top:8px}
.alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:11px;padding:11px;font-size:13px;color:#9a3412;margin-bottom:12px;display:flex;gap:9px;align-items:center}
.ordr{border:1px solid var(--border);border-radius:11px;padding:10px;margin-bottom:9px}
.ordr .top{display:flex;justify-content:space-between;align-items:center}
.ordr .on{font-weight:800;font-size:14px}.ordr .amt{font-weight:700}
.ordr .li{font-size:12px;color:#374151;margin-top:5px}
.st-badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
.st-topick{background:#fee2e2;color:#b91c1c}.st-picked{background:#fef3c7;color:#92400e}.st-disp{background:#dcfce7;color:#15803d}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal.show{display:flex}
.modal .box{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:16px;max-height:84vh;overflow:auto}
.wamsg{white-space:pre-wrap;font-size:13px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:11px;color:#14532d;font-family:ui-monospace,monospace}
.tiny{font-size:11px;color:var(--sub);text-align:center;margin-top:10px}
</style></head>
<body><div class="wrap">
<div class="hdr"><h1>🗂️ CC Daily Ops <span class="demo">DEMO</span></h1><div class="sub">Staff allocation · live board · 3-hour updates</div></div>
<div class="tabs" id="tabs"></div>
<div class="pane" id="pane"></div>
</div>

<div class="modal" id="modal"><div class="box" id="modalbox"></div></div>

<script>
/* ---------- demo state ---------- */
var COLORS={roundhay:'#cc0000',chapeltown:'#0369a1',city:'#7c3aed'};
var STORE={roundhay:'Roundhay',chapeltown:'Chapeltown',city:'City Centre'};

var STATIONS={
 roundhay:[
  {key:'online',label:'Online Dispatch',icon:'📦',critical:true,tasks:[['Work Shopify orders (pick & pack)','~2m/order'],['Product photos for new lines','~60s ea'],['Dispatch & postage','~1m/parcel']]},
  {key:'till',label:'Till',icon:'🧾',tasks:[['Serve customers',''],['Returns & exchanges','']]},
  {key:'floor',label:'Shop Floor + Stock',icon:'🧍',tasks:[['Fix negatives','≤30s ea'],['Place W/H order (map order)','~10s/line'],['Overstock transfers out','~25s ea'],['Mark discontinued','~10s ea']]},
  {key:'support',label:'Stock Support',icon:'🔁',flex:true,tasks:[['Clear image backlog','~60s ea'],['Negatives backlog','≤30s ea']]},
  {key:'cover',label:'Floor / Breaks Cover',icon:'☕',flex:true,tasks:[['Cover breaks',''],['Second floor / restock','']]}
 ],
 chapeltown:[
  {key:'pick',label:'Warehouse Picking (all 3 stores)',icon:'🛒',critical:true,tasks:[['Pick & pack branch top-ups (map walk)','~35s/line'],['Warehouse OOS → PICCO reorder','~20s ea'],['Dispatch totes to branches','~3m/branch']]},
  {key:'till',label:'Till',icon:'🧾',tasks:[['Serve customers',''],['Returns & exchanges','']]},
  {key:'floor',label:'Shop Floor + Stock',icon:'🧍',tasks:[['Fix negatives','≤30s ea'],['Place W/H order (map order)','~10s/line'],['Overstock transfers out','~25s ea']]},
  {key:'support',label:'Goods-in / Picking Support',icon:'📥',flex:true,tasks:[['Book in supplier deliveries',''],['Help picking on busy runs','']]},
  {key:'cover',label:'Floor / Breaks Cover',icon:'☕',flex:true,tasks:[['Cover breaks',''],['Second floor','']]}
 ],
 city:[
  {key:'till',label:'Till',icon:'🧾',critical:true,tasks:[['Serve customers',''],['Returns & exchanges','']]},
  {key:'floor',label:'Shop Floor + Stock',icon:'🧍',tasks:[['Fix negatives','≤30s ea'],['Place W/H order (map order)','~10s/line'],['Overstock transfers out','~25s ea']]},
  {key:'support',label:'Stock / Online Support',icon:'🔁',tasks:[['Clear image backlog','~60s ea'],['Negatives backlog','≤30s ea']]},
  {key:'till2',label:'Second Till / Online',icon:'🧾',flex:true,tasks:[['Second till at peak',''],['Online support','']]},
  {key:'cover',label:'Floor / Breaks Cover',icon:'☕',flex:true,tasks:[['Cover breaks',''],['Restock floor','']]}
 ]
};

function todayKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function defaultPickMode(){var d=new Date();var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);return (doy%2===0)?'full':'urgent';}

var S=load();
function load(){try{var v=JSON.parse(localStorage.getItem('cc_ops_demo')||'null');if(v&&v.day===todayKey())return v;}catch(e){}
 return {day:todayKey(),mgrPhone:'',pickMode:defaultPickMode(),branches:{
  roundhay:{count:0,mgr:false,done:false},chapeltown:{count:0,mgr:false,done:false},city:{count:0,mgr:false,done:false}},
  progress:seedProgress(),reports:[],lastReport:null};}
function save(){try{localStorage.setItem('cc_ops_demo',JSON.stringify(S));}catch(e){}}
function seedProgress(){return {
 roundhay:{neg:[4,14],who:[3,6],online:[3,11],img:[1,9]},
 chapeltown:{neg:[6,8],who:[8,8],pick:[12,30]},
 city:{neg:[2,10],who:[5,7],tr:[1,6]}};}

/* sample online orders (Roundhay dispatch) */
var ORDERS=[
 {id:'#1042',cust:'A. Khan',items:'Cantu Curl Cream ×2, Edge Control',amt:'£23.40',st:'topick',br:'roundhay'},
 {id:'#1041',cust:'S. Begum',items:'Dark & Lovely Relaxer Kit',amt:'£12.99',st:'topick',br:'roundhay'},
 {id:'#1040',cust:'J. Owusu',items:'Shea Moisture Shampoo + Conditioner',amt:'£18.00',st:'picked',br:'roundhay'},
 {id:'#1039',cust:'M. Ali',items:'Eco Styler Gel 32oz ×3',amt:'£14.50',st:'topick',br:'city'},
 {id:'#1038',cust:'R. Nadia',items:'Got2b Glued Spray',amt:'£6.99',st:'disp',br:'roundhay'},
 {id:'#1037',cust:'L. Campbell',items:'KeraCare Leave-In, Wide Tooth Comb',amt:'£21.75',st:'picked',br:'chapeltown'}
];

/* ---------- allocation engine ---------- */
function allocate(branchKey){
 var b=S.branches[branchKey], stns=STATIONS[branchKey];
 var total=b.count|0, workers=Math.max(0,total-(b.mgr?1:0));
 var core=stns.filter(function(s){return !s.flex;}), flex=stns.filter(function(s){return s.flex;});
 var out=[],used=0,lastStaffed=null;
 // fill core first
 core.forEach(function(s,i){
   if(used<workers){used++;var p={who:'Staff '+used,st:s,also:[]};out.push(p);lastStaffed=p;}
   else{ if(s.critical){out.push({who:'⚠ UNCOVERED',st:s,crit:true});}
         else if(lastStaffed){lastStaffed.also.push(s);} 
         else{out.push({who:'⚠ UNCOVERED',st:s});} }
 });
 // extra workers -> flex stations, then pool
 var fi=0;
 while(used<workers && fi<flex.length){used++;out.push({who:'Staff '+used,st:flex[fi]});fi++;}
 var pool=workers-used; // leftover staff beyond all stations
 // manager
 var mgr=null;
 if(b.mgr){var gap=out.find(function(p){return p.crit;})||out.find(function(p){return p.who.indexOf('UNCOVERED')>=0;});
   mgr={covers: gap?gap.st.label:null, merged: out.filter(function(p){return p.also&&p.also.length;}).length};}
 return {total:total,workers:workers,mgr:mgr,rows:out,pool:pool};
}

/* ---------- views ---------- */
var TAB='board';
var TABS=[['board','📋 All — staff & progress'],['checkin','✅ Check-in'],['orders','🛒 Orders'],['set','⚙︎']];
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(function(t){return '<button class="tab'+(TAB===t[0]?' active':'')+'" onclick="go(\''+t[0]+'\')">'+t[1]+'</button>';}).join('');}
function go(t){TAB=t;renderTabs();render();}

function badge(k){return '<span class="bch" style="background:'+COLORS[k]+'">'+STORE[k]+'</span>';}
function pct(a){return a[1]?Math.round(a[0]/a[1]*100):0;}
function pbar(label,a){return '<div class="prog"><span class="l">'+label+'</span><span class="v">'+a[0]+'/'+a[1]+'</span></div><div class="bar"><span style="width:'+pct(a)+'%"></span></div>';}

function render(){
 var p=document.getElementById('pane');
 if(TAB==='checkin')return p.innerHTML=vCheckin();
 if(TAB==='alloc')return p.innerHTML=vAlloc();
 if(TAB==='orders')return p.innerHTML=vOrders();
 if(TAB==='set')return p.innerHTML=vSet();
 return p.innerHTML=vBoard();
}

function vCheckin(){
 var h='<div class="card"><h3>✅ Morning check-in</h3><p class="muted">Each branch sets who\u2019s in today. The app allocates jobs by priority and flags any gaps.</p>';
 Object.keys(S.branches).forEach(function(k){
   var b=S.branches[k];
   h+='<div class="person" style="border-left:4px solid '+COLORS[k]+'"><div class="ph"><span class="nm">'+STORE[k]+'</span>'+(b.done?'<span class="pill ok">✓ checked in</span>':'<span class="pill flex">pending</span>')+'</div>'
     +'<label>Staff in today (including manager)</label><input type="number" min="0" max="12" value="'+(b.count||'')+'" onchange="setCnt(\''+k+'\',this.value)">'
     +'<label style="margin-top:8px"><input type="checkbox" '+(b.mgr?'checked':'')+' onchange="setMgr(\''+k+'\',this.checked)" style="width:auto;margin-right:6px">Manager is one of them</label>';
   if(k==='chapeltown'){h+='<label>Picking mode today</label><div class="toggle">'
     +'<button class="'+(S.pickMode==='full'?'on':'')+'" onclick="setPick(\'full\')">Full pick</button>'
     +'<button class="'+(S.pickMode==='urgent'?'on':'')+'" onclick="setPick(\'urgent\')">Urgent OOS only</button></div>'
     +'<div class="note">Auto-suggests <b>'+(defaultPickMode()==='full'?'Full pick':'Urgent OOS')+'</b> today (alternates daily). Override if needed.</div>';}
   h+='<button class="btn sm" style="margin-top:10px;background:'+COLORS[k]+'" onclick="checkin(\''+k+'\')">Allocate '+STORE[k]+'</button></div>';
 });
 h+='</div>';return h;
}
function setCnt(k,v){S.branches[k].count=parseInt(v)||0;save();}
function setMgr(k,v){S.branches[k].mgr=v;save();}
function setPick(m){S.pickMode=m;save();render();}
function checkin(k){if(!S.branches[k].count){alert('Enter how many staff are in at '+STORE[k]+'.');return;}S.branches[k].done=true;save();TAB='board';renderTabs();render();}

var ALLOCBR='roundhay';
function vAlloc(){
 var h='<div class="card"><h3>👥 Today\u2019s allocation</h3><label>Branch</label><select onchange="ALLOCBR=this.value;render()">'
  +Object.keys(STORE).map(function(k){return '<option value="'+k+'" '+(ALLOCBR===k?'selected':'')+'>'+STORE[k]+'</option>';}).join('')+'</select></div>';
 var b=S.branches[ALLOCBR];
 if(!b.done)return h+'<div class="card"><p class="muted">'+STORE[ALLOCBR]+' hasn\u2019t checked in yet. Go to Check-in.</p></div>';
 var a=allocate(ALLOCBR);
 h+='<div class="card"><div class="ph" style="display:flex;justify-content:space-between;align-items:center"><b>'+badge(ALLOCBR)+'</b><span class="muted">'+a.total+' in · '+a.workers+' on jobs'+(b.mgr?' + manager':'')+'</span></div>';
 if(ALLOCBR==='chapeltown')h+='<div class="note">🛒 Picking today: <b>'+(S.pickMode==='full'?'FULL PICK (all branch top-ups)':'URGENT OOS PICK only')+'</b></div>';
 h+='</div>';
 a.rows.forEach(function(r){
   var crit=r.crit||r.who.indexOf('UNCOVERED')>=0;
   h+='<div class="person"'+(crit?' style="border-color:#fecaca;background:#fff5f5"':'')+'><div class="ph"><div><div class="nm">'+r.who+'</div><div class="stn">'+r.st.icon+' '+r.st.label+'</div></div>'
     +(r.st.critical?'<span class="pill crit">critical</span>':(r.st.flex?'<span class="pill flex">flex</span>':'<span class="pill ok">core</span>'))+'</div>';
   var tasks=r.st.tasks.slice();
   tasks.forEach(function(t){h+='<div class="tk"><span>•</span><span>'+t[0]+'</span>'+(t[1]?'<span class="t">'+t[1]+'</span>':'')+'</div>';});
   if(r.also&&r.also.length){r.also.forEach(function(s){h+='<div class="note" style="margin-top:6px">Also covering <b>'+s.label+'</b> (short-staffed) — '+s.tasks.map(function(x){return x[0];}).slice(0,2).join(', ')+'…</div>';});}
   h+='</div>';
 });
 if(a.mgr){h+='<div class="person" style="border-color:#fde68a;background:#fffbeb"><div class="ph"><div><div class="nm">Manager <span class="pill mgr">floats</span></div><div class="stn">🧭 Oversee + cover gaps</div></div></div>'
   +'<div class="tk"><span>•</span><span>Monitor the board, keep jobs moving</span></div>'
   +'<div class="tk"><span>•</span><span>Approve &amp; send the 3-hour update</span></div>'
   +(a.mgr.covers?'<div class="note" style="margin-top:6px">⚠ Today also covering <b>'+a.mgr.covers+'</b> (critical, otherwise unstaffed).</div>':'<div class="note" style="margin-top:6px">All stations staffed — manager free to float.</div>')+'</div>';}
 if(a.pool>0)h+='<div class="card"><b>'+a.pool+' extra '+(a.pool===1?'person':'people')+'</b><div class="muted">Flex pool: clear image/negatives backlog, cover breaks, support the busiest station.</div></div>';
 return h;
}

function personHTML(r){
   var crit=r.crit||r.who.indexOf('UNCOVERED')>=0;
   var h='<div class="person"'+(crit?' style="border-color:#fecaca;background:#fff5f5"':'')+'><div class="ph"><div><div class="nm">'+r.who+'</div><div class="stn">'+r.st.icon+' '+r.st.label+'</div></div>'
     +(r.st.critical?'<span class="pill crit">critical</span>':(r.st.flex?'<span class="pill flex">flex</span>':'<span class="pill ok">core</span>'))+'</div>';
   r.st.tasks.forEach(function(t){h+='<div class="tk"><span>•</span><span>'+t[0]+'</span>'+(t[1]?'<span class="t">'+t[1]+'</span>':'')+'</div>';});
   if(r.also&&r.also.length){r.also.forEach(function(s){h+='<div class="note" style="margin-top:6px">Also covering <b>'+s.label+'</b> — '+s.tasks.map(function(x){return x[0];}).slice(0,2).join(', ')+'…</div>';});}
   return h+'</div>';
}
function mgrHTML(a){
   return '<div class="person" style="border-color:#fde68a;background:#fffbeb"><div class="ph"><div><div class="nm">Manager <span class="pill mgr">floats</span></div><div class="stn">🧭 Oversee + cover gaps</div></div></div>'
     +'<div class="tk"><span>•</span><span>Keep jobs moving, approve the 3-hour update</span></div>'
     +(a.mgr.covers?'<div class="note" style="margin-top:6px">⚠ Also covering <b>'+a.mgr.covers+'</b> (critical).</div>':'<div class="note" style="margin-top:6px">All stations staffed — free to float.</div>')+'</div>';
}
function vBoard(){
 var h='';
 var next=nextReportTime();
 h+='<div class="alert">⏰ <div><b>Next manager update: '+next+'</b><br><span class="muted">Auto-summary of what each branch has done.</span></div></div>';
 h+='<button class="btn" onclick="buildReport()">📲 Send 3-hour update now</button>';
 h+='<button class="btn alt" onclick="simulate()">▶︎ Simulate an hour of work (demo)</button>';
 Object.keys(STORE).forEach(function(k){
   var b=S.branches[k],pr=S.progress[k];
   h+='<div class="card" style="border-top:4px solid '+COLORS[k]+';margin-bottom:8px"><div class="ph" style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">'+STORE[k]+'</h3>'
     +(b.done?'<span class="pill ok">'+b.count+' in</span>':'<span class="pill crit">not checked in</span>')+'</div>';
   if(!b.done){h+='<p class="muted">Awaiting morning check-in.</p></div>';return;}
   if(k==='chapeltown')h+='<div class="note">🛒 '+(S.pickMode==='full'?'FULL PICK day — all branch top-ups':'URGENT OOS day — out-of-stock only')+'</div>';
   if(k==='chapeltown')h+=pbar('Picking ('+(S.pickMode==='full'?'full':'urgent')+')',pr.pick);
   h+=pbar('Negatives',pr.neg);
   h+=pbar('W/H order lines',pr.who);
   if(k==='roundhay')h+=pbar('Online orders dispatched',pr.online);
   if(k==='roundhay')h+=pbar('Missing images',pr.img);
   if(k==='city')h+=pbar('Transfers out',pr.tr);
   h+='</div>';
   var a=allocate(k);
   a.rows.forEach(function(r){h+=personHTML(r);});
   if(a.mgr)h+=mgrHTML(a);
   if(a.pool>0)h+='<div class="card" style="margin-bottom:14px"><b>'+a.pool+' extra '+(a.pool===1?'person':'people')+'</b><div class="muted">Flex: clear image/negatives backlog, cover breaks, support the busiest job.</div></div>';
 });
 if(S.lastReport)h+='<div class="tiny">Last update sent '+S.lastReport+'</div>';
 return h;
}

function vOrders(){
 var h='<div class="card"><h3>🛒 Online orders</h3><p class="muted">Roundhay works orders <b>here</b> instead of checking Shopify and sending photos. Mark each Pick → Dispatch.</p>'
  +'<div class="note">Demo data. Live version pulls unfulfilled Shopify orders (per branch / location) via the Admin API.</div></div>';
 var groups={roundhay:[],chapeltown:[],city:[]};
 ORDERS.forEach(function(o){(groups[o.br]||groups.roundhay).push(o);});
 Object.keys(groups).forEach(function(k){
   if(!groups[k].length)return;
   h+='<div class="card"><div class="ph" style="margin-bottom:8px">'+badge(k)+'<span class="muted" style="margin-left:auto">'+groups[k].length+' open</span></div>';
   groups[k].forEach(function(o){
     var lbl=o.st==='topick'?'<span class="st-badge st-topick">To pick</span>':o.st==='picked'?'<span class="st-badge st-picked">Picked</span>':'<span class="st-badge st-disp">Dispatched</span>';
     h+='<div class="ordr"><div class="top"><span class="on">'+o.id+' · '+o.cust+'</span><span class="amt">'+o.amt+'</span></div>'
       +'<div class="li">'+o.items+'</div><div style="display:flex;align-items:center;gap:8px;margin-top:8px">'+lbl;
     if(o.st==='topick')h+='<button class="btn sm gho" style="margin-left:auto" onclick="setOrd(\''+o.id+'\',\'picked\')">Mark picked</button>';
     else if(o.st==='picked')h+='<button class="btn sm" style="margin-left:auto" onclick="setOrd(\''+o.id+'\',\'disp\')">Mark dispatched</button>';
     else h+='<span style="margin-left:auto" class="muted">done ✓</span>';
     h+='</div></div>';
   });
   h+='</div>';
 });
 return h;
}
function setOrd(id,st){var o=ORDERS.find(function(x){return x.id===id;});if(o){o.st=st;if(st==='disp'){S.progress.roundhay.online[0]=Math.min(S.progress.roundhay.online[1],S.progress.roundhay.online[0]+1);save();}}render();}

function vSet(){
 return '<div class="card"><h3>⚙︎ Settings</h3>'
  +'<label>Manager WhatsApp number (intl, e.g. 4477…)</label><input type="text" value="'+(S.mgrPhone||'')+'" onchange="S.mgrPhone=this.value.replace(/[^0-9]/g,\'\');save()" placeholder="447700900123">'
  +'<div class="note">The 3-hour update opens WhatsApp pre-filled to this number. <b>Fully automatic</b> hands-free sending needs the WhatsApp Cloud API (Meta) or Twilio + a scheduled job — I can wire that next.</div>'
  +'<button class="btn alt" onclick="resetDemo()">Reset demo data</button></div>';
}
function resetDemo(){localStorage.removeItem('cc_ops_demo');S=load();render();}

/* ---------- 3-hour report ---------- */
function nextReportTime(){var slots=[9,12,15,18];var now=new Date();var h=now.getHours();for(var i=0;i<slots.length;i++){if(slots[i]>h)return slots[i]+':00';}return '9:00 (tomorrow)';}
function reportText(){
 var t=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
 var L=['CC Hair & Beauty — ops update '+t,''];
 Object.keys(STORE).forEach(function(k){
   var b=S.branches[k],pr=S.progress[k];
   if(!b.done){L.push(STORE[k]+': not checked in');return;}
   var parts=[];
   if(k==='chapeltown')parts.push((S.pickMode==='full'?'Full pick':'Urgent pick')+' '+pr.pick[0]+'/'+pr.pick[1]);
   parts.push('Negs '+pr.neg[0]+'/'+pr.neg[1]);
   parts.push('W/H '+(pr.who[0]>=pr.who[1]?'sent ✓':pr.who[0]+'/'+pr.who[1]));
   if(k==='roundhay')parts.push('Online '+pr.online[0]+'/'+pr.online[1]+' out');
   if(k==='roundhay')parts.push('Imgs '+pr.img[0]+'/'+pr.img[1]);
   if(k==='city')parts.push('Transfers '+pr.tr[0]+'/'+pr.tr[1]);
   L.push(STORE[k]+' ('+b.count+'): '+parts.join(', '));
 });
 L.push('','Next update '+nextReportTime()+'.');
 return L.join('\n');
}
function buildReport(){
 var msg=reportText();
 S.lastReport=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});S.reports.push(msg);save();
 var href=S.mgrPhone?('https://wa.me/'+S.mgrPhone+'?text='+encodeURIComponent(msg)):('https://wa.me/?text='+encodeURIComponent(msg));
 var box=document.getElementById('modalbox');
 box.innerHTML='<h3 style="margin-top:0">📲 3-hour update</h3><div class="wamsg">'+msg.replace(/</g,'&lt;')+'</div>'
  +'<a class="btn" href="'+href+'" target="_blank" style="text-decoration:none;text-align:center">Open in WhatsApp</a>'
  +'<button class="btn gho" onclick="closeModal()">Close</button>'
  +'<div class="tiny">Demo opens WhatsApp with the message ready to send. Automatic sending = WhatsApp Cloud API + a 3-hourly scheduled job.</div>';
 document.getElementById('modal').classList.add('show');
 render();
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function simulate(){
 Object.keys(S.progress).forEach(function(k){var pr=S.progress[k];Object.keys(pr).forEach(function(m){var a=pr[m];a[0]=Math.min(a[1],a[0]+Math.ceil(a[1]*0.18));});});
 save();render();
}

renderTabs();render();
</script></body></html>
