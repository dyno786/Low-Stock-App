<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CC Urgent Transfers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--bg:#f4f4f4;--s1:#fff;--s2:#f8f8f8;--border:#eee;--ink:#111;--sub:#999;--red:#cc0000;--redbg:#fff0f0;--green:#15803d;--greenbg:#f0fdf4;--amber:#b45309;--amberbg:#fffbeb;--purple:#6d28d9;--purplebg:#ede9fe;--blue:#0055cc;--bluebg:#e6f1fb;--r:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:140px}
/* PIN */
.pinov{position:fixed;inset:0;background:#cc0000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:480px;margin:0 auto}
.pinlogo{width:64px;height:64px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:24px;color:#cc0000;margin-bottom:18px}
.pintitle{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px}
.pinsub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:40px}
.pindots{display:flex;gap:16px;margin-bottom:36px}
.pindot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .15s}
.pindot.filled{background:#fff;transform:scale(1.1)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:260px}
.pinkey{background:rgba(255,255,255,.15);border:none;border-radius:14px;height:68px;font-size:24px;font-weight:500;color:#fff;cursor:pointer;touch-action:manipulation}
.pinkey:active{background:rgba(255,255,255,.3)}
.pinerr{color:#ffcccc;font-size:13px;margin-top:18px;height:20px;text-align:center}
/* HEADER */
.hdr{background:#cc0000;padding:12px 16px 0;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-logo{width:30px;height:30px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#cc0000}
.hdr-title{color:#fff;font-size:14px;font-weight:700;margin-left:8px}
.hdr-sub{color:rgba(255,255,255,.7);font-size:10px;font-family:monospace}
.hdr-btn{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer}
/* BRANCH TABS */
.btabs{display:flex;background:#cc0000;overflow-x:auto;scrollbar-width:none;padding:0 4px}
.btabs::-webkit-scrollbar{display:none}
.btab{flex:1;padding:10px 8px;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;user-select:none;min-width:80px}
.btab.on{color:#fff;border-bottom-color:#fff}
/* PROGRESS */
.prog-wrap{background:#fff;padding:8px 14px;border-bottom:1px solid var(--border)}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.prog-txt{font-size:11px;font-weight:600;color:var(--green)}
.prog-sub{font-size:10px;color:var(--sub);margin-top:3px}
/* SOURCE SECTION */
.src-section{margin:0;border-bottom:4px solid var(--bg)}
.src-hdr{background:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:117px;z-index:50}
.src-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.src-name{font-size:13px;font-weight:700;flex:1}
.src-rule{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.src-progress{font-size:10px;color:var(--sub)}
/* DEPT FILTER PILLS */
.dept-filter{background:#fff;border-bottom:1px solid var(--border);padding:7px 10px;display:flex;gap:5px;flex-wrap:wrap;position:sticky;top:117px;z-index:49}
.dpill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--sub);user-select:none;white-space:nowrap;transition:all .1s}
.dpill.on{background:#cc0000;color:#fff;border-color:#cc0000}
/* DEPT HEADERS */
.dept-hdr{padding:7px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.dept-name{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.dept-count{font-size:10px;color:var(--sub)}
.dept-body{display:block}
/* ITEM CARD */
.item-card{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:10px 12px;gap:10px;cursor:pointer;transition:background .1s}
.item-card:active{background:var(--bg)}
.item-card.done{background:var(--greenbg)}
.item-card.done .item-name{text-decoration:line-through;color:var(--sub)}
.item-img{width:52px;height:52px;border-radius:8px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.item-img img{width:52px;height:52px;object-fit:cover}
.item-body{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.item-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:5px}
.item-tags{display:flex;gap:3px;flex-wrap:wrap}
.itag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.itag-src{background:var(--greenbg);color:var(--green)}
.itag-info{background:var(--bg);color:var(--sub)}
.itag-wh{background:var(--purplebg);color:var(--purple)}
.item-right{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.collect-box{background:var(--redbg);border-radius:8px;padding:5px 8px;text-align:center;min-width:44px}
.collect-box.done-box{background:var(--greenbg)}
.collect-num{font-size:18px;font-weight:700;color:#cc0000;line-height:1}
.collect-num.done-num{color:var(--green)}
.collect-lbl{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.tick-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;background:#fff}
.tick-btn.done{background:var(--green);border-color:var(--green)}
.tick-btn svg{opacity:0;transition:opacity .1s}
.tick-btn.done svg{opacity:1}
/* OOS TABLE */
.oos-section{background:#fff;border-bottom:4px solid var(--bg)}
.oos-dept-hdr{padding:7px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.oos-dept-name{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.oos-row{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:9px 12px;gap:10px;align-items:center}
.oos-row.has-src{background:#f0fdf4}
.oos-img{width:42px;height:42px;border-radius:7px;background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.oos-img img{width:42px;height:42px;object-fit:cover}
.oos-body{flex:1;min-width:0}
.oos-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.oos-bc{font-size:9px;color:var(--sub);font-family:monospace;margin-bottom:4px}
.oos-tags{display:flex;gap:3px;flex-wrap:wrap}
.oos-right{flex-shrink:0;text-align:right}
.days-badge{font-size:13px;font-weight:700;font-family:monospace}
.days-lbl{font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
/* VIEW TABS */
.vtab{transition:all .15s}
/* LOADING */
.loading{padding:40px 14px;text-align:center;color:var(--sub);font-size:12px}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:#cc0000;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:30px 14px;text-align:center;color:var(--sub);font-size:12px;line-height:2}
/* WHATSAPP FOOTER */
.wa-footer{position:fixed;bottom:62px;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid var(--border);padding:8px 12px;z-index:150}
.wa-btn{width:100%;background:#25d366;color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px}
.wa-btn svg{width:18px;height:18px;flex-shrink:0}
.wa-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:10px;color:var(--sub)}
.wa-progress{font-weight:600;color:var(--ink)}
/* NAV */
.cc-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#111;border-top:0.5px solid rgba(255,255,255,.12);display:flex;z-index:9000;padding:5px 0 16px;overflow-x:auto;scrollbar-width:none}
.cc-nav::-webkit-scrollbar{display:none}
.cc-nav-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;cursor:pointer;text-decoration:none;color:rgba(255,255,255,.3)}
.cc-nav-item svg{width:19px;height:19px}
.cc-nav-item span{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.cc-nav-item.active{color:#cc0000}
.cc-nav-home{background:#cc0000;border-radius:10px;margin:4px;padding:4px 10px;color:#fff !important}
</style>
</head>
<body>

<!-- PIN -->
<div class="pinov" id="pinov">
  <div class="pinlogo">CC</div>
  <div class="pintitle">Urgent Transfers</div>
  <div class="pinsub">CC Hair &amp; Beauty</div>
  <div class="pindots"><div class="pindot" id="pd0"></div><div class="pindot" id="pd1"></div><div class="pindot" id="pd2"></div><div class="pindot" id="pd3"></div></div>
  <div class="pinpad" id="pinpad">
    <button class="pinkey" data-n="1">1</button><button class="pinkey" data-n="2">2</button><button class="pinkey" data-n="3">3</button>
    <button class="pinkey" data-n="4">4</button><button class="pinkey" data-n="5">5</button><button class="pinkey" data-n="6">6</button>
    <button class="pinkey" data-n="7">7</button><button class="pinkey" data-n="8">8</button><button class="pinkey" data-n="9">9</button>
    <button class="pinkey" data-n="del" style="font-size:18px">⌫</button><button class="pinkey" data-n="0">0</button>
    <button class="pinkey" style="opacity:0;pointer-events:none" disabled></button>
  </div>
  <div class="pinerr" id="pinerr"></div>
</div>
<script>
var pe='';
function pd(){for(var i=0;i<4;i++)document.getElementById('pd'+i).className='pindot'+(i<pe.length?' filled':'');}
function pc(){
  if(pe==='1979'||pe==='3030'||pe==='2025'){
    localStorage.setItem('cc_urg_ts',Date.now().toString());
    document.getElementById('pinov').style.display='none';
    startApp();
  }else{document.getElementById('pinerr').textContent='Incorrect PIN';pe='';pd();setTimeout(function(){document.getElementById('pinerr').textContent='';},2000);}
}
document.getElementById('pinpad').addEventListener('click',function(e){
  var b=e.target.closest('.pinkey');if(!b||b.disabled)return;
  var n=b.dataset.n;
  if(n==='del'){if(pe.length>0){pe=pe.slice(0,-1);pd();}}
  else{if(pe.length<4){pe+=n;pd();if(pe.length===4)setTimeout(pc,150);}}
});
(function(){var ts=localStorage.getItem('cc_urg_ts');if(ts&&Date.now()-parseInt(ts)<8*3600*1000)document.getElementById('pinov').style.display='none';})();
</script>

<script>
// ── CONFIG ────────────────────────────────────────────────────
var WA_NUMBER = '447305505976';
var WH_MIN    = 12; // Warehouse: keep minimum 12 on shelf

var BRANCHES = [
  {id:'chapy',     name:'Chapeltown', color:'#fb923c',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ2DoIGJsmVoJOmShcLoUJ6wFrwbVSejnPy7uft8UEf1Brj5gRNBmSTO4eRqZQkDsldlsD6GiBs2Bo/pub?gid=0&single=true&output=csv'},
  {id:'city',      name:'City Center', color:'#4ade80',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRfK3RbCr-2FPtGFXio6aL6UMnYrlNupoJ259jlHuLIXKkOBLraZxgcb8WvCj2ndeARlp-uVRyNMyKt/pub?gid=0&single=true&output=csv'},
  {id:'roundhay',  name:'Roundhay', color:'#60a5fa',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2w5wBKrzvkoUPjEB_f7K9_vyehT9MCAxJ32AwtSmNqZzVwJZaH2G0kg7YuRTjstWGZSLpGCVj9NzM/pub?gid=0&single=true&output=csv'},
  {id:'warehouse', name:'Warehouse', color:'#a78bfa',
   url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR7w_JR_xjlsZTD4-WMWoxotOPHDGg7Kgj7yvGGtJLZUL8apgHzBTOQxM7eBNu2VVirn6ehnlNR4vC6/pub?gid=0&single=true&output=csv'},
];
var IURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTpu9NMXwqZKBOM-0HcE0dqczoOdZqCXCJK5vqwXCz5YT9ZOg2Pm1vE_PvvljD7MzxxUSUknrKfao5Q/pub?gid=955535085&single=true&output=csv';

// ── SOURCES per destination branch (index in BRANCHES) ────────
// Each destination has ordered sources with a collection rule
var DEST_SOURCES = [
  // Chapeltown (0) collects from:
  [{srcIdx:3,rule:'wh',label:'Min 12 on shelf'},{srcIdx:1,rule:'half',label:'Half their stock'},{srcIdx:2,rule:'half',label:'Half their stock'}],
  // City Center (1) collects from:
  [{srcIdx:3,rule:'wh',label:'Min 12 on shelf'},{srcIdx:0,rule:'half',label:'Half their stock'},{srcIdx:2,rule:'half',label:'Half their stock'}],
  // Roundhay (2) collects from:
  [{srcIdx:3,rule:'wh',label:'Min 12 on shelf'},{srcIdx:0,rule:'half',label:'Half their stock'},{srcIdx:1,rule:'half',label:'Half their stock'}],
];

// ── STATE ─────────────────────────────────────────────────────
var bd=[null,null,null,null];
var imgs={};
var loaded=0;
var currentDest=0;
var currentView='collect';
var activeDepts=['All']; // 'All' or list of selected dept names
var ticks=JSON.parse(localStorage.getItem('cc_urg2_ticks')||'{}');

// ── DEPT FILTER HELPERS ───────────────────────────────────────
function deptVisible(dp){
  if(activeDepts.indexOf('All')>=0)return true;
  return activeDepts.indexOf(dp||'General')>=0;
}

function buildDeptFilter(){
  // Gather all depts from current source data for this dest
  var deptSet={};
  var sources=DEST_SOURCES[currentDest];
  var destData=bd[currentDest]||[];
  var destMap={};destData.forEach(function(p){if(p.bc)destMap[p.bc]=p;});

  sources.forEach(function(srcConf){
    var srcData=bd[srcConf.srcIdx];
    if(!srcData)return;
    srcData.forEach(function(p){
      if(p.qty<=0)return;
      var qty=calcCollect(p.qty,srcConf.rule);
      if(qty<=0)return;
      var dp=destMap[p.bc];
      if(dp&&dp.qty>3)return;
      if(p.dp)deptSet[p.dp]=true;
    });
  });

  var depts=Object.keys(deptSet).sort();
  if(!depts.length)return;

  var el=document.getElementById('dept-filter');
  var html='<div class="dpill'+(activeDepts.indexOf('All')>=0?' on':'')+'" data-d="All">All depts</div>';
  depts.forEach(function(d){
    var on=activeDepts.indexOf('All')<0&&activeDepts.indexOf(d)>=0;
    html+='<div class="dpill'+(on?' on':'')+'" data-d="'+d.replace(/"/g,'&quot;')+'">'+d+'</div>';
  });
  el.innerHTML=html;

  el.querySelectorAll('.dpill').forEach(function(pill){
    pill.addEventListener('click',function(){
      var d=this.dataset.d;
      if(d==='All'){
        activeDepts=['All'];
      }else{
        activeDepts=activeDepts.filter(function(x){return x!=='All';});
        var idx=activeDepts.indexOf(d);
        if(idx>=0)activeDepts.splice(idx,1);
        else activeDepts.push(d);
        if(!activeDepts.length)activeDepts=['All'];
      }
      buildDeptFilter();
      if(currentView==='collect')renderDest(currentDest);
      else renderOOS(currentDest);
    });
  });
}

// ── HELPERS ───────────────────────────────────────────────────
function cl(v){return String(v==null?'':v).trim();}
function calcCollect(srcQty,rule){
  if(rule==='wh'){
    if(srcQty>=WH_MIN)return 0;
    return WH_MIN-srcQty;
  }
  // half: send half, keep half
  if(srcQty<=0)return 0;
  return Math.floor(srcQty/2);
}
function tickKey(destIdx,srcIdx,bc){return destIdx+'_'+srcIdx+'_'+bc;}
function isTicked(destIdx,srcIdx,bc){return !!ticks[tickKey(destIdx,srcIdx,bc)];}
function setTick(destIdx,srcIdx,bc,val){
  ticks[tickKey(destIdx,srcIdx,bc)]=val;
  localStorage.setItem('cc_urg2_ticks',JSON.stringify(ticks));
}
function imgEl(bc,sz){
  var src=imgs[bc];
  sz=sz||52;
  if(src)return '<img src="'+src+'" loading="lazy" onerror="this.style.display=\'none\'" style="width:'+sz+'px;height:'+sz+'px;object-fit:cover">';
  return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadImgs(){
  try{
    var c=localStorage.getItem('cc_imgs');
    if(c){var o=JSON.parse(c);if(Date.now()-o.ts<86400000){imgs=o.d;return;}}
    var r=await fetch(IURL);var t=await r.text();
    Papa.parse(t,{header:true,skipEmptyLines:true}).data.forEach(function(row){
      var bc=cl(row['Barcode']),src=cl(row['ImageURL']);
      if(bc&&src&&src.startsWith('http'))imgs[bc]=src;
    });
    try{localStorage.setItem('cc_imgs',JSON.stringify({ts:Date.now(),d:imgs}));}catch(e){}
  }catch(e){}
}

async function loadBranch(idx){
  try{
    var r=await fetch(BRANCHES[idx].url+'&t='+Date.now());
    var t=await r.text();
    bd[idx]=Papa.parse(t,{header:true,skipEmptyLines:true}).data.map(function(row){
      var ls=cl(row['LastSold']);
      return{bc:cl(row['Barcode']),nm:cl(row['ProductName']),sz:cl(row['Size']),
             qty:parseInt(row['StockQty'])||0,prc:parseFloat(row['Price'])||0,
             dp:cl(row['Department']),
             ls:(ls&&ls!=='NULL')?ls:'Never'};
    }).filter(function(p){return p.bc&&p.nm;});
  }catch(e){bd[idx]=[];}
  loaded++;
  document.getElementById('stime').textContent=loaded<4?('loaded '+loaded+'/4…'):('live '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
  if(loaded>=1){buildDeptFilter();if(currentView==='collect')renderDest(currentDest);else renderOOS(currentDest);}
}

// ── RENDER COLLECT NOW ────────────────────────────────────────
// ONLY shows items physically IN the source branch (qty > 0)
// Warehouse: bring enough to make dest have 12 minimum
// Other branches: bring half their stock
function renderDest(destIdx){
  currentDest=destIdx;
  var el=document.getElementById('out');
  var sources=DEST_SOURCES[destIdx];
  var totalItems=0,doneItems=0;
  var html='';

  var destData=bd[destIdx]||[];
  var destMap={};
  destData.forEach(function(p){if(p.bc)destMap[p.bc]=p;});

  sources.forEach(function(srcConf){
    var srcIdx=srcConf.srcIdx;
    var srcBranch=BRANCHES[srcIdx];
    var srcData=bd[srcIdx];

    if(!srcData){
      html+='<div class="src-section"><div class="src-hdr">'+
        '<div class="src-dot" style="background:'+srcBranch.color+'"></div>'+
        '<div class="src-name">Collect from '+srcBranch.name+'</div>'+
        '<div class="src-rule" style="background:'+srcBranch.color+'22;color:'+srcBranch.color+'">Loading…</div>'+
        '</div></div>';
      return;
    }

    var eligible=[];
    srcData.forEach(function(srcProd){
      if(!srcProd.bc||!srcProd.nm)return;
      // SOURCE MUST HAVE POSITIVE STOCK — this is the key fix
      if(srcProd.qty<=0)return;
      // Calculate how many to take
      var qty=calcCollect(srcProd.qty,srcConf.rule);
      if(qty<=0)return; // warehouse already has 12+ there
      // Only if dest is out or very low
      var destProd=destMap[srcProd.bc];
      var destQty=destProd?destProd.qty:0;
      if(destQty>3)return; // dest has enough
      eligible.push({bc:srcProd.bc,nm:srcProd.nm,sz:srcProd.sz,
                     dp:srcProd.dp||'General',prc:srcProd.prc,
                     srcQty:srcProd.qty,destQty:destQty,qty:qty});
    });

    // Apply dept filter
    eligible=eligible.filter(function(item){return deptVisible(item.dp);});
    if(!eligible.length)return;

    var byDept={};
    eligible.forEach(function(item){
      var d=item.dp||'General';
      if(!byDept[d])byDept[d]=[];byDept[d].push(item);
    });

    var srcDone=eligible.filter(function(x){return isTicked(destIdx,srcIdx,x.bc);}).length;
    totalItems+=eligible.length;doneItems+=srcDone;

    html+='<div class="src-section">'+
      '<div class="src-hdr">'+
        '<div class="src-dot" style="background:'+srcBranch.color+'"></div>'+
        '<div class="src-name">Collect from '+srcBranch.name+'</div>'+
        '<div class="src-rule" style="background:'+srcBranch.color+'22;color:'+srcBranch.color+'">'+srcConf.label+'</div>'+
        '<div class="src-progress">'+srcDone+'/'+eligible.length+'</div>'+
      '</div>';

    Object.keys(byDept).sort().forEach(function(dept){
      var items=byDept[dept];
      var deptId='d_'+srcIdx+'_'+dept.replace(/\W/g,'_');
      html+='<div class="dept-hdr" data-did="'+deptId+'">'+
        '<span class="dept-name">'+dept+'</span>'+
        '<span class="dept-count">'+items.length+'</span>'+
      '</div>'+
      '<div class="dept-body" id="'+deptId+'">';
      items.forEach(function(item){
        var done=isTicked(destIdx,srcIdx,item.bc);
        html+='<div class="item-card'+(done?' done':'')+'" data-bc="'+item.bc+'" data-srcidx="'+srcIdx+'">'+
          '<div class="item-img">'+imgEl(item.bc,52)+'</div>'+
          '<div class="item-body">'+
            '<div class="item-name">'+item.nm+(item.sz?' · '+item.sz:'')+'</div>'+
            '<div class="item-bc">'+item.bc+'</div>'+
            '<div class="item-tags">'+
              '<span class="itag '+(srcIdx===3?'itag-wh':'itag-src')+'">'+srcBranch.name+': '+item.srcQty+'</span>'+
              '<span class="itag itag-info">'+BRANCHES[destIdx].name+': '+(item.destQty<=0?'OUT':item.destQty)+'</span>'+
              (item.prc>0?'<span class="itag itag-info">£'+item.prc.toFixed(2)+'</span>':'')+
            '</div>'+
          '</div>'+
          '<div class="item-right">'+
            '<div class="collect-box'+(done?' done-box':'')+'">'+
              '<div class="collect-num'+(done?' done-num':'')+'">'+item.qty+'</div>'+
              '<div class="collect-lbl">collect</div>'+
            '</div>'+
            '<div class="tick-btn'+(done?' done':'')+'" data-tick="1" data-bc="'+item.bc+'" data-srcidx="'+srcIdx+'">'+
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'+
            '</div>'+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  });

  if(!html){
    html='<div class="empty">'+(loaded<4?
      '<div class="spin" style="margin:20px auto"></div>Loading branches…':
      'Nothing to collect for '+BRANCHES[destIdx].name+' right now.<br><small style="font-size:11px">All source branches are also out of stock.<br>Switch to the ⏱ All out of stock tab.</small>')+
    '</div>';
  }

  el.innerHTML=html;

  var pct=totalItems>0?Math.round(doneItems/totalItems*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=
    totalItems?doneItems+' of '+totalItems+' items collected for '+BRANCHES[destIdx].name:
    'No stock available to collect right now';
  document.getElementById('wa-progress').textContent=doneItems+' collected';

  el.querySelectorAll('[data-tick]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var bc=this.dataset.bc;var srcIdx=parseInt(this.dataset.srcidx);
      setTick(destIdx,srcIdx,bc,!isTicked(destIdx,srcIdx,bc));
      renderDest(destIdx);
    });
  });

  el.querySelectorAll('.dept-hdr[data-did]').forEach(function(hdr){
    hdr.addEventListener('click',function(){
      var body=document.getElementById(this.dataset.did);
      if(body)body.style.display=body.style.display==='none'?'block':'none';
    });
  });
}

// ── VIEW SWITCHING ────────────────────────────────────────────
var currentView = 'collect';
document.querySelector('.vtabs-wrap') // handled via delegation below

// ── RENDER ALL OUT OF STOCK ───────────────────────────────────
var oosFilter='all'; // 'all' | '7' | '14' | '30' | '60'

function renderOOS(destIdx){
  var el=document.getElementById('out');
  var destData=bd[destIdx];
  if(!destData){
    el.innerHTML='<div class="loading"><div class="spin"></div>Loading…</div>';
    return;
  }

  // pDate helper
  function pDate(s){
    if(!s||s==='Never'||s==='Unknown'||s==='NULL')return null;
    var p=s.split('/');
    if(p.length===3){var d=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return isNaN(d)?null:d;}
    var d=new Date(s);return isNaN(d)?null:d;
  }
  function dSince(s){var d=pDate(s);return d?Math.floor((Date.now()-d)/86400000):9999;}

  // All OOS items at dest — qty <= 0, must have sold before (not Never)
  var oosItems=destData.filter(function(p){
    if(!p.bc||!p.nm||p.qty>0||p.ls==='Never'||!p.ls||p.ls==='Unknown')return false;
    return deptVisible(p.dp);
  });

  if(!oosItems.length){
    el.innerHTML='<div class="empty">No out of stock items at '+BRANCHES[destIdx].name+'<br>with previous sales history</div>';
    updateOOSProgress(0,0,destIdx);
    return;
  }

  // Build cross-branch availability map
  var availMap={};
  for(var b=0;b<4;b++){
    if(b===destIdx||!bd[b])continue;
    bd[b].forEach(function(p){
      if(p.bc&&p.qty>0){
        if(!availMap[p.bc])availMap[p.bc]=[];
        availMap[p.bc].push({branch:BRANCHES[b],qty:p.qty});
      }
    });
  }

  // Calculate days out for each
  oosItems.forEach(function(p){p.daysOut=dSince(p.ls);});
  oosItems.sort(function(a,b){return b.daysOut-a.daysOut;});

  // Stats
  var withSrc=oosItems.filter(function(p){return availMap[p.bc]&&availMap[p.bc].length>0;}).length;
  var noSrc=oosItems.length-withSrc;
  updateOOSProgress(oosItems.length,withSrc,destIdx);

  // Group by dept
  var byDept={};
  oosItems.forEach(function(p){
    var d=p.dp||'General';
    if(!byDept[d])byDept[d]=[];
    byDept[d].push(p);
  });

  // OOS filter pills
  var filterOpts=[
    {v:'all',l:'All'},
    {v:'7',l:'7+ days'},
    {v:'14',l:'14+ days'},
    {v:'30',l:'30+ days'},
    {v:'60',l:'60+ days'},
  ];
  var filteredOOS=oosItems.filter(function(p){
    if(oosFilter==='all')return true;
    return p.daysOut>=parseInt(oosFilter);
  });

  // Metrics bar
  var withSrcF=filteredOOS.filter(function(p){return availMap[p.bc]&&availMap[p.bc].length>0;}).length;
  var html='<div style="display:flex;gap:5px;padding:8px 10px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none">';
  filterOpts.forEach(function(opt){
    var on=oosFilter===opt.v;
    html+='<div class="oos-pill'+(on?' oos-pill-on':'')+'" data-oof="'+opt.v+'" style="flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid '+(on?'#cc0000':'var(--border)')+';background:'+(on?'#cc0000':'#fff')+';color:'+(on?'#fff':'var(--sub)')+'">'+opt.l+'</div>';
  });
  html+='</div>';

  html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 10px;background:var(--bg)">';
  html+='<div style="background:#fff;border-radius:var(--r);padding:8px;text-align:center;border-top:2px solid #cc0000"><div style="font-size:18px;font-weight:700;font-family:monospace;color:#cc0000">'+oosItems.length+'</div><div style="font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Total OOS</div></div>';
  html+='<div style="background:#fff;border-radius:var(--r);padding:8px;text-align:center;border-top:2px solid var(--green)"><div style="font-size:18px;font-weight:700;font-family:monospace;color:var(--green)">'+withSrc+'</div><div style="font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Can collect</div></div>';
  html+='<div style="background:#fff;border-radius:var(--r);padding:8px;text-align:center;border-top:2px solid var(--amber)"><div style="font-size:18px;font-weight:700;font-family:monospace;color:var(--amber)">'+noSrc+'</div><div style="font-size:8px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;margin-top:2px">Need reorder</div></div>';
  html+='</div>';

  // Regroup using filtered list
  var byDeptF={};
  filteredOOS.forEach(function(p){
    var d=p.dp||'General';if(!byDeptF[d])byDeptF[d]=[];byDeptF[d].push(p);
  });

  if(!filteredOOS.length){
    html+='<div class="empty">No items out of stock for '+parseInt(oosFilter)+'+ days at '+BRANCHES[destIdx].name+'</div>';
    el.innerHTML=html;
    el.querySelectorAll('.oos-pill').forEach(function(p){p.addEventListener('click',function(){oosFilter=this.dataset.oof;renderOOS(destIdx);});});
    return;
  }

  Object.keys(byDeptF).sort().forEach(function(dept){
    var items=byDeptF[dept];
    html+='<div class="oos-dept-hdr"><span class="oos-dept-name">'+dept+'</span><span style="font-size:10px;color:var(--sub)">'+items.length+' items</span></div>';
    items.forEach(function(p){
      var avail=availMap[p.bc]||[];
      var hasSrc=avail.length>0;
      var daysColor=p.daysOut>=30?'#cc0000':p.daysOut>=14?'#b45309':p.daysOut>=7?'#d97706':'var(--sub)';
      var daysBg=p.daysOut>=30?'var(--redbg)':p.daysOut>=14?'var(--amberbg)':'var(--bg)';

      html+='<div class="oos-row'+(hasSrc?' has-src':'')+'">';
      html+='<div class="oos-img">'+imgEl(p.bc,42)+'</div>';
      html+='<div class="oos-body">';
      html+='<div class="oos-name">'+p.nm+(p.sz?' · '+p.sz:'')+'</div>';
      html+='<div class="oos-bc">'+p.bc+'</div>';
      html+='<div class="oos-tags">';
      html+='<span class="itag" style="background:'+daysBg+';color:'+daysColor+'">'+
            (p.daysOut>=9999?'Unknown':(p.daysOut===0?'Today':p.daysOut==='1'?'Yesterday':p.daysOut+'d OOS'))+'</span>';
      html+='<span class="itag itag-info">Last sold: '+p.ls+'</span>';
      if(hasSrc){
        avail.forEach(function(a){
          html+='<span class="itag itag-src">'+a.branch.name+': '+a.qty+'</span>';
        });
      }else{
        html+='<span class="itag" style="background:var(--amberbg);color:var(--amber)">Reorder needed</span>';
      }
      if(p.prc>0)html+='<span class="itag itag-info">£'+p.prc.toFixed(2)+'</span>';
      html+='</div></div>';
      html+='<div class="oos-right">';
      html+='<div class="days-badge" style="color:'+daysColor+'">'+
            (p.daysOut>=9999?'?':p.daysOut)+'</div>';
      html+='<div class="days-lbl">days out</div>';
      html+='</div></div>';
    });
  });

  el.innerHTML=html;

  // Wire filter pills
  el.querySelectorAll('.oos-pill').forEach(function(p){
    p.addEventListener('click',function(){
      oosFilter=this.dataset.oof;
      renderOOS(destIdx);
    });
  });
}

function updateOOSProgress(total,withSrc,destIdx){
  var pct=total>0?Math.round(withSrc/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=total+' out of stock at '+BRANCHES[destIdx].name+' · '+withSrc+' can be collected · '+(total-withSrc)+' need reorder';
  document.getElementById('wa-progress').textContent=total+' items OOS';
}

// ── START ─────────────────────────────────────────────────────
function startApp(){
  loadImgs().then(function(){renderDest(0);});
  Promise.all([loadBranch(0),loadBranch(1),loadBranch(2),loadBranch(3)]);
}

(function(){var ts=localStorage.getItem('cc_urg_ts');if(ts&&Date.now()-parseInt(ts)<8*3600*1000)startApp();})();
</script>
